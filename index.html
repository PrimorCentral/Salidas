function desplazarSemanaFestivos_(delta) {
  if (FESTIVOS_ESTADO.filtroDesde && FESTIVOS_ESTADO.filtroHasta) return; // navegación deshabilitada con rango personalizado
  FESTIVOS_ESTADO.semanaInicio = sumarDias_(FESTIVOS_ESTADO.semanaInicio, delta * 7);
  cargarFestivos();
}

function actualizarFiltroFechas_() {
  const desde = document.getElementById('festivos-desde').value || null;
  const hasta = document.getElementById('festivos-hasta').value || null;
  FESTIVOS_ESTADO.filtroDesde = desde;
  FESTIVOS_ESTADO.filtroHasta = hasta;
  if (desde && hasta) cargarFestivos(); // rango completo: hace falta volver a pedir los meses que cubre
  else aplicarFiltrosFestivos_();       // rango incompleto: no cambia lo que hay que cargar, solo se ignora como filtro
}

function cargarFestivos() {
  if (ESTADO.vista !== 'configuracion' || ESTADO_CONFIG.seccionActiva !== 'festivos') return;
  const rangoEl = document.getElementById('festivos-rango');
  const listaEl = document.getElementById('festivos-lista');
  if (!rangoEl || !listaEl) return;

  const rangoPersonalizado = !!(FESTIVOS_ESTADO.filtroDesde && FESTIVOS_ESTADO.filtroHasta);
  const inicio = rangoPersonalizado ? FESTIVOS_ESTADO.filtroDesde : FESTIVOS_ESTADO.semanaInicio;
  const fin = rangoPersonalizado ? FESTIVOS_ESTADO.filtroHasta : sumarDias_(FESTIVOS_ESTADO.semanaInicio, 6);

  rangoEl.textContent = formatearFechaCorta_(inicio) + ' — ' + formatearFechaCorta_(fin);

  ['festivos-prev', 'festivos-next', 'festivos-hoy'].forEach(function (id) {
    const el = document.getElementById(id);
    if (el) el.disabled = rangoPersonalizado;
  });

  const idSolicitud = ++FESTIVOS_ESTADO.idSolicitud;
  listaEl.innerHTML = '<div class="loader">Cargando…</div>';
  const statsElCarga = document.getElementById('festivos-stats');
  if (statsElCarga) statsElCarga.innerHTML = '';

  const meses = mesesEnRango_(anioMesDe(inicio), anioMesDe(fin));

  Promise.all(meses.map(function (m) { return llamarApi_('getMesCalendario', [m]).catch(function () { return []; }); }))
    .then(function (resultadosMeses) {
      // Nos quedamos con la info (fecha, si tiene notas/cierres) de cada día
      // del rango exacto pedido, aunque no tenga nada guardado: así se puede
      // pintar la lista completa día a día (lunes a domingo) más abajo.
      const infoPorFecha = {};
      resultadosMeses.forEach(function (dias) {
        (dias || []).forEach(function (info) { infoPorFecha[info.fecha] = info; });
      });
      const diasRango = diasDeRango_(inicio, fin);
      const fechasConContenido = diasRango.filter(function (fecha) {
        const info = infoPorFecha[fecha];
        return info && (info.tieneNotas || info.tieneCierres);
      });
      return Promise.all(fechasConContenido.map(function (fecha) {
        return llamarApi_('getConteoDia', [fecha]).catch(function () { return null; });
      })).then(function (datosDias) { return { diasRango: diasRango, datosDias: datosDias }; });
    })
    .then(function (resultado) {
      if (idSolicitud !== FESTIVOS_ESTADO.idSolicitud) return; // ya no es la petición vigente
      FESTIVOS_ESTADO.diasRango = resultado.diasRango;
      FESTIVOS_ESTADO.datosCache = resultado.datosDias || [];
      aplicarFiltrosFestivos_();
    })
    .catch(function (err) {
      if (idSolicitud !== FESTIVOS_ESTADO.idSolicitud) return;
      listaEl.innerHTML = '<div class="festivos-vacio">No se ha podido cargar la información.</div>';
      mostrarErrorServidor(err);
    });
}

/* Convierte el resultado crudo de getConteoDia en una lista plana de
 * anotaciones individuales {fecha, tag, tipo, texto, id}, sin agrupar
 * todavía: agrupar y filtrar se hace después, en aplicarFiltrosFestivos_,
 * así los filtros de texto/tipo no necesitan volver a tocar el servidor. */
function aplanarDatosFestivos_(datosDias) {
  const lista = [];
  (datosDias || []).forEach(function (data) {
    if (!data) return;
    (data.notasGenerales || []).forEach(function (n) {
      lista.push({ fecha: data.fecha, tag: 'Nota del día', tipo: n.tipo, texto: n.texto, id: n.id });
    });
    (data.secciones || []).forEach(function (seccion) {
      (seccion.notas || []).forEach(function (n) {
        lista.push({ fecha: data.fecha, tag: parsearNombreAgrupacion(seccion.nombre).titulo, tipo: n.tipo, texto: n.texto, id: n.id });
      });
      (seccion.tiendas || []).forEach(function (t) {
        if (t.cerrada) lista.push({ fecha: data.fecha, tag: t.nombre, tipo: 'cierre', texto: t.motivoCierre || 'Tienda cerrada', id: t.cierreId });
      });
    });
  });
  return lista;
}

function aplicarFiltrosFestivos_() {
  const listaEl = document.getElementById('festivos-lista');
  const statsEl = document.getElementById('festivos-stats');
  if (!listaEl) return;

  let items = aplanarDatosFestivos_(FESTIVOS_ESTADO.datosCache);

  if (FESTIVOS_ESTADO.filtroDesde && FESTIVOS_ESTADO.filtroHasta) {
    items = items.filter(function (it) { return it.fecha >= FESTIVOS_ESTADO.filtroDesde && it.fecha <= FESTIVOS_ESTADO.filtroHasta; });
  }
  if (FESTIVOS_ESTADO.filtroTipo !== 'todos') {
    items = items.filter(function (it) { return it.tipo === FESTIVOS_ESTADO.filtroTipo; });
  }
  if (FESTIVOS_ESTADO.filtroTexto) {
    const q = FESTIVOS_ESTADO.filtroTexto;
    items = items.filter(function (it) {
      return it.tag.toLowerCase().indexOf(q) !== -1 || it.texto.toLowerCase().indexOf(q) !== -1;
    });
  }

  const porFecha = {};
  items.forEach(function (it) { (porFecha[it.fecha] = porFecha[it.fecha] || []).push(it); });

  const hayFiltrosDeContenido = !!FESTIVOS_ESTADO.filtroTexto || FESTIVOS_ESTADO.filtroTipo !== 'todos';
  const hayFiltrosActivos = hayFiltrosDeContenido || !!(FESTIVOS_ESTADO.filtroDesde && FESTIVOS_ESTADO.filtroHasta);
  const badgeEl = document.getElementById('festivos-filtro-badge');
  if (badgeEl) badgeEl.style.display = hayFiltrosActivos ? 'block' : 'none';

  // Con un filtro de texto o tipo activo solo tiene sentido mostrar los días
  // que de verdad tienen algo que coincida. Sin ese filtro (vista normal),
  // se listan TODOS los días del rango, aunque algunos no tengan nada
  // guardado (se marcan como "Sin ninguna anotación").
  const grupos = hayFiltrosDeContenido
    ? Object.keys(porFecha).sort().map(function (fecha) { return { fecha: fecha, items: porFecha[fecha] }; })
    : (FESTIVOS_ESTADO.diasRango || []).map(function (fecha) { return { fecha: fecha, items: porFecha[fecha] || [] }; });

  renderStatsFestivos_(statsEl, grupos);
  renderListaFestivos_(listaEl, grupos, hayFiltrosDeContenido);
  ajustarAlturaListaScrollable_('festivos-lista');
}

function renderStatsFestivos_(statsEl, grupos) {
  if (!statsEl) return;
  let totalCierres = 0, totalNotas = 0, diasConContenido = 0;
  grupos.forEach(function (g) {
    if (g.items.length) diasConContenido++;
    g.items.forEach(function (it) { it.tipo === 'cierre' ? totalCierres++ : totalNotas++; });
  });
  statsEl.innerHTML =
    '<div class="festivos-stat">' +
      '<span class="icono"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>' +
      '<span class="txt"><span class="valor">' + diasConContenido + '</span><span class="etiqueta">día' + (diasConContenido === 1 ? '' : 's') + '</span></span>' +
    '</div>' +
    '<div class="festivos-stat cierre">' +
      '<span class="icono">' + ICONO_CIERRE_ + '</span>' +
      '<span class="txt"><span class="valor">' + totalCierres + '</span><span class="etiqueta">cierre' + (totalCierres === 1 ? '' : 's') + '</span></span>' +
    '</div>' +
    '<div class="festivos-stat nota">' +
      '<span class="icono">' + ICONO_NOTA_ + '</span>' +
      '<span class="txt"><span class="valor">' + totalNotas + '</span><span class="etiqueta">nota' + (totalNotas === 1 ? '' : 's') + '</span></span>' +
    '</div>';
}

function renderListaFestivos_(listaEl, grupos, hayFiltrosDeContenido) {
  if (!grupos.length) {
    listaEl.innerHTML = hayFiltrosDeContenido
      ? '<div class="festivos-vacio">' +
          '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>' +
          '<span>Ningún resultado coincide con los filtros aplicados.</span>' +
        '</div>'
      : '<div class="festivos-vacio">' +
          '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>' +
          '<span>Sin cierres ni anotaciones guardados en este rango.</span>' +
        '</div>';
    return;
  }

  const hoy = hoyStr();
  const semana = document.createElement('div');
  semana.className = 'festivos-semana';

  grupos.forEach(function (g) {
    const esHoy = g.fecha === hoy;
    const d = new Date(g.fecha + 'T12:00:00');
    const col = document.createElement('div');
    col.className = 'festivos-dia-col' + (esHoy ? ' es-hoy' : '') + (g.items.length ? '' : ' vacio');
    const itemsHtml = g.items.length
      ? g.items.map(function (it) {
          const clase = it.tipo === 'cierre' ? 'festivos-item cierre' : 'festivos-item';
          const icono = it.tipo === 'cierre' ? ICONO_CIERRE_ : ICONO_NOTA_;
          const delBtn = it.id
            ? '<button type="button" class="festivos-del" data-id="' + escapeAttr(it.id) + '" title="Eliminar">' +
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg></button>'
            : '';
          return '<div class="' + clase + '">' +
            '<span class="festivos-item-icon">' + icono + '</span>' +
            '<div class="festivos-item-body">' +
              '<span class="festivos-item-tag">' + escapeHtml(it.tag) + '</span>' +
              '<span class="festivos-item-texto">' + escapeHtml(it.texto) + '</span>' +
            '</div>' + delBtn + '</div>';
        }).join('')
      : '<div class="festivos-item-vacio">Sin ninguna anotación</div>';
    col.innerHTML =
      '<div class="festivos-dia-col-header">' +
        '<div class="festivos-dia-col-badge"><span class="dia">' + d.getDate() + '</span><span class="mes">' + MESES_ES[d.getMonth()].slice(0, 3) + '</span></div>' +
        '<div class="festivos-dia-col-nombre">' + escapeHtml(DIAS_SEMANA_ES[d.getDay()]) +
          (esHoy ? '<span class="festivos-chip-hoy">Hoy</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="festivos-dia-col-items">' + itemsHtml + '</div>';
    semana.appendChild(col);
  });

  listaEl.innerHTML = '';
  listaEl.appendChild(semana);

  listaEl.querySelectorAll('.festivos-del').forEach(function (btn) {
    btn.onclick = function () { eliminarObservacionDesdeFestivos_(btn.getAttribute('data-id')); };
  });
}

const ICONO_NOTA_ = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>';
const ICONO_CIERRE_ = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="10" width="18" height="11" rx="2"/><path d="M7 10V7a5 5 0 0 1 10 0v3"/></svg>';

// Quita del caché local (FESTIVOS_ESTADO.datosCache) el elemento con el id
// indicado, sin tocar el servidor: permite repintar al instante tras borrar,
// en vez de tener que volver a pedir todo el rango (con su loader y espera).
function quitarDeCacheFestivos_(id) {
  (FESTIVOS_ESTADO.datosCache || []).forEach(function (data) {
    if (!data) return;
    if (data.notasGenerales) {
      data.notasGenerales = data.notasGenerales.filter(function (n) { return n.id !== id; });
    }
    (data.secciones || []).forEach(function (seccion) {
      if (seccion.notas) {
        seccion.notas = seccion.notas.filter(function (n) { return n.id !== id; });
      }
      (seccion.tiendas || []).forEach(function (t) {
        if (t.cerrada && t.cierreId === id) {
          t.cerrada = false;
          t.motivoCierre = '';
          t.cierreId = null;
        }
      });
    });
  });
}

function eliminarObservacionDesdeFestivos_(id) {
  appConfirm(
    'Eliminar registro',
    '¿Seguro que quieres eliminar este registro? Esta acción no se puede deshacer.',
    function () {
      // Guardamos una copia del caché para poder revertir si el servidor falla.
      const copiaCache = JSON.parse(JSON.stringify(FESTIVOS_ESTADO.datosCache || []));
      quitarDeCacheFestivos_(id);
      aplicarFiltrosFestivos_();
      mostrarToast('Eliminado');
      llamarApi_('eliminarObservacion', [id])
        .catch(function (err) {
          FESTIVOS_ESTADO.datosCache = copiaCache;
          aplicarFiltrosFestivos_();
          mostrarErrorServidor(err);
        });
    },
    true
  );
}

/* ---------------- CONFIGURACIÓN: "Emails agencias" ----------------
 * Lista editable de "Config_Agrupaciones" (nombre de la ruta, notas y
 * emails de la agencia de transporte), para gestionarla desde la propia
 * app en vez de tener que abrir la Google Sheet. Cualquier rol puede
 * consultarla; solo "admin" puede editar, borrar o sincronizar (los
 * campos e iconos correspondientes se muestran/ocultan vía CSS con la
 * clase "es-admin" del <body>, igual que el resto de acciones de solo
 * administrador de la app).
 */
let EMAILS_CONFIG_ESTADO = { datos: [], filtroTexto: '' };

// Calcula el alto disponible en pantalla para una lista con scroll propio
// dentro de Configuración (para que sea ELLA la que se desplace, y no toda
// la página): mide dónde termina la cabecera fija de encima y deja un
// margen para el padding inferior de la tarjeta, en vez de usar un número
// fijo en CSS que no encaja en todas las pantallas.
function ajustarAlturaListaScrollable_(idLista) {
  if (ESTADO.vista !== 'configuracion') return;
  const listaEl = document.getElementById(idLista);
  if (!listaEl) return;
  const top = listaEl.getBoundingClientRect().top;
  if (top <= 0) return; // sección no visible ahora mismo
  const disponible = window.innerHeight - top - 50; // 50px = padding inferior de la tarjeta (22) + borde (1) + padding inferior de main (24) + margen
  listaEl.style.maxHeight = Math.max(160, Math.round(disponible)) + 'px';
}
let _timerAjusteAlturasConfig = null;
function ajustarAlturasListasConfig_debounced_() {
  clearTimeout(_timerAjusteAlturasConfig);
  _timerAjusteAlturasConfig = setTimeout(function () {
    ajustarAlturaListaScrollable_('emails-config-lista');
    ajustarAlturaListaScrollable_('festivos-lista');
  }, 120);
}

function renderConfigEmails() {
  const cont = document.getElementById('config-contenido');
  if (!cont) return;
  cont.innerHTML =
    '<div class="vista-card">' +
      '<div class="emails-config-fijo">' +
        '<div class="vista-card-header">' +
          '<h2>Emails agencias</h2>' +
          '<div class="vista-card-header-acciones">' +

              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 22v-6h6M3.5 9a9 9 0 0 1 15-4L21 8M20.5 15a9 9 0 0 1-15 4L3 16"/></svg>' +
              'Sincronizar con hojas de día</button>' +
            '</div>' +
        '</div>' +
        '<p>Emails de la agencia de transporte de cada agrupación (ruta): unos para "Enviar Previsión" y otros para "Enviar Definitivo" — pueden ser los mismos o distintos. Se usan al pulsar esos botones en el conteo del día — ya no hace falta abrir la Google Sheet para cambiarlos.</p>' +
        '<div class="emails-config-solo-lectura">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>' +
          'Solo lectura: entra con la contraseña de administrador para poder editar o borrar.' +
        '</div>' +
        '<div class="emails-config-toolbar">' +
          '<div class="emails-config-busqueda">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>' +
            '<input type="text" id="emails-config-buscar" placeholder="Buscar agrupación o email…">' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div id="emails-config-lista"><div class="loader">Cargando…</div></div>' +
    '</div>';

  document.getElementById('btn-sincronizar-agrupaciones').onclick = sincronizarAgrupacionesDesdeApp_;

  let temporizadorBusquedaEmails = null;
  document.getElementById('emails-config-buscar').addEventListener('input', function (e) {
    clearTimeout(temporizadorBusquedaEmails);
    const valor = e.target.value;
    temporizadorBusquedaEmails = setTimeout(function () {
      EMAILS_CONFIG_ESTADO.filtroTexto = valor.trim().toLowerCase();
      pintarListaEmails_();
    }, 200);
  });

  cargarAgrupacionesConfig_();
  ajustarAlturaListaScrollable_('emails-config-lista');
  window.addEventListener('resize', ajustarAlturasListasConfig_debounced_);
}

function cargarAgrupacionesConfig_() {
  if (ESTADO.vista !== 'configuracion' || ESTADO_CONFIG.seccionActiva !== 'emails') return;
  llamarApi_('getAgrupacionesConfig', [])
    .then(function (datos) {
      if (ESTADO.vista !== 'configuracion' || ESTADO_CONFIG.seccionActiva !== 'emails') return;
      EMAILS_CONFIG_ESTADO.datos = datos || [];
      pintarListaEmails_();
      ajustarAlturaListaScrollable_('emails-config-lista');
    })
    .catch(function (err) {
      mostrarErrorServidor(err);
      const listaEl = document.getElementById('emails-config-lista');
      if (listaEl) listaEl.innerHTML = '<div class="emails-config-vacio">No se ha podido cargar la lista.</div>';
    });
}

function pintarListaEmails_() {
  const listaEl = document.getElementById('emails-config-lista');
  if (!listaEl) return;

  const filtro = EMAILS_CONFIG_ESTADO.filtroTexto;
  const items = EMAILS_CONFIG_ESTADO.datos.filter(function (it) {
    if (!filtro) return true;
    const texto = (it.agrupacion + ' ' + it.emails.join(' ') + ' ' + (it.emailsPrevision || []).join(' ') + ' ' + (it.notas || '')).toLowerCase();
    return texto.indexOf(filtro) !== -1;
  });

  if (!items.length) {
    listaEl.innerHTML =
      '<div class="emails-config-vacio">' +
        '<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>' +
        (EMAILS_CONFIG_ESTADO.datos.length ? 'Ninguna agrupación coincide con la búsqueda.' : 'Todavía no hay agrupaciones en Config_Agrupaciones. Usa "Sincronizar con hojas de día" para traerlas.') +
      '</div>';
    return;
  }

  listaEl.innerHTML = items.map(function (it, idx) {
    const esNueva = /^NUEVA/i.test(it.estado || '');
    const esSinUso = /^SIN USO/i.test(it.estado || '');
    const clase = 'emails-config-item' + (esNueva ? ' nueva' : (esSinUso ? ' sinuso' : ''));
    const badge = esNueva
      ? '<span class="emails-config-badge nueva">Nueva — falta email</span>'
      : (esSinUso ? '<span class="emails-config-badge sinuso">Sin uso</span>' : '');
    const idSeguro = 'ec' + idx;
    return (
      '<div class="' + clase + '">' +
        '<div class="emails-config-cabecera">' +
          '<span class="emails-config-nombre">' + escapeHtml(it.agrupacion) + '</span>' +
          badge +
          '<button type="button" class="emails-config-borrar" title="Eliminar de la configuración" data-borrar="' + escapeAttr(it.agrupacion) + '">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>' +
          '</button>' +
        '</div>' +
        '<div class="emails-config-campos">' +
          '<div class="emails-config-campo">' +
            '<label>Emails Definitivo (separados por comas)</label>' +
            '<input type="text" id="' + idSeguro + '_emails" value="' + escapeAttr(it.emails.join(', ')) + '" placeholder="agencia@ejemplo.com, otra@ejemplo.com" ' + (esAdmin() ? '' : 'disabled') + '>' +
          '</div>' +
          '<div class="emails-config-campo">' +
            '<label>Emails Previsión (separados por comas)</label>' +
            '<input type="text" id="' + idSeguro + '_emailsPrevision" value="' + escapeAttr((it.emailsPrevision || []).join(', ')) + '" placeholder="agencia@ejemplo.com, otra@ejemplo.com" ' + (esAdmin() ? '' : 'disabled') + '>' +
          '</div>' +
          '<div class="emails-config-campo">' +
            '<label>Notas</label>' +
            '<input type="text" id="' + idSeguro + '_notas" value="' + escapeAttr(it.notas || '') + '" placeholder="Notas libres (opcional)" ' + (esAdmin() ? '' : 'disabled') + '>' +
          '</div>' +
        '</div>' +
        '<div class="emails-config-pie">' +
          '<button type="button" class="emails-config-guardar" data-guardar="' + escapeAttr(it.agrupacion) + '" data-id="' + idSeguro + '">' +
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>' +
            'Guardar</button>' +
        '</div>' +
      '</div>'
    );
  }).join('');

  listaEl.querySelectorAll('[data-guardar]').forEach(function (btn) {
    btn.onclick = function () { guardarEmailAgrupacion_(btn.getAttribute('data-guardar'), btn.getAttribute('data-id'), btn); };
  });
  listaEl.querySelectorAll('[data-borrar]').forEach(function (btn) {
    btn.onclick = function () { confirmarEliminarAgrupacionConfig_(btn.getAttribute('data-borrar')); };
  });
}

function guardarEmailAgrupacion_(agrupacion, idSeguro, btn) {
  const emailsTexto = document.getElementById(idSeguro + '_emails').value;
  const emailsPrevisionTexto = document.getElementById(idSeguro + '_emailsPrevision').value;
  const notas = document.getElementById(idSeguro + '_notas').value;
  btn.disabled = true;
  llamarApi_('guardarEmailsAgrupacion', [agrupacion, emailsTexto, notas, emailsPrevisionTexto])
    .then(function () {
      mostrarToast('Emails guardados');
      cargarAgrupacionesConfig_();
    })
    .catch(function (err) {
      btn.disabled = false;
      mostrarErrorServidor(err);
    });
}

function confirmarEliminarAgrupacionConfig_(agrupacion) {
  appConfirm(
    'Eliminar de la configuración',
    '¿Seguro que quieres eliminar "' + agrupacion + '" de Config_Agrupaciones? Si esa agrupación se sigue usando en alguna hoja de día, no se le podrá enviar el resumen por email hasta que vuelvas a añadirla.',
    function () { eliminarAgrupacionConfig_(agrupacion); }
  );
}

function eliminarAgrupacionConfig_(agrupacion) {
  llamarApi_('eliminarAgrupacionConfig', [agrupacion])
    .then(function () {
      mostrarToast('Eliminado');
      cargarAgrupacionesConfig_();
    })
    .catch(mostrarErrorServidor);
}

function sincronizarAgrupacionesDesdeApp_() {
  const btn = document.getElementById('btn-sincronizar-agrupaciones');
  if (btn) { btn.classList.add('girando'); btn.disabled = true; }
  llamarApi_('sincronizarAgrupaciones', [])
    .then(function (resultado) {
      if (btn) { btn.classList.remove('girando'); btn.disabled = false; }
      const nuevas = (resultado && resultado.nuevas) || [];
      const huerfanas = (resultado && resultado.huerfanas) || [];
      mostrarToast(!nuevas.length && !huerfanas.length
        ? 'Todo al día: no hay cambios'
        : nuevas.length + ' nueva(s), ' + huerfanas.length + ' sin uso');
      cargarAgrupacionesConfig_();
    })
    .catch(function (err) {
      if (btn) { btn.classList.remove('girando'); btn.disabled = false; }
      mostrarErrorServidor(err);
    });
}

/* ---------------- CONFIGURACIÓN: "Plantilla conteos" ----------------
 * Editor de la estructura de cada hoja de día (LUNES, MARTES...): qué
 * rutas hay y qué tiendas tiene cada una, para no tener que abrir la
 * Google Sheet a mano. Solo lectura para cualquier rol; añadir, editar,
 * borrar y reordenar requiere el rol "admin" (igual que el resto de
 * Configuración).
 *
 * OJO: esto edita filas reales de la hoja de conteo (inserta, borra o
 * mueve filas). Mejor evitarlo mientras alguien esté a mitad de rellenar
 * el conteo de ese día en concreto, para no liarse con casillas ya
 * escritas de 60/PTA/CART. Por eso mismo, tras cada cambio se vuelve a
 * pedir la plantilla entera de ese día al servidor (los números de fila
 * cambian al insertar/borrar/mover, así que no se puede hacer una
 * actualización optimista local como en "Gestión festivos").
 */
let PLANTILLA_ESTADO = { dias: [], dia: null, secciones: [] };

function renderConfigPlantilla() {
  const cont = document.getElementById('config-contenido');
  if (!cont) return;
  cont.innerHTML =
    '<div class="vista-card">' +
      '<div class="vista-card-header">' +
        '<h2>Rutas y tiendas</h2>' +
      '</div>' +
      '<p>Rutas y tiendas de cada hoja de día. Los cambios se aplican directamente en la Google Sheet.</p>' +
      '<div class="emails-config-solo-lectura">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>' +
        'Solo lectura: entra con la contraseña de administrador para poder editar.' +
      '</div>' +
      '<div class="plantilla-dias-fila" id="plantilla-dias-fila"></div>' +
      '<div id="plantilla-lista"><div class="loader">Cargando…</div></div>' +
    '</div>';

  llamarApi_('getDiasPlantilla', [])
    .then(function (dias) {
      PLANTILLA_ESTADO.dias = dias || [];
      if (!PLANTILLA_ESTADO.dia || PLANTILLA_ESTADO.dias.indexOf(PLANTILLA_ESTADO.dia) === -1) {
        PLANTILLA_ESTADO.dia = PLANTILLA_ESTADO.dias[0] || null;
      }
      pintarDiasPlantilla_();
      cargarPlantilla_();
    })
    .catch(mostrarErrorServidor);
}

function pintarDiasPlantilla_() {
  const cont = document.getElementById('plantilla-dias-fila');
  if (!cont) return;
  const botonesDias = PLANTILLA_ESTADO.dias.map(function (d) {
    return '<button type="button" class="' + (d === PLANTILLA_ESTADO.dia ? 'activo' : '') + '" data-dia="' + escapeAttr(d) + '">' + escapeHtml(d) + '</button>';
  }).join('');
  cont.innerHTML =
    '<div class="plantilla-dias">' + botonesDias + '</div>' +
    (esAdmin() ? botonAnadirRutaPlantillaHtml_() : '');
  cont.querySelectorAll('.plantilla-dias button').forEach(function (btn) {
    btn.onclick = function () {
      if (btn.getAttribute('data-dia') === PLANTILLA_ESTADO.dia) return;
      PLANTILLA_ESTADO.dia = btn.getAttribute('data-dia');
      pintarDiasPlantilla_();
      cargarPlantilla_();
    };
  });
  const btnAnadirRuta = document.getElementById('btn-plantilla-anadir-ruta');
  if (btnAnadirRuta) btnAnadirRuta.onclick = anadirRutaPlantilla_;
}

function cargarPlantilla_() {
  if (ESTADO.vista !== 'configuracion' || ESTADO_CONFIG.seccionActiva !== 'plantilla') return;
  const listaEl = document.getElementById('plantilla-lista');
  if (!listaEl || !PLANTILLA_ESTADO.dia) return;
  listaEl.innerHTML = '<div class="loader">Cargando…</div>';
  llamarApi_('getPlantillaDia', [PLANTILLA_ESTADO.dia])
    .then(function (resultado) {
      if (ESTADO.vista !== 'configuracion' || ESTADO_CONFIG.seccionActiva !== 'plantilla') return;
      PLANTILLA_ESTADO.secciones = (resultado && resultado.secciones) || [];
      pintarPlantilla_();
    })
    .catch(function (err) {
      listaEl.innerHTML = '<div class="festivos-vacio">No se ha podido cargar la plantilla de este día.</div>';
      mostrarErrorServidor(err);
    });
}

function botonAnadirRutaPlantillaHtml_() {
  return '<button type="button" class="btn-anadir-obs plantilla-anadir-ruta" id="btn-plantilla-anadir-ruta">' +
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>' +
    'Añadir ruta nueva</button>';
}

/** Botón pequeño "60"/"PTA"/"CART." para bloquear (poner "NO") o
 *  desbloquear la casilla correspondiente de una tienda, desde "Rutas y
 *  tiendas". campo: 'c60' | 'pta' | 'cart'. Visible para todos (para que
 *  el usuario normal vea qué está bloqueado), pero solo pulsable si es
 *  admin. */
function botonBloqueoPlantillaHtml_(t, campo, etiqueta) {
  const bloqueado = campo === 'c60' ? t.bloqueo60 : (campo === 'pta' ? t.bloqueoPta : t.bloqueoCart);
  const titulo = bloqueado
    ? 'Quitar el bloqueo "NO" de ' + etiqueta + ' en esta tienda'
    : 'Bloquear ' + etiqueta + ' en esta tienda (pondrá "NO", no podrá recibir palets ahí)';
  return '<button type="button" class="plantilla-tienda-bloqueo' + (bloqueado ? ' activo' : '') + '" data-bloqueo-row="' + t.row + '" data-bloqueo-campo="' + campo + '" data-bloqueo-activo="' + (bloqueado ? '1' : '0') + '" title="' + titulo + '"' + (esAdmin() ? '' : ' disabled') + '>' + etiqueta + '</button>';
}

function pintarPlantilla_() {
  const listaEl = document.getElementById('plantilla-lista');
  if (!listaEl) return;

  if (!PLANTILLA_ESTADO.secciones.length) {
    listaEl.innerHTML = '<div class="festivos-vacio">Esta hoja de día todavía no tiene ninguna ruta.</div>';
    return;
  }

  listaEl.innerHTML = PLANTILLA_ESTADO.secciones.map(function (s, si) {
    const tiendasHtml = s.tiendas.map(function (t, ti) {
      const idSeguro = 'pt' + si + '_' + ti;
      const tieneNotaOOrden = !!(t.nota || t.orden);
      return (
        '<div class="plantilla-tienda">' +
          '<div class="plantilla-tienda-flechas">' +
            '<button type="button" data-subir="' + t.row + '"' + (ti === 0 ? ' disabled' : '') + ' title="Subir">' +
              '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg></button>' +
            '<button type="button" data-bajar="' + t.row + '"' + (ti === s.tiendas.length - 1 ? ' disabled' : '') + ' title="Bajar">' +
              '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></button>' +
          '</div>' +
          '<input type="text" class="lim" id="' + idSeguro + '_lim" value="' + escapeAttr(t.limite) + '" title="Límite" ' + (esAdmin() ? '' : 'disabled') + '>' +
          '<input type="text" class="nombre" id="' + idSeguro + '_nombre" value="' + escapeAttr(t.nombre) + '" ' + (esAdmin() ? '' : 'disabled') + '>' +
          '<div class="plantilla-tienda-bloqueos">' +
            botonBloqueoPlantillaHtml_(t, 'c60', '60') +
            botonBloqueoPlantillaHtml_(t, 'pta', 'PTA') +
            botonBloqueoPlantillaHtml_(t, 'cart', 'CART.') +
          '</div>' +
          '<button type="button" class="plantilla-tienda-nota' + (tieneNotaOOrden ? ' con-dato' : '') + '" data-nota-fila="' + t.row + '" data-nota-texto="' + escapeAttr(t.nota || '') + '" data-nota-cantidad="' + (t.notaNumFilas || 1) + '" data-nota-orden="' + escapeAttr(t.orden || '') + '" title="' + (tieneNotaOOrden ? 'Editar nota / orden de retirada' : 'Añadir nota / orden de retirada') + '"' + (esAdmin() ? '' : ' disabled') + '>' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41 11 3.83A2 2 0 0 0 9.59 3.24L3 3v6.59a2 2 0 0 0 .59 1.41l9.58 9.58a2 2 0 0 0 2.83 0l4.59-4.59a2 2 0 0 0 0-2.83z"/><circle cx="7.5" cy="7.5" r="1.2"/></svg></button>' +
          (esAdmin() ? (
            '<button type="button" class="plantilla-tienda-guardar" data-guardar-tienda="' + t.row + '" data-id="' + idSeguro + '" title="Guardar cambios" disabled>' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>' +
            '<button type="button" class="plantilla-tienda-borrar" data-borrar-tienda="' + t.row + '" title="Eliminar tienda">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg></button>'
          ) : '') +
        '</div>'
      );
    }).join('');

    const notasCargaHtml = s.notasCarga.map(function (n, ni) {
      const idn = 'nc' + si + '_' + ni;
      return (
        '<div class="plantilla-notacarga-item">' +
          '<input type="text" id="' + idn + '" value="' + escapeAttr(n.texto) + '" ' + (esAdmin() ? '' : 'disabled') + '>' +
          (esAdmin() ? (
            '<button type="button" class="plantilla-tienda-guardar" data-guardar-notacarga="' + n.row + '" data-id="' + idn + '" title="Guardar" disabled>' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>' +
            '<button type="button" class="plantilla-tienda-borrar" data-borrar-notacarga="' + n.row + '" title="Eliminar nota de carga">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg></button>'
          ) : '') +
        '</div>'
      );
    }).join('');

    return (
      '<div class="plantilla-ruta">' +
        '<div class="plantilla-ruta-header">' +
          '<input type="text" value="' + escapeAttr(s.nombre) + '" id="pr' + si + '_nombre" ' + (esAdmin() ? '' : 'disabled') + '>' +
          (esAdmin() ? (
            '<button type="button" class="plantilla-ruta-peso' + (s.tienePeso ? ' activo' : '') + '" data-toggle-peso="' + escapeAttr(s.nombre) + '" data-peso-activo="' + (s.tienePeso ? '1' : '0') + '" title="' + (s.tienePeso ? 'Quitar la casilla PESO de esta ruta' : 'Activar la casilla PESO en el conteo de esta ruta') + '">PESO</button>' +
            '<button type="button" class="plantilla-ruta-anadir-tienda" data-anadir-tienda-ruta="' + escapeAttr(s.nombre) + '" title="Añadir tienda a esta ruta">' +
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Añadir tienda</button>' +
            '<button type="button" class="plantilla-tienda-guardar" data-guardar-ruta="' + escapeAttr(s.nombre) + '" data-id="pr' + si + '_nombre" title="Guardar nombre de ruta" disabled>' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>' +
            '<button type="button" class="plantilla-ruta-borrar" data-borrar-ruta="' + escapeAttr(s.nombre) + '" title="Eliminar ruta completa">' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg></button>'
          ) : '') +
        '</div>' +
        (notasCargaHtml || esAdmin() ? (
          '<div class="plantilla-notascarga">' +
            notasCargaHtml +
            (esAdmin() ? '<button type="button" class="plantilla-anadir-notacarga" data-anadir-notacarga="' + escapeAttr(s.nombre) + '">' +
              '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Añadir nota de carga</button>' : '') +
          '</div>'
        ) : '') +
        '<div class="plantilla-tiendas">' + (tiendasHtml || '<div class="festivos-item-vacio">Sin tiendas todavía.</div>') + '</div>' +
      '</div>'
    );
  }).join('');

  listaEl.querySelectorAll('[data-nota-fila]').forEach(function (btn) {
    btn.onclick = function () {
      abrirModalNotaTiendaPlantilla_(
        btn.getAttribute('data-nota-fila'),
        btn.getAttribute('data-nota-texto'),
        Number(btn.getAttribute('data-nota-cantidad')) || 1,
        btn.getAttribute('data-nota-orden')
      );
    };
  });
  listaEl.querySelectorAll('[data-guardar-notacarga]').forEach(function (btn) {
    btn.onclick = function () { guardarNotaCargaPlantilla_(btn.getAttribute('data-guardar-notacarga'), btn.getAttribute('data-id')); };
  });
  listaEl.querySelectorAll('[data-borrar-notacarga]').forEach(function (btn) {
    btn.onclick = function () { confirmarEliminarNotaCargaPlantilla_(btn.getAttribute('data-borrar-notacarga')); };
  });
  listaEl.querySelectorAll('[data-anadir-notacarga]').forEach(function (btn) {
    btn.onclick = function () { abrirModalAnadirNotaCargaPlantilla_(btn.getAttribute('data-anadir-notacarga')); };
  });
  listaEl.querySelectorAll('.plantilla-notacarga-item').forEach(function (item) {
    const input = item.querySelector('input');
    const boton = item.querySelector('.plantilla-tienda-guardar');
    if (!input || !boton) return;
    const refrescar = function () {
      const cambiado = input.value !== input.defaultValue;
      item.classList.toggle('dirty', cambiado);
      boton.disabled = !cambiado;
    };
    input.addEventListener('input', refrescar);
  });

  listaEl.querySelectorAll('[data-guardar-tienda]').forEach(function (btn) {

    btn.onclick = function () { guardarTiendaPlantilla_(btn.getAttribute('data-guardar-tienda'), btn.getAttribute('data-id')); };
  });
  listaEl.querySelectorAll('[data-borrar-tienda]').forEach(function (btn) {
    btn.onclick = function () { confirmarEliminarTiendaPlantilla_(btn.getAttribute('data-borrar-tienda')); };
  });
  listaEl.querySelectorAll('[data-subir]').forEach(function (btn) {
    btn.onclick = function () { moverTiendaPlantilla_(btn.getAttribute('data-subir'), 'arriba'); };
  });
  listaEl.querySelectorAll('[data-bajar]').forEach(function (btn) {
    btn.onclick = function () { moverTiendaPlantilla_(btn.getAttribute('data-bajar'), 'abajo'); };
  });
  listaEl.querySelectorAll('[data-anadir-tienda-ruta]').forEach(function (btn) {
    btn.onclick = function () { abrirModalAnadirTiendaPlantilla_(btn.getAttribute('data-anadir-tienda-ruta')); };
  });
  listaEl.querySelectorAll('[data-guardar-ruta]').forEach(function (btn) {
    btn.onclick = function () { guardarNombreRutaPlantilla_(btn.getAttribute('data-guardar-ruta'), btn.getAttribute('data-id')); };
  });

  // Marca en naranja la fila/cabecera y habilita "Guardar" solo cuando el
  // valor de un campo difiere de con el que se pintó (input.defaultValue
  // conserva el valor original aunque el usuario escriba encima).
  listaEl.querySelectorAll('.plantilla-tienda').forEach(function (fila) {
    const lim = fila.querySelector('input.lim');
    const nombre = fila.querySelector('input.nombre');
    const boton = fila.querySelector('.plantilla-tienda-guardar');
    if (!lim || !nombre || !boton) return;
    const refrescar = function () {
      const cambiado = lim.value !== lim.defaultValue || nombre.value !== nombre.defaultValue;
      fila.classList.toggle('dirty', cambiado);
      boton.disabled = !cambiado;
    };
    lim.addEventListener('input', refrescar);
    nombre.addEventListener('input', refrescar);
  });
  listaEl.querySelectorAll('.plantilla-ruta-header').forEach(function (cabecera) {
    const nombre = cabecera.querySelector('input');
    const boton = cabecera.querySelector('[data-guardar-ruta]');
    if (!nombre || !boton) return;
    const refrescar = function () {
      const cambiado = nombre.value !== nombre.defaultValue;
      cabecera.classList.toggle('dirty', cambiado);
      boton.disabled = !cambiado;
    };
    nombre.addEventListener('input', refrescar);
  });
  listaEl.querySelectorAll('[data-borrar-ruta]').forEach(function (btn) {
    btn.onclick = function () { confirmarEliminarRutaPlantilla_(btn.getAttribute('data-borrar-ruta')); };
  });
  listaEl.querySelectorAll('[data-toggle-peso]').forEach(function (btn) {
    btn.onclick = function () { togglePesoRutaPlantilla_(btn.getAttribute('data-toggle-peso'), btn.getAttribute('data-peso-activo') === '1'); };
  });
  listaEl.querySelectorAll('[data-bloqueo-row]').forEach(function (btn) {
    btn.onclick = function () {
      toggleBloqueoCampoTiendaPlantilla_(
        btn.getAttribute('data-bloqueo-row'),
        btn.getAttribute('data-bloqueo-campo'),
        btn.getAttribute('data-bloqueo-activo') === '1'
      );
    };
  });
}

/** Activa/desactiva la casilla PESO de una ruta desde "Rutas y tiendas".
 *  Al desactivarla se pide confirmación, porque borra también los valores
 *  de peso ya guardados en esa ruta (ver desactivarPesoRuta en el backend). */
function togglePesoRutaPlantilla_(nombreRuta, activoActualmente) {
  if (activoActualmente) {
    appConfirm(
      'Quitar la casilla PESO',
      '¿Seguro que quieres quitar la casilla PESO de "' + nombreRuta + '"? Se borrarán los valores de peso ya guardados en esta ruta.',
      function () {
        llamarApi_('desactivarPesoRuta', [PLANTILLA_ESTADO.dia, nombreRuta])
          .then(function () { mostrarToast('Casilla PESO desactivada'); cargarPlantilla_(); })
          .catch(mostrarErrorServidor);
      },
      true
    );
    return;
  }
  llamarApi_('activarPesoRuta', [PLANTILLA_ESTADO.dia, nombreRuta])
    .then(function () { mostrarToast('Casilla PESO activada'); cargarPlantilla_(); })
    .catch(mostrarErrorServidor);
}

/** Bloquea o desbloquea la casilla 60/PTA/CART de una tienda concreta,
 *  desde "Rutas y tiendas" (equivale a escribir/borrar "NO" a mano en la
 *  Sheet). Al bloquear se pide confirmación, porque sobrescribe cualquier
 *  valor que hubiera en esa celda (por ejemplo un conteo ya metido hoy). */
function toggleBloqueoCampoTiendaPlantilla_(row, campo, activoActualmente) {
  const etiquetas = { c60: '60', pta: 'PTA', cart: 'CART.' };
  const etiqueta = etiquetas[campo] || campo;

  if (activoActualmente) {
    llamarApi_('desbloquearCampoTiendaPlantilla', [PLANTILLA_ESTADO.dia, Number(row), campo])
      .then(function () { mostrarToast('Bloqueo quitado'); cargarPlantilla_(); })
      .catch(mostrarErrorServidor);
    return;
  }

  appConfirm(
    'Bloquear ' + etiqueta,
    'Esta tienda quedará marcada como "NO" en ' + etiqueta + ' (no debería recibir palets ahí ese día de la semana). Si esa casilla ya tenía algo escrito, se sobrescribirá. ¿Seguro?',
    function () {
      llamarApi_('bloquearCampoTiendaPlantilla', [PLANTILLA_ESTADO.dia, Number(row), campo])
        .then(function () { mostrarToast('Bloqueado'); cargarPlantilla_(); })
        .catch(mostrarErrorServidor);
    },
    true
  );
}

function guardarTiendaPlantilla_(row, idSeguro) {
  const nombre = document.getElementById(idSeguro + '_nombre').value;
  const limite = document.getElementById(idSeguro + '_lim').value;
  llamarApi_('editarTiendaPlantilla', [PLANTILLA_ESTADO.dia, Number(row), nombre, limite])
    .then(function () { mostrarToast('Guardado'); cargarPlantilla_(); })
    .catch(mostrarErrorServidor);
}

function confirmarEliminarTiendaPlantilla_(row) {
  appConfirm(
    'Eliminar tienda',
    '¿Seguro que quieres eliminar esta tienda de la plantilla? Esta acción no se puede deshacer.',
    function () { eliminarTiendaPlantilla_(row); },
    true
  );
}
function eliminarTiendaPlantilla_(row) {
  llamarApi_('eliminarTiendaPlantilla', [PLANTILLA_ESTADO.dia, Number(row)])
    .then(function () { mostrarToast('Eliminada'); cargarPlantilla_(); })
    .catch(mostrarErrorServidor);
}

function moverTiendaPlantilla_(row, direccion) {
  llamarApi_('moverTiendaPlantilla', [PLANTILLA_ESTADO.dia, Number(row), direccion])
    .then(function () { cargarPlantilla_(); })
    .catch(mostrarErrorServidor);
}

function guardarNotaCargaPlantilla_(row, idSeguro) {
  const texto = document.getElementById(idSeguro).value;
  llamarApi_('editarNotaCargaPlantilla', [PLANTILLA_ESTADO.dia, Number(row), texto])
    .then(function () { mostrarToast('Guardado'); cargarPlantilla_(); })
    .catch(mostrarErrorServidor);
}

function confirmarEliminarNotaCargaPlantilla_(row) {
  appConfirm(
    'Eliminar nota de carga',
    '¿Seguro que quieres eliminar esta nota de carga? Esta acción no se puede deshacer.',
    function () {
      llamarApi_('eliminarNotaCargaPlantilla', [PLANTILLA_ESTADO.dia, Number(row)])
        .then(function () { mostrarToast('Eliminada'); cargarPlantilla_(); })
        .catch(mostrarErrorServidor);
    },
    true
  );
}

function abrirModalAnadirNotaCargaPlantilla_(nombreRuta) {
  appPrompt('Añadir nota de carga', 'Ej: 1 CAMIÓN 33 P. + RESTOS TODOS LOS LUNES', function (texto) {
    if (!texto || !texto.trim()) return;
    llamarApi_('añadirNotaCargaPlantilla', [PLANTILLA_ESTADO.dia, nombreRuta, texto.trim()])
      .then(function () { mostrarToast('Nota añadida'); cargarPlantilla_(); })
      .catch(mostrarErrorServidor);
  });
}

function abrirModalNotaTiendaPlantilla_(fila, notaActual, notaCantidadActual, ordenActual) {
  document.getElementById('modal-box').classList.remove('ancho');
  document.getElementById('modal-box').classList.remove('medio');
  document.getElementById('modal-box').classList.remove('peligro');
  document.getElementById('modal-title').style.display = '';
  document.getElementById('modal-title').textContent = 'Nota y orden de retirada';
  document.getElementById('modal-text').style.display = 'none';

/* ---------------- CALENDARIO ---------------- */
function cargarCalendario() {
  document.getElementById('selected-pill').textContent = formatearFechaCorta(ESTADO.fecha);
  google.script.run
    .withSuccessHandler(function (dias) {
      renderCalendario(dias);
    })
    .withFailureHandler(mostrarErrorServidor)
    .getMesCalendario(ESTADO.anioMes);
}

function formatearFechaCorta(fecha) {
  const d = new Date(fecha + 'T12:00:00');
  return d.getDate() + ' ' + MESES_ES[d.getMonth()].slice(0, 3) + '.';
}

function cambiarMes(delta) {
  const partes = ESTADO.anioMes.split('-').map(Number);
  let anio = partes[0], mes = partes[1] - 1 + delta;
  anio += Math.floor(mes / 12);
  mes = ((mes % 12) + 12) % 12;
  ESTADO.anioMes = anio + '-' + pad2(mes + 1);
  cargarCalendario();
}

function renderCalendario(dias) {
  const body = document.getElementById('calendar-body');
  const partes = ESTADO.anioMes.split('-').map(Number);
  const anio = partes[0], mes = partes[1]; // 1-12
  const primerDiaSemana = new Date(anio, mes - 1, 1).getDay(); // 0=domingo
  // Queremos la semana empezando en lunes:
  const offset = (primerDiaSemana + 6) % 7;

  let celdas = '';
  for (let i = 0; i < offset; i++) celdas += '<div class="cal-day vacio"></div>';

  dias.forEach(function (info) {
    const clases = ['cal-day'];
    if (!info.dia) clases.push('sin-conteo'); else clases.push('estado-' + info.estado);
    if (info.esHoy) clases.push('hoy');
    if (info.fecha === ESTADO.fecha) clases.push('seleccionado');
    if (info.bloqueada) clases.push('bloqueada-futuro');

    let dots = '';
    if (info.tieneNotas) dots += '<span class="dot dot-nota"></span>';
    if (info.tieneCierres) dots += '<span class="dot dot-cierre"></span>';

    const diaNum = Number(info.fecha.slice(8, 10));
    const atrBloqueo = info.bloqueada ? ' disabled title="Todavía no disponible: solo se puede abrir hoy y mañana"' : (info.soloLectura ? ' title="Solo lectura: han pasado más de 2 días"' : '');
    celdas += '<button type="button" class="' + clases.join(' ') + '" data-fecha="' + info.fecha + '"' + atrBloqueo + '>' +
      '<span>' + diaNum + '</span>' +
      '<span class="dots">' + dots + '</span>' +
      '</button>';
  });

  const mesLabel = MESES_ES[mes - 1] + ' de ' + anio;

  body.innerHTML =
    '<div class="calendar-nav">' +
      '<button type="button" id="cal-prev" aria-label="Mes anterior"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>' +
      '<div class="mes-label">' + mesLabel + '</div>' +
      '<button type="button" id="cal-next" aria-label="Mes siguiente"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>' +
    '</div>' +
    '<div class="calendar-weekdays">' + ['L','M','X','J','V','S','D'].map(function (d) { return '<div>' + d + '</div>'; }).join('') + '</div>' +
    '<div class="calendar-grid">' + celdas + '</div>' +
    '<div class="calendar-leyenda">' +
      '<span><span class="sw" style="background:#eef0f3"></span>Pendiente</span>' +
      '<span><span class="sw" style="background:var(--amber)"></span>Parcial</span>' +
      '<span><span class="sw" style="background:var(--ok)"></span>Enviado</span>' +
      '<span><span class="dot dot-nota" style="width:8px;height:8px;"></span>Con notas</span>' +
      '<span><span class="dot dot-cierre" style="width:8px;height:8px;"></span>Con cierres</span>' +
    '</div>';

  document.getElementById('cal-prev').onclick = function () { cambiarMes(-1); };
  document.getElementById('cal-next').onclick = function () { cambiarMes(1); };
  body.querySelectorAll('.cal-day[data-fecha]').forEach(function (btn) {
    if (btn.disabled) return;
    btn.onclick = function () { seleccionarFecha(btn.getAttribute('data-fecha')); };
  });
}

function seleccionarFecha(fecha) {
  ESTADO.fecha = fecha;
  ESTADO.anioMes = anioMesDe(fecha);
  ESTADO.colapsadas = new Set();
  cargarCalendario();
  cargarConteoDia();
}

function renderContenidoDia(data) {
  const cont = document.getElementById('dia-contenido');
  const wrap = document.createElement('div');

  const topbarFecha = document.getElementById('topbar-fecha');
  if (topbarFecha) topbarFecha.textContent = formatearFechaLarga(data.fecha);

  if (data.bloqueada) {
    const msg = document.createElement('div');
    msg.className = 'sin-conteo-msg';
    msg.textContent = 'Esta fecha todavía no está disponible: solo se puede consultar/editar el conteo de hoy y de mañana.';
    wrap.appendChild(msg);
    cont.innerHTML = '';
    cont.appendChild(wrap);
    document.getElementById('resumen-body').innerHTML = '<div class="resumen-vacio">Fecha no disponible todavía.</div>';
    const menuRapido = document.getElementById('menu-rapido-body');
    if (menuRapido) menuRapido.innerHTML = '<div class="menu-rapido-vacio">Fecha no disponible todavía.</div>';
    return;
  }

  if (!data.dia) {
    const msg = document.createElement('div');
    msg.className = 'sin-conteo-msg';
    msg.textContent = 'Este día de la semana no tiene hoja de conteo. Puedes añadir una nota si necesitas dejar constancia de algo.';
    wrap.appendChild(msg);
  } else if (!data.secciones.length) {
    const msg = document.createElement('div');
    msg.className = 'sin-conteo-msg';
    msg.textContent = 'Esta hoja ("' + data.dia + '") todavía no tiene ninguna ruta configurada.';
    wrap.appendChild(msg);
  } else {
    // Datos antiguos sin cerrar (se mandó previsión pero nunca el
    // definitivo, y ha llegado otra semana): el backend ya los ha vaciado
    // solo con leer el conteo (ver getConteoDia/limpiarDatosAntiguosSiProcede_
    // en el backend); aquí solo se avisa de que ha pasado, para que no
    // parezca que el conteo aparece "vacío" de la nada sin explicación.
    const avisos = data.secciones
      .filter(function (s) { return s.datosAntiguosLimpiados; })
      .map(function (s) { return { titulo: parsearNombreAgrupacion(s.nombre).titulo, fecha: s.datosAntiguosLimpiados }; });
    if (avisos.length) {
      const aviso = document.createElement('div');
      aviso.className = 'aviso-datos-antiguos';
      aviso.innerHTML =
        '<strong>Aviso:</strong> se han vaciado datos sin cerrar de una fecha anterior (nunca se envió el definitivo) en: ' +
        avisos.map(function (a) { return escapeHtml(a.titulo) + ' (' + escapeHtml(a.fecha) + ')'; }).join(', ') + '.';
      wrap.appendChild(aviso);
    }

    data.secciones.forEach(function (seccion) {
      wrap.appendChild(crearSeccionPanel(seccion, data.dia, data.fecha, data.esHoy));
    });
  }

  cont.innerHTML = '';
  cont.appendChild(wrap);

  document.getElementById('btn-nota-dia').onclick = function () {
    appPrompt('Nota del día', 'Escribe una observación general para este día…', function (texto) {
      guardarObservacionYRecargar({ fecha: ESTADO.fecha, dia: data.dia || '', agrupacion: '', tienda: '', tipo: 'nota', texto: texto });
    });
  };

  renderResumenDia(data);
  renderMenuRapido(data);
}

/**
 * Lista de acceso rápido (sidebar izquierdo, debajo de la leyenda) con todas
 * las agrupaciones del día. Al pulsar una, se hace scroll y se expande esa
 * sección en el contenido principal (reutiliza irASeccion, la misma función
 * que usa el resumen del día).
 */
function renderMenuRapido(data) {
  const body = document.getElementById('menu-rapido-body');
  if (!body) return;

  const secciones = data.secciones || [];
  if (!secciones.length) {
    body.innerHTML = '<div class="menu-rapido-vacio">Sin agrupaciones para este día.</div>';
    return;
  }

  body.innerHTML = '';
  secciones.forEach(function (seccion) {
    const titulo = parsearNombreAgrupacion(seccion.nombre).titulo;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'menu-rapido-item estado-' + seccion.estado;
    btn.innerHTML =
      '<span class="dot"></span>' +
      '<span class="titulo">' + escapeHtml(titulo) + '</span>' +
      '<span class="count">' + seccion.tiendas.length + '</span>';
    btn.onclick = function () { irASeccion(seccion.nombre); };
    body.appendChild(btn);
  });
}
