  #login-screen::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; opacity: .5;
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 26px);
  }
  .login-card {
    position: relative; background: var(--panel); border-radius: 16px; padding: 38px 32px 32px;
    width: 100%; max-width: 360px; box-shadow: 0 25px 60px rgba(0,0,0,.4);
  }
  .login-logo {
    width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 18px;
    background: linear-gradient(150deg, var(--navy) 0%, var(--navy-soft) 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 18px rgba(28,43,69,.35);
  }
  .login-logo svg { width: 26px; height: 26px; }
  .login-card h1 {
    font-size: 20px; margin: 0 0 4px; letter-spacing: .2px; text-align: center;
  }
  .login-card p.sub { color: var(--ink-soft); font-size: 13px; margin: 0 0 26px; text-align: center; }
  .campo-pass { position: relative; margin-bottom: 14px; }
  .campo-pass svg.icon-lock {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--ink-soft); pointer-events: none;
  }
  .login-card input {
    width: 100%; padding: 12px 42px; border: 1px solid var(--line); border-radius: 9px;
    font-size: 15px;
  }
  .login-card input:focus { outline: none; border-color: var(--navy-soft); box-shadow: 0 0 0 3px rgba(44,62,94,.12); }
  .toggle-pass {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; padding: 7px; color: var(--ink-soft); display: flex;
  }
  .toggle-pass:hover { color: var(--ink); }
  .toggle-pass svg { width: 17px; height: 17px; }
  .btn-primary {
    width: 100%; padding: 13px 14px; border: none; border-radius: 9px; margin-top: 4px;
    background: var(--navy); color: #fff; font-size: 15px; font-weight: 600;
    transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:hover { background: var(--navy-soft); }
  .btn-primary:disabled { opacity: .75; cursor: default; }
  .spinner {
    width: 15px; height: 15px; border-radius: 50%; border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff; animation: girar .7s linear infinite; display: none;
  }
  @keyframes girar { to { transform: rotate(360deg); } }
  #login-error {
    color: var(--danger); font-size: 13px; margin-top: 14px; text-align: center; display: none;
    background: #fceded; border-radius: 7px; padding: 8px 10px;
  }
  .login-footer {
    text-align: center; font-size: 11.5px; color: var(--ink-soft); margin-top: 20px; opacity: .8;
  }

  #app { display: none; min-height: 100vh; flex-direction: column; }
  header.topbar {
    background: var(--navy); color: #fff; padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 20;
  }
  header.topbar .brand { font-size: 15px; font-weight: 700; letter-spacing: .3px; flex: 0 0 auto; }
  header.topbar .brand span { color: var(--amber); }
  header.topbar .topbar-fecha {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    text-align: center; font-size: 19px; font-weight: 800;
    text-transform: capitalize; letter-spacing: .2px; padding: 0 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: min(60vw, 460px);
    pointer-events: none;
  }
  header.topbar .btn-hoy {
    background: rgba(255,255,255,.12); border: none; color: #fff; border-radius: 20px;
    padding: 7px 14px; font-size: 12.5px; font-weight: 600; flex: 0 0 auto;
  }
  header.topbar .btn-hoy:hover { background: rgba(255,255,255,.22); }
  .topbar-derecha { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; margin-left: auto; }
  .topbar-usuario {
    display: flex; align-items: center; gap: 8px; padding-left: 10px;
    border-left: 1px solid rgba(255,255,255,.18);
  }
  .topbar-usuario-rol {
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,.8);
    text-transform: capitalize; white-space: nowrap;
  }
  .btn-salir {
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.28); color: #fff;
    border-radius: 20px; padding: 6px 13px; font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .btn-salir:hover { background: rgba(255,255,255,.2); }
  @media (max-width: 700px) {
    .topbar-usuario-rol { display: none; }
    .topbar-usuario { border-left: none; padding-left: 0; }
  }

  /* ---------- NAVEGACIÓN PRINCIPAL (cabecera) ----------
   * Tres secciones de la app, siempre en el mismo sitio junto al logo
   * (a la izquierda, fuera del flujo que centra la fecha): Inicio
   * (página principal / avisos), Conteos (los cuadrantes de siempre) y
   * Configuración (resumen + gestión de cierres/observaciones, antes
   * llamado "Administración").
   */
  .topbar-nav { display: flex; align-items: center; gap: 2px; flex: 0 0 auto; position: relative; z-index: 1; }
  .topbar-nav-item {
    background: none; border: none; color: rgba(255,255,255,.72); border-radius: 20px;
    padding: 7px 14px; font-size: 12.5px; font-weight: 600; letter-spacing: .1px; white-space: nowrap;
  }
  .topbar-nav-item:hover { background: rgba(255,255,255,.12); color: #fff; }
  .topbar-nav-item.activa { background: rgba(255,255,255,.2); color: #fff; }

  @media (max-width: 900px) {
    .topbar-nav-item { padding: 7px 10px; font-size: 11.5px; }
  }

  /* ---------- DESPLEGABLE DE CABECERA (p.ej. Configuración) ----------
   * Botones de la cabecera que en vez de navegar directamente despliegan
   * una lista de "subpáginas" justo debajo, como un menú; solo al elegir
   * una entrada de la lista se navega a esa sección. */
  .topbar-nav-dropdown { position: relative; }
  .topbar-nav-item-dropdown { display: inline-flex; align-items: center; gap: 5px; }
  .topbar-nav-item-dropdown .chevron { width: 12px; height: 12px; flex-shrink: 0; transition: transform .15s ease; }
  .topbar-nav-dropdown.abierto .topbar-nav-item-dropdown .chevron { transform: rotate(180deg); }
  .topbar-dropdown-menu {
    display: none; flex-direction: column; gap: 2px;
    position: absolute; top: calc(100% + 8px); left: 0; min-width: 200px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 14px 30px rgba(20,30,55,.2); padding: 6px; z-index: 50;
  }
  .topbar-nav-dropdown.abierto .topbar-dropdown-menu { display: flex; }
  .topbar-dropdown-item {
    text-align: left; background: none; border: none; border-radius: 8px; padding: 9px 12px;
    font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap;
  }
  .topbar-dropdown-item:hover { background: #f0f2f6; }
  .topbar-dropdown-item.activa { background: var(--navy); color: #fff; }
  .topbar-dropdown-item.bloqueada,
  .topbar-dropdown-item.bloqueada:hover {
    background: none; color: #c2c7d0; cursor: not-allowed;
  }

  @media (max-width: 700px) {
    header.topbar .topbar-fecha { font-size: 14px; }
  }

  /* ---------- VISTAS "INICIO" Y "CONFIGURACIÓN" ---------- */
  .vista-wrap { display: flex; flex-direction: column; gap: 18px; max-width: 760px; }
  .inicio-hero {
    position: relative; width: 100%; flex: 1;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,.05), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(217,140,43,.14), transparent 45%),
      linear-gradient(160deg, rgba(21,33,54,.78) 0%, rgba(16,26,44,.9) 100%),
      url('https://images.pexels.com/photos/4487382/pexels-photo-4487382.jpeg?auto=compress&cs=tinysrgb&w=1920') center 30%/cover no-repeat;
    background-color: var(--navy);
  }
  main.main-sin-padding { padding: 0; display: flex; flex-direction: column; }
  .vista-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 22px;
  }
  .vista-card h2 { margin: 0 0 8px; font-size: 18px; color: var(--navy); }
  .vista-card p { margin: 0 0 4px; font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; }
  .vista-card + .vista-card { margin-top: 0; }
  .vista-card-header {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .vista-card-header h2 { margin: 0; flex: 1 1 auto; min-width: 0; }
  .vista-card-header .btn-anadir-obs { flex-shrink: 0; }
  .vista-card-header-acciones { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .btn-festivos-filtro {
    position: relative; width: 34px; height: 34px; border-radius: 8px; border: none;
    background: #eef1f7; color: var(--navy); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-festivos-filtro:hover { background: #e1e5eb; }
  .btn-festivos-filtro.abierto { background: var(--navy); color: #fff; }
  .btn-festivos-filtro .badge-punto {
    position: absolute; top: -2px; right: -2px; width: 9px; height: 9px; border-radius: 50%;
    background: var(--amber-dark); border: 2px solid var(--panel);
  }

  /* ---------- CONFIGURACIÓN: submenú + secciones ---------- */
  .config-shell { display: flex; align-items: flex-start; gap: 22px; max-width: none; }
  .config-submenu {
    flex: 0 0 220px; display: flex; flex-direction: column; gap: 3px;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 8px;
  }
  .config-submenu-item {
    text-align: left; background: none; border: none; border-radius: 8px; padding: 10px 12px;
    font-size: 13.5px; font-weight: 600; color: var(--ink);
  }
  .config-submenu-item:hover { background: #f0f2f6; }
  .config-submenu-item.activa { background: var(--navy); color: #fff; }
  .config-contenido { flex: 1 1 auto; min-width: 0; }

  @media (max-width: 700px) {
    .config-shell { flex-direction: column; }
    .config-submenu { flex-direction: row; overflow-x: auto; width: 100%; flex: 0 0 auto; }
  }

  /* ---------- GESTIÓN FESTIVOS (resumen de notas y cierres) ---------- */
  .festivos-stats { display: flex; gap: 8px; margin: 14px 0 4px; flex-wrap: wrap; }
  .festivos-stat {
    display: flex; align-items: center; gap: 8px; background: #f6f7fa; border: 1px solid var(--line);
    border-radius: 9px; padding: 7px 12px; flex: 1 1 120px; min-width: 100px;
  }
  .festivos-stat .icono {
    width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; background: #e4e8f0; color: var(--navy);
  }
  .festivos-stat.cierre .icono { background: #fbe2e2; color: #8a3a3a; }
  .festivos-stat.nota .icono { background: #fbe9c9; color: #7a5417; }
  .festivos-stat .txt { display: flex; flex-direction: column; line-height: 1.1; }
  .festivos-stat .valor { font-size: 15px; font-weight: 800; color: var(--ink); }
  .festivos-stat .etiqueta { font-size: 10px; color: var(--ink-soft); font-weight: 600; }

  .festivos-toolbar { display: flex; align-items: center; gap: 10px; margin: 14px 0 10px; flex-wrap: wrap; }
  .festivos-toolbar .rango-label { font-weight: 700; font-size: 13px; flex: 1 1 auto; text-transform: capitalize; }
  .festivos-toolbar button.nav {
    background: #eef1f7; border: 1px solid #dde3ee; color: var(--navy); border-radius: 8px;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .festivos-toolbar button.nav:hover { background: #e1e5eb; }
  .festivos-toolbar button.nav:disabled { opacity: .4; cursor: not-allowed; }
  .festivos-toolbar .btn-hoy-festivos {
    background: #eef1f7; border: 1px solid #dde3ee; color: var(--navy); border-radius: 20px;
    padding: 5px 12px; font-size: 11.5px; font-weight: 700; flex-shrink: 0;
  }
  .festivos-toolbar .btn-hoy-festivos:hover { background: #e1e5eb; }
  .festivos-toolbar .btn-hoy-festivos:disabled { opacity: .4; cursor: not-allowed; }

  /* ---- Panel de filtros: búsqueda, tipo (segmentado) y rango de fechas ----
     Se abre/cierra con una animación suave (grid-template-rows 0fr -> 1fr)
     en vez de un simple display:none/flex, que quedaba como una tira brusca
     y sin transición. Dentro, dos filas bien separadas en vez de todo
     apelotonado y envuelto en una sola línea. */
  .festivos-filtros {
    display: grid; grid-template-rows: 0fr; transition: grid-template-rows .22s ease;
  }
  .festivos-filtros.abierta { grid-template-rows: 1fr; margin-bottom: 14px; }
  .festivos-filtros-inner { overflow: hidden; min-height: 0; }
  .festivos-filtros-contenido {
    display: flex; flex-direction: column; gap: 10px;
    background: #f6f7fa; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px;
  }
  .festivos-filtros-fila { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .festivos-filtro-busqueda {
    display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 10px; flex: 1 1 auto; min-width: 150px; color: var(--ink-soft);
  }
  .festivos-filtro-busqueda input {
    border: none; outline: none; font-size: 12.5px; flex: 1 1 auto; min-width: 0; color: var(--ink); background: none;
  }
  .festivos-filtro-tipo { display: flex; background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 2px; flex-shrink: 0; }
  .festivos-filtro-tipo button {
    background: none; border: none; border-radius: 6px; padding: 5px 10px; font-size: 11.5px; font-weight: 600;
    color: var(--ink-soft); white-space: nowrap;
  }
  .festivos-filtro-tipo button.activo { background: var(--navy); color: #fff; }
  .festivos-filtro-fechas {
    display: flex; align-items: center; gap: 5px; background: #fff; border: 1px solid var(--line);
    border-radius: 8px; padding: 5px 9px; flex-shrink: 0; color: var(--ink-soft); font-size: 11px;
  }
  .festivos-filtro-fechas input[type="date"] {
    border: none; outline: none; font-size: 12px; color: var(--ink); background: none; max-width: 118px;
  }
  .festivos-filtro-limpiar {
    display: flex; align-items: center; gap: 5px; background: none; border: none; color: var(--ink-soft);
    font-size: 11.5px; font-weight: 600; padding: 6px 8px; border-radius: 7px; flex-shrink: 0; margin-left: auto;
  }
  .festivos-filtro-limpiar:hover { color: var(--danger); background: #fff; }

  .festivos-grupo {
    display: flex; gap: 10px; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px; margin-bottom: 7px; background: var(--panel);
    transition: border-color .15s;
  }
  .festivos-grupo.es-hoy { border-color: var(--amber); background: #fffaf1; }
  .festivos-grupo.vacio { opacity: .72; }
  .festivos-grupo.vacio .festivos-fecha-badge { background: #c7cdd6; }
  .festivos-item-vacio { font-size: 12px; color: var(--ink-soft); font-style: italic; padding: 5px 7px; }

  /* ---- Vista semanal en columnas (Lunes -> Domingo en horizontal, y el
     contenido de cada día apilado hacia abajo dentro de su columna) ---- */
  .festivos-semana { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; align-items: stretch; }
  .festivos-dia-col {
    flex: 1 1 0; min-width: 152px; min-height: 580px; display: flex; flex-direction: column;
    border: 1px solid var(--line); border-radius: 10px; background: var(--panel); overflow: hidden;
  }
  .festivos-dia-col.es-hoy { border-color: var(--amber); }
  .festivos-dia-col.vacio { opacity: .72; }
  .festivos-dia-col-header {
    padding: 10px 8px; border-bottom: 1px solid var(--line); text-align: center; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .festivos-dia-col.es-hoy .festivos-dia-col-header { background: #fffaf1; border-color: var(--amber); }
  .festivos-dia-col-badge {
    width: 40px; height: 40px; border-radius: 9px; background: var(--navy); color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1;
  }
  .festivos-dia-col-badge .dia { font-size: 15px; font-weight: 800; }
  .festivos-dia-col-badge .mes { font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; margin-top: 2px; opacity: .85; }
  .festivos-dia-col.es-hoy .festivos-dia-col-badge { background: var(--amber-dark); }
  .festivos-dia-col-nombre { font-weight: 800; font-size: 12px; color: var(--navy); text-transform: capitalize; display: flex; align-items: center; gap: 6px; }
  .festivos-dia-col-items { padding: 8px; display: flex; flex-direction: column; gap: 5px; flex: 1 1 auto; }
  @media (max-width: 900px) { .festivos-dia-col { min-width: 130px; } }
  .festivos-fecha-badge {
    flex-shrink: 0; width: 42px; height: 42px; border-radius: 9px; background: var(--navy);
    color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
    line-height: 1;
  }
  .festivos-grupo.es-hoy .festivos-fecha-badge { background: var(--amber-dark); }
  .festivos-fecha-badge .dia { font-size: 15px; font-weight: 800; }
  .festivos-fecha-badge .mes { font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; margin-top: 2px; opacity: .85; }
  .festivos-grupo-contenido { flex: 1 1 auto; min-width: 0; }
  .festivos-grupo-fecha {
    display: flex; align-items: center; gap: 7px; font-weight: 800; font-size: 12px; color: var(--navy);
    margin-bottom: 5px; text-transform: capitalize;
  }
  .festivos-chip-hoy {
    background: var(--amber-dark); color: #fff; font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .03em; border-radius: 20px; padding: 1px 8px; flex-shrink: 0;
  }
  .festivos-items { display: flex; flex-direction: column; gap: 3px; }
  .festivos-item {
    display: flex; align-items: flex-start; gap: 8px; padding: 5px 7px; border-radius: 7px;
    background: #f6f7fa; font-size: 12px;
  }
  .festivos-item.cierre { background: #fceded; }
  .festivos-item-icon {
    width: 19px; height: 19px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; background: #e4e8f0; color: var(--navy);
  }
  .festivos-item.cierre .festivos-item-icon { background: #f4d4d4; color: #8a3a3a; }
  .festivos-item-body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 0; }
  .festivos-item-tag {
    font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
    color: var(--ink-soft);
  }
  .festivos-item.cierre .festivos-item-tag { color: #8a3a3a; }
  .festivos-item-texto { color: var(--ink); line-height: 1.3; }
  .festivos-item.cierre .festivos-item-texto { color: #8a3a3a; }
  .festivos-del {
    background: none; border: none; color: var(--ink-soft); flex-shrink: 0; padding: 2px; margin-top: 1px;
    border-radius: 5px;
  }
  .festivos-del:hover { color: var(--danger); background: #fff; }
  .festivos-vacio {
    color: var(--ink-soft); font-size: 13px; text-align: center; padding: 36px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .festivos-vacio svg { color: #c7cdd6; }

  /* Cabecera fija de "Gestión festivos" (título, botones, stats y toolbar de
     mes) + panel de filtros: no se mueven; la que se desplaza en su propia
     caja con scroll interno es solo #festivos-lista (igual que en "Emails
     agencias", para que no haga scroll toda la página). */
  .festivos-fijo { margin-bottom: 12px; }
  #festivos-lista {
    overflow-y: auto; min-height: 160px;
    padding-right: 6px; margin-right: -6px;
  }

  @media (max-width: 700px) {
    .festivos-filtros-fila { flex-direction: column; align-items: stretch; }
    .festivos-filtro-busqueda { flex: 0 0 auto; }
    .festivos-filtro-tipo { justify-content: space-between; }
    .festivos-filtro-tipo button { flex: 1 1 auto; text-align: center; }
    .festivos-filtro-fechas { justify-content: space-between; }
    .festivos-filtro-fechas input[type="date"] { max-width: none; flex: 1 1 auto; }
  }

  /* ---------- CONFIGURACIÓN: "Emails agencias" ---------- */
  .emails-config-toolbar { display: flex; align-items: center; gap: 10px; margin: 14px 0 12px; flex-wrap: wrap; }
  .emails-config-busqueda {
    display: flex; align-items: center; gap: 6px; background: #f6f7fa; border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 11px; flex: 1 1 220px; min-width: 160px; color: var(--ink-soft);
  }
  .emails-config-busqueda input {
    border: none; outline: none; font-size: 12.5px; flex: 1 1 auto; min-width: 0; color: var(--ink); background: none;
  }
  .btn-sincronizar-agrupaciones {
    display: none; align-items: center; gap: 6px; background: #eef1f7; border: 1px solid #dde3ee; color: var(--navy);
    border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
  }
  body.es-admin .btn-sincronizar-agrupaciones { display: flex !important; }
  .btn-sincronizar-agrupaciones:hover { background: #e1e5eb; }
  .btn-sincronizar-agrupaciones.girando svg { animation: girar-sinc 0.8s linear infinite; }
  @keyframes girar-sinc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .emails-config-lista { display: flex; flex-direction: column; gap: 8px; }
  .emails-config-item {
    border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; background: var(--panel);
  }
  .emails-config-item.nueva { border-color: #e8c675; background: #fffaf1; }
  .emails-config-item.sinuso { border-color: #e3b2b2; background: #fdf5f5; }
  .emails-config-cabecera { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .emails-config-nombre { font-weight: 700; font-size: 13.5px; color: var(--navy); flex: 1 1 auto; min-width: 0; }
  .emails-config-badge {
    font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
    border-radius: 20px; padding: 2px 9px; flex-shrink: 0;
  }
  .emails-config-badge.nueva { background: #f5deA0; color: #7a5417; }
  .emails-config-badge.sinuso { background: #f4d4d4; color: #8a3a3a; }
  .emails-config-borrar {
    display: none; background: none; border: none; color: var(--ink-soft); flex-shrink: 0; padding: 3px;
    border-radius: 5px;
  }
  body.es-admin .emails-config-borrar { display: inline-flex !important; }
  .emails-config-borrar:hover { color: var(--danger); background: #fff; }
  .emails-config-campos { display: flex; flex-direction: column; gap: 8px; }
  .emails-config-campo label {
    display: block; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
    color: var(--ink-soft); margin-bottom: 3px;
  }
  .emails-config-campo input {
    width: 100%; border: 1px solid var(--line); border-radius: 7px; padding: 7px 10px;
    font-size: 13px; color: var(--ink); background: #f9fafb;
  }
  .emails-config-campo input:disabled { color: var(--ink-soft); cursor: default; }
  body.es-admin .emails-config-campo input { background: #fff; }
  body.es-admin .emails-config-campo input:disabled { background: #f9fafb; }
  .emails-config-pie { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .emails-config-guardar {
    display: none; align-items: center; gap: 5px; background: var(--navy); color: #fff; border: none;
    border-radius: 7px; padding: 6px 13px; font-size: 12px; font-weight: 700;
  }
  body.es-admin .emails-config-guardar { display: flex !important; }
  .emails-config-guardar:hover { background: var(--navy-soft); }
  .emails-config-guardar:disabled { opacity: .55; cursor: default; }
  .emails-config-vacio {
    color: var(--ink-soft); font-size: 13px; text-align: center; padding: 36px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .emails-config-vacio svg { color: #c7cdd6; }
  .emails-config-solo-lectura {
    display: flex; align-items: center; gap: 8px; background: #f6f7fa; border: 1px solid var(--line);
    border-radius: 9px; padding: 9px 12px; font-size: 12px; color: var(--ink-soft); margin-bottom: 12px;
  }
  body.es-admin .emails-config-solo-lectura { display: none !important; }
  /* Cabecera fija de "Emails agencias": título, botón sincronizar, descripción
     y buscador no se mueven; el que se desplaza es solo #emails-config-lista,
     en su propia caja con scroll interno (no toda la página). */
  .emails-config-fijo { margin-bottom: 12px; }
  .emails-config-fijo .emails-config-toolbar { margin-bottom: 0; }
  #emails-config-lista {
    overflow-y: auto; min-height: 160px;
    padding-right: 6px; margin-right: -6px;
  }

  /* ---------- CONFIGURACIÓN: "Plantilla conteos" ---------- */
  .plantilla-dias-fila { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin: 4px 0 14px; }
  .plantilla-dias { display: flex; gap: 6px; flex-wrap: wrap; }
  .plantilla-dias button {
    border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 6px 12px;
    font-size: 12.5px; font-weight: 600; color: var(--ink);
  }
  .plantilla-dias button:hover { background: #f0f2f6; }
  .plantilla-dias button.activo { background: var(--navy); color: #fff; border-color: var(--navy); }
  .plantilla-ruta {
    border: 1px solid var(--line); border-radius: 10px; background: var(--panel);
    margin-bottom: 12px; overflow: hidden;
  }
  .plantilla-ruta-header {
    display: flex; align-items: center; gap: 6px; padding: 9px 10px; background: #f7f8fa;
    border-bottom: 1px solid var(--line);
  }
  .plantilla-ruta-header input {
    flex: 1 1 auto; min-width: 0; border: 1px solid transparent; background: none; font-weight: 800;
    color: var(--navy); font-size: 13.5px; border-radius: 6px; padding: 5px 7px;
  }
  .plantilla-ruta-header input:focus { border-color: var(--navy-soft); background: #fff; outline: none; }
  .plantilla-ruta-header input:disabled { color: var(--ink); }
  .plantilla-ruta-borrar, .plantilla-tienda-borrar {
    background: none; border: none; color: var(--ink-soft); border-radius: 6px; padding: 6px; flex-shrink: 0;
  }
  .plantilla-ruta-borrar:hover, .plantilla-tienda-borrar:hover { color: var(--danger); background: #fceded; }
  .plantilla-tienda-guardar {
    background: none; border: none; color: var(--ink-soft); border-radius: 6px; padding: 6px; flex-shrink: 0;
  }
  .plantilla-tienda-guardar:hover { color: var(--navy); background: #eef1f7; }
  .plantilla-tienda-guardar:disabled { opacity: .3; cursor: default; background: none !important; color: var(--ink-soft) !important; }
  .plantilla-tienda.dirty { background: #fdf6ea; }
  .plantilla-tienda.dirty input.lim, .plantilla-tienda.dirty input.nombre { border-color: var(--amber); background: #fff; }
  .plantilla-tienda.dirty .plantilla-tienda-guardar:not(:disabled) { color: var(--amber-dark); }
  .plantilla-ruta-header.dirty { background: #fdf6ea; }
  .plantilla-ruta-header.dirty input { border-color: var(--amber); background: #fff; }
  .plantilla-ruta-header.dirty .plantilla-tienda-guardar:not(:disabled) { color: var(--amber-dark); }
  .plantilla-tiendas { display: flex; flex-direction: column; }
  .plantilla-tienda {
    display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-top: 1px solid var(--line);
  }
  .plantilla-tienda:first-child { border-top: none; }
  .plantilla-tienda input.lim {
    width: 40px; flex-shrink: 0; text-align: center; border: 1px solid var(--line); border-radius: 6px;
    padding: 5px 4px; font-size: 12.5px;
  }
  .plantilla-tienda input.nombre {
    flex: 1 1 auto; min-width: 0; border: 1px solid var(--line); border-radius: 6px; padding: 5px 8px; font-size: 12.5px;
  }
  .plantilla-tienda-flechas { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
  .plantilla-tienda-flechas button {
    width: 18px; height: 13px; border: none; background: #eef1f7; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
  }
  .plantilla-tienda-flechas button:first-child { border-radius: 4px 4px 0 0; }
  .plantilla-tienda-flechas button:last-child { border-radius: 0 0 4px 4px; }
  .plantilla-tienda-flechas button:disabled { opacity: .35; }
  .plantilla-tienda-flechas button:hover:not(:disabled) { background: #e1e5eb; }
  .plantilla-ruta-anadir-tienda {
    flex-shrink: 0; background: none; border: 1px solid var(--line); color: var(--navy); font-weight: 700;
    font-size: 11.5px; display: flex; align-items: center; gap: 4px; padding: 5px 9px; border-radius: 7px;
    white-space: nowrap;
  }
  .plantilla-ruta-anadir-tienda:hover { background: #eef1f7; }
  .plantilla-ruta-peso {
    flex-shrink: 0; background: none; border: 1px solid var(--line); color: var(--ink-soft); font-weight: 700;
    font-size: 11.5px; padding: 5px 9px; border-radius: 7px; white-space: nowrap; letter-spacing: .02em;
  }
  .plantilla-ruta-peso:hover { background: #eef1f7; }
  .plantilla-ruta-peso.activo { background: var(--navy); color: #fff; border-color: var(--navy); }
  .plantilla-ruta-peso.activo:hover { background: var(--navy-soft); }
  .plantilla-tienda-bloqueos { display: flex; gap: 3px; flex-shrink: 0; }
  .plantilla-tienda-bloqueo {
    background: none; border: 1px solid var(--line); color: var(--ink-soft); font-weight: 700;
    font-size: 9.5px; padding: 4px 6px; border-radius: 6px; white-space: nowrap; letter-spacing: .02em;
  }
  .plantilla-tienda-bloqueo:hover:not(:disabled) { background: #eef1f7; }
  .plantilla-tienda-bloqueo:disabled { opacity: .35; cursor: default; }
  .plantilla-tienda-bloqueo.activo { background: var(--danger); color: #fff; border-color: var(--danger); }
  .plantilla-tienda-bloqueo.activo:hover:not(:disabled) { background: #b23f3f; }
  .modal-campo { margin-bottom: 14px; }
  .modal-campo:last-child { margin-bottom: 0; }
  .modal-campo label { display: block; font-size: 12.5px; font-weight: 700; color: var(--ink-soft); margin-bottom: 5px; }
  .modal-campo input {
    width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; font-size: 13.5px;
    box-sizing: border-box; color: var(--ink);
  }
  .modal-campo input:focus { border-color: var(--navy-soft); outline: none; }
  .modal-dia-aviso {
    background: #eef1f7; color: var(--ink); border-radius: 8px; padding: 8px 10px;
    font-size: 12.5px; margin-bottom: 14px;
  }
  .modal-dia-aviso strong { color: var(--navy); }
  .plantilla-anadir-ruta { flex-shrink: 0; }
  .plantilla-tienda-nota {
    background: none; border: none; color: var(--ink-soft); border-radius: 6px; padding: 6px; flex-shrink: 0;
  }
  .plantilla-tienda-nota:hover:not(:disabled) { background: #eef1f7; color: var(--navy); }
  .plantilla-tienda-nota:disabled { opacity: .35; cursor: default; }
  .plantilla-tienda-nota.con-dato { color: var(--amber-dark); }
  .plantilla-notascarga {
    padding: 6px 10px; border-top: 1px dashed var(--line); border-bottom: 1px solid var(--line); background: #fbfbfc;
  }
  .plantilla-notacarga-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
  .plantilla-notacarga-item input {
    flex: 1 1 auto; min-width: 0; border: 1px solid var(--line); border-radius: 6px; padding: 5px 8px; font-size: 12.5px;
    font-style: italic; color: var(--ink-soft);
  }
  .plantilla-notacarga-item.dirty input { border-color: var(--amber); background: #fff; }
  .plantilla-notacarga-item.dirty .plantilla-tienda-guardar:not(:disabled) { color: var(--amber-dark); }
  .plantilla-anadir-notacarga {
    background: none; border: none; color: var(--navy); font-weight: 700; font-size: 11.5px;
    display: flex; align-items: center; gap: 4px; padding: 5px 4px;
  }
  .plantilla-anadir-notacarga:hover { background: #eef1f7; border-radius: 6px; }

  main { flex: 1; padding: 24px 20px; max-width: none; width: 100%; }

  /* Tres columnas: calendario pegado a la izquierda | contenido | resumen pegado a la derecha.
     El grid ocupa TODO el ancho disponible (main ya no tiene max-width centrado),
     así que las columnas laterales de ancho fijo quedan ancladas a los bordes
     de la pantalla mientras la columna central (1fr) se reparte el resto. */
  .layout-grid { display: grid; grid-template-columns: 320px minmax(0, 1fr) 380px; gap: 28px; align-items: start; }
  .col-contenido { min-width: 0; }
  /* El contenido en sí se limita a un ancho legible y se centra dentro de su
     columna, para que no quede estirado de pared a pared en pantallas anchas. */
  .col-contenido > * { max-width: 1120px; margin: 0 auto; }
  .col-sidebar { position: sticky; top: 78px; display: flex; flex-direction: column; gap: 16px; }

  @media (max-width: 1600px) {
    .layout-grid { grid-template-columns: 300px minmax(0, 1fr) 340px; gap: 24px; }
  }

  @media (max-width: 1400px) {
    .layout-grid { grid-template-columns: 280px minmax(0, 1fr) 300px; gap: 22px; }
  }

  @media (max-width: 1240px) {
    .layout-grid { grid-template-columns: 250px minmax(0, 1fr) 270px; }
    .col-contenido > * { max-width: none; }
  }

  @media (max-width: 980px) {
    main { padding: 16px; }
    .layout-grid { grid-template-columns: 1fr; }
    .col-sidebar { position: static; }
    .col-calendario { order: -2; }
    .col-contenido { order: -1; }
    .col-resumen { order: 0; }
  }

  /* ---------- CALENDARIO ---------- */
  .calendar-panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px;
  }
  .calendar-panel-header {
    display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    user-select: none;
  }
  .calendar-panel-header .titulo {
    font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px;
  }
  .calendar-panel-header .selected-pill {
    font-size: 12px; font-weight: 600; color: var(--navy); background: #eef1f7;
    border-radius: 20px; padding: 4px 10px;
  }
  .calendar-panel-header .chevron { transition: transform .15s; color: var(--ink-soft); }
  .calendar-panel.colapsado .chevron { transform: rotate(-90deg); }
  .calendar-panel.colapsado .calendar-body { display: none; }
  .calendar-body { margin-top: 14px; }

  .calendar-nav {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  }
  .calendar-nav .mes-label { font-weight: 700; font-size: 14px; text-transform: capitalize; }
  .calendar-nav button {
    background: #eef1f5; border: none; border-radius: 7px; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center; color: var(--navy);
  }
  .calendar-nav button:hover { background: #e1e5eb; }

  .calendar-weekdays, .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .calendar-weekdays div {
    text-align: center; font-size: 10.5px; font-weight: 700; color: var(--ink-soft);
    text-transform: uppercase; padding: 4px 0;
  }
  .cal-day {
    position: relative; aspect-ratio: 1; border-radius: 8px; border: 1.5px solid transparent;
    background: #f7f8fa; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 12.5px; font-weight: 600; color: var(--ink);
  }
  .cal-day:hover { border-color: var(--navy-soft); }
  .cal-day.vacio { background: transparent; visibility: hidden; }
  .cal-day.sin-conteo { color: var(--ink-soft); background: #f0f1f3; }
  .cal-day.estado-pendiente { background: #eef0f3; }
  .cal-day.estado-parcial { background: #fdf1de; color: var(--amber-dark); }
  .cal-day.estado-enviado { background: #e4f3ec; color: var(--ok); }
  .cal-day.hoy { border-color: var(--amber); box-shadow: 0 0 0 2px rgba(217,140,43,.18); }
  .cal-day.seleccionado { border-color: var(--navy); background: var(--navy); color: #fff; }
  .cal-day.seleccionado.estado-parcial,
  .cal-day.seleccionado.estado-enviado { color: #fff; }
  .cal-day .dots { display: flex; gap: 3px; height: 6px; }
  .cal-day .dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-day .dot-nota { background: var(--amber); }
  .cal-day .dot-cierre { background: var(--danger); }
  .cal-day.seleccionado .dot-nota { background: #ffd898; }
  .cal-day.seleccionado .dot-cierre { background: #ff9d9d; }

  .calendar-leyenda {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; font-size: 11px; color: var(--ink-soft);
  }
  .calendar-leyenda span { display: inline-flex; align-items: center; gap: 5px; }
  .calendar-leyenda .sw { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }

  .leyenda-global {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; font-size: 12px; color: var(--ink-soft); display: flex; flex-direction: column; gap: 8px;
  }
  .leyenda-global h4 {
    margin: 0 0 2px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); font-weight: 700;
  }
  .leyenda-global span { display: flex; align-items: flex-start; gap: 7px; line-height: 1.4; }
  .leyenda-global .sw { width: 10px; height: 10px; border-radius: 3px; display: inline-block; flex-shrink: 0; margin-top: 2px; }

  /* ---------- ACCESO RÁPIDO A AGRUPACIONES ---------- */
  .menu-rapido-panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px;
  }
  .menu-rapido-panel h4 {
    margin: 0 0 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); font-weight: 700;
  }
  .menu-rapido-body { display: flex; flex-direction: column; gap: 4px; max-height: 260px; overflow-y: auto; }
  .menu-rapido-vacio { color: var(--ink-soft); font-size: 12.5px; padding: 4px 2px; }
  .menu-rapido-item {
    display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 7px;
    font-size: 12.5px; color: var(--ink); cursor: pointer; border: 1px solid transparent;
    background: none; text-align: left; width: 100%;
  }
  .menu-rapido-item:hover { background: #fafbfd; border-color: var(--line); }
  .menu-rapido-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #c7cdd6; }
  .menu-rapido-item.estado-progreso .dot { background: var(--amber); }
  .menu-rapido-item.estado-enviado .dot { background: var(--ok); }
  .menu-rapido-item .titulo { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .menu-rapido-item .count { font-size: 11px; color: var(--ink-soft); flex-shrink: 0; }

  /* ---------- RESUMEN RÁPIDO DEL DÍA ---------- */
  .resumen-panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px;
  }
  .resumen-header {
    display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; margin-bottom: 12px;
  }
  .resumen-header svg { color: var(--ink-soft); flex-shrink: 0; }
  .resumen-header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .resumen-count {
    font-size: 11.5px; font-weight: 700; color: #fff; background: var(--amber-dark);
    border-radius: 20px; padding: 2px 9px;
  }
  .btn-anadir-obs {
    background: var(--navy); color: #fff; border: none; border-radius: 7px; padding: 7px 13px;
    font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .btn-anadir-obs:hover { background: var(--navy-soft); }
  .resumen-body { display: flex; flex-direction: column; gap: 12px; max-height: calc(100vh - 220px); overflow-y: auto; }
  .resumen-vacio { color: var(--ink-soft); font-size: 13px; text-align: center; padding: 20px 6px; }
  .resumen-grupo {
    border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .resumen-grupo:hover { border-color: var(--navy-soft); background: #fafbfd; }
  .resumen-grupo-titulo {
    font-weight: 700; font-size: 12.5px; color: var(--navy); margin-bottom: 6px;
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
  }
  .resumen-grupo-titulo .ir {
    font-size: 10.5px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .03em;
    flex-shrink: 0;
  }
  .resumen-item {
    font-size: 12.5px; line-height: 1.4; padding: 6px 8px; border-radius: 6px; margin-top: 4px;
    background: #fdf6ea; color: #7a5417;
  }
  .resumen-item:first-of-type { margin-top: 0; }
  .resumen-item.cierre { background: #fceded; color: #8a3a3a; }
  .resumen-item .tienda { font-weight: 700; }

  .notas-generales { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; margin-top: 4px; }
  .nota-chip {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    background: #fdf6ea; border: 1px solid #f0ddb8; color: #7a5417; border-radius: 8px;
    padding: 9px 12px; font-size: 13px; line-height: 1.4;
  }
  .nota-chip.tipo-cierre { background: #fceded; border-color: #f0c8c8; color: #8a3a3a; }
  .nota-chip .txt { flex: 1; }
  .nota-chip .del {
    background: none; border: none; color: inherit; opacity: .55; padding: 0 2px; font-size: 15px; line-height: 1;
  }
  .nota-chip .del:hover { opacity: 1; }

  .sin-conteo-msg {
    background: var(--panel); border: 1px dashed var(--line); border-radius: var(--radius);
    padding: 30px; text-align: center; color: var(--ink-soft); font-size: 14px;
  }

  .aviso-datos-antiguos {
    background: #fff3cd; border: 1px solid #f0d78c; border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 16px; color: #6b5316; font-size: 13.5px; line-height: 1.5;
  }
  .aviso-datos-antiguos strong { color: #4a3a0f; }

  /* ---------- SECCIÓN / AGRUPACIÓN ---------- */
  .seccion-panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    margin-bottom: 16px; overflow: hidden;
    scroll-margin-top: 78px;
  }
  .seccion-panel.estado-progreso { border-left: 4px solid var(--amber); }
  .seccion-panel.estado-enviado { border-left: 4px solid var(--ok); }
  .seccion-panel.estado-pendiente { border-left: 4px solid #c7cdd6; }

  .seccion-header {
    display: flex; align-items: center; flex-wrap: wrap; row-gap: 6px; gap: 12px; padding: 14px 16px; user-select: none;
  }
  .seccion-header .icono-agrup {
    width: 40px; height: 40px; border-radius: 11px; background: #eef1f5; color: var(--navy);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; font-weight: 700;
  }
  .seccion-header .info { flex: 1; min-width: 0; }
  .seccion-header .name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .seccion-header .name { font-weight: 800; font-size: 16px; line-height: 1.25; letter-spacing: .1px; }
  .seccion-header .count { color: var(--ink-soft); font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .seccion-header .btn-toggle-colapsar {
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    width: 28px; height: 28px; border-radius: 7px; border: none; background: none; cursor: pointer; padding: 0;
  }
  .seccion-header .btn-toggle-colapsar:hover { background: #f0f2f6; }
  .seccion-header .chevron { transition: transform .15s; color: var(--ink-soft); flex-shrink: 0; pointer-events: none; }
  .seccion-panel.colapsada .chevron { transform: rotate(-90deg); }
  .seccion-panel.colapsada .seccion-body { display: none; }
  .seccion-panel.colapsada .seccion-notas,
  .seccion-panel.colapsada .seccion-notas-carga { display: none; }

  .badge-ubicacion {
    display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700;
    color: var(--navy); background: #eef1f7; border: 1px solid #dde3ee;
    border-radius: 20px; padding: 3px 10px 3px 8px; text-transform: none; letter-spacing: 0;
    flex-shrink: 0;
  }
  .badge-ubicacion svg { color: var(--amber-dark); flex-shrink: 0; }

  /* Total de palets de la agrupación, calculado en vivo a partir del TOTAL de cada tienda */
  .badge-total-palets {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px; background: #eef1f7; color: var(--navy);
    white-space: nowrap; flex-shrink: 0;
  }
  .badge-total-palets .total-palets-valor { font-size: 12.5px; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700;
    padding: 4px 9px; border-radius: 20px; white-space: nowrap; text-transform: uppercase; letter-spacing: .03em;
    flex-shrink: 0;
  }
  .badge-pendiente { background: #eef0f3; color: var(--ink-soft); }
  .badge-progreso { background: #fdf1de; color: var(--amber-dark); }
  .badge-enviado { background: #e4f3ec; color: var(--ok); }
  .badge-prevision { background: #e4f3ec; color: var(--ok); }
  .badge-solo-lectura { background: #eef1f5; color: var(--ink-soft); }
  .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  /* Agrupación bloqueada para edición (fecha demasiado antigua, o ya enviada) */
  .seccion-panel.no-editable table.conteo input.celda,
  .seccion-panel.no-editable table.conteo input.celda-total { background: #f6f7f9; color: var(--ink-soft); cursor: not-allowed; }
  .seccion-panel.no-editable .btn-cerrar-tienda,
  .seccion-panel.no-editable .btn-reabrir,
  .seccion-panel.no-editable .celda-no { opacity: .35; cursor: not-allowed; pointer-events: none; }

  /* Días de calendario todavía no disponibles (demasiado en el futuro) */
  .cal-day.bloqueada-futuro { opacity: .35; cursor: not-allowed; }
  .cal-day.bloqueada-futuro:hover { border-color: transparent; }
  .cal-day[disabled] { pointer-events: none; }

  .btn-add-nota {
    background: #eef1f5; border: none; border-radius: 7px; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center; color: var(--navy); flex-shrink: 0;
  }
  .btn-add-nota:hover { background: #e1e5eb; }

  .btn-pdf-seccion {
    background: #eef1f5; border: none; border-radius: 7px; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn-pdf-seccion:hover { background: #e1e5eb; }

  /* Botones "Enviar Previsión" / "Enviar Definitivo" en la cabecera, junto al badge de estado */
  .btn-header-prevision {
    background: #fff; color: var(--amber-dark); border: 1.5px solid var(--amber); border-radius: 20px;
    padding: 6px 14px; font-size: 11.5px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    text-transform: uppercase; letter-spacing: .03em;
  }
  .btn-header-prevision:hover { background: #fdf6ea; }
  .btn-header-prevision:disabled { opacity: .55; cursor: not-allowed; }
  .btn-header-definitivo {
    background: var(--amber); color: #2a1c04; border: none; border-radius: 20px;
    padding: 6px 14px; font-size: 11.5px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    text-transform: uppercase; letter-spacing: .03em;
  }
  .btn-header-definitivo:hover { background: var(--amber-dark); color: #fff; }
  .btn-header-definitivo:disabled { opacity: .55; cursor: not-allowed; }
  .btn-deshacer-envio {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: #fff;
    color: #d9362f;
    border: 1px solid #f1c2be;
    border-radius: 6px;
    cursor: pointer;
    flex: none;
  }
  .btn-deshacer-envio:hover { background: #fdecea; border-color: #d9362f; }
  .btn-deshacer-envio:disabled { opacity: .5; cursor: not-allowed; }

  /* Indicador de sincronización: invisible cuando todo va bien (silencio),
     solo se muestra mientras se está guardando en segundo plano. */
  .sync-indicator {
    display: none; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 600;
    color: var(--ink-soft); flex-shrink: 0;
  }
  .sync-indicator.mostrando { display: inline-flex; }
  .sync-indicator .sync-spinner {
    width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #c7cdd6;
    border-top-color: var(--ink-soft); animation: girar .7s linear infinite;
  }

  .seccion-notas { padding: 0 16px 12px; display: flex; flex-direction: column; gap: 6px; }

  /* Notas/instrucciones de carga que vienen escritas en la propia hoja de
     Excel (ej. "1 CAMIÓN 33 P. + 1 EXTRA 33 P. + RESTOS TODOS LOS LUNES").
     Se muestran en tono azulado para distinguirlas de las observaciones
     manuales (que sí se pueden borrar). Estas son de solo lectura: para
     cambiarlas hay que editar la fila correspondiente en la hoja de cálculo. */
  .seccion-notas-carga { padding: 0 16px 12px; display: flex; flex-direction: column; gap: 6px; }
  .nota-carga-chip {
    display: flex; align-items: flex-start; gap: 8px;
    background: #eef1f7; border: 1px solid #dde3ee; color: var(--navy);
    border-radius: 8px; padding: 9px 12px; font-size: 13px; font-weight: 600; line-height: 1.4;
  }
  .nota-carga-chip svg { flex-shrink: 0; margin-top: 1px; color: var(--amber-dark); }

  .orden-retirada { margin-top: 6px; padding-top: 12px; border-top: 1px dashed var(--line); }
  .orden-retirada-titulo {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft);
    font-weight: 700; margin-bottom: 6px;
  }
  .orden-retirada ol { margin: 0; padding-left: 18px; font-size: 12px; color: var(--ink); line-height: 1.6; }

  /* ---------- TABLA ---------- */
  .table-wrap { overflow-x: auto; }
  table.conteo { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.conteo thead th {
    background: #f7f8fa; text-align: center; padding: 10px 6px; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); font-weight: 700;
    border-bottom: 1px solid var(--line); white-space: nowrap;
  }
  table.conteo thead th.th-nombre { text-align: left; }
  table.conteo thead th.th-total { color: var(--navy); }
  table.conteo td { padding: 8px 6px; border-bottom: 1px solid var(--line); vertical-align: middle; text-align: center; }
  table.conteo tbody tr:last-child td { border-bottom: none; }
  table.conteo tbody tr:nth-child(even) { background: #fafbfc; }
  table.conteo td.nombre { font-weight: 700; text-align: left; font-size: 13px; }
  table.conteo td.nombre .nota-tienda {
    font-weight: 500; font-size: 11px; color: var(--amber-dark); margin-top: 2px;
    background: #fdf3e6; border-radius: 5px; padding: 2px 6px; display: inline-block;
  }
  table.conteo td.nombre .nota-tienda.nota-grupo-aviso { color: var(--amber-dark); background: #fbe6c4; font-weight: 700; }
  table.conteo td.nombre .nota-tienda.nota-grupo-alerta { color: #fff; background: var(--danger); font-weight: 700; }

  /* Filas que comparten un límite de ruta entre varias tiendas (misma celda
     combinada en el Excel): se enmarca el grupo con un borde grueso (barra
     lateral + borde inferior de la última tienda) y, en vez de repetir la
     nota "8P MAX. POR RUTA — x/8" en cada tienda, se muestra UNA vez en una
     fila-cabecera propia justo encima del grupo, con los nombres de las
     tiendas que comparten esa ruta y el contador en vivo. */
  table.conteo tbody tr.fila-grupo-ruta td { border-bottom-color: transparent; position: relative; }
  table.conteo tbody tr.fila-grupo-ruta td.nombre::before {
    content: ''; position: absolute; left: -6px; top: 0; bottom: 0; width: 4px; background: var(--amber);
  }
  table.conteo tbody tr.fila-grupo-ruta.fila-grupo-ultima td { border-bottom: 3px solid var(--amber-dark); }
  table.conteo tbody tr.fila-grupo-ruta.fila-grupo-ultima td.nombre::before { bottom: -3px; border-bottom-left-radius: 3px; border-bottom-right-radius: 3px; }
  table.conteo tbody tr.fila-grupo-ruta.fila-grupo-alerta.fila-grupo-ultima td { border-bottom-color: var(--danger); }

  /* Fila-cabecera del grupo (única, resume la ruta compartida) */
  table.conteo tbody tr.fila-grupo-header td {
    border-top: 3px solid var(--amber-dark); border-bottom-color: transparent;
    padding: 7px 10px 6px; position: relative; background: #fff8ec;
  }
  table.conteo tbody tr.fila-grupo-header td::before {
    content: ''; position: absolute; left: -6px; top: 0; bottom: 0; width: 4px; background: var(--amber);
    border-top-left-radius: 3px; border-top-right-radius: 3px;
  }
  table.conteo tbody tr.fila-grupo-header .grupo-header {
    display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--amber-dark); font-weight: 700;
  }
  table.conteo tbody tr.fila-grupo-header .grupo-header svg { flex-shrink: 0; }
  table.conteo tbody tr.fila-grupo-header .grupo-header-tiendas { color: var(--ink); font-weight: 700; }
  table.conteo tbody tr.fila-grupo-header .grupo-header-chip {
    margin-left: auto; background: #fdf3e6; padding: 3px 9px; border-radius: 10px; white-space: nowrap;
  }
  table.conteo tbody tr.fila-grupo-header .grupo-header-chip.nota-grupo-aviso { background: #fbe6c4; }
  table.conteo tbody tr.fila-grupo-header .grupo-header-chip.nota-grupo-alerta { background: var(--danger); color: #fff; }
  table.conteo tbody tr.fila-grupo-header.fila-grupo-header-alerta td { background: #fbdada; border-top-color: var(--danger); }
  table.conteo tbody tr.fila-grupo-header.fila-grupo-header-alerta td::before { background: var(--danger); }
  table.conteo tbody tr.fila-grupo-header.fila-grupo-header-aviso td { background: #fbe6c4; }
  table.conteo td.limite { font-family: var(--mono); color: var(--ink-soft); }
  table.conteo input.celda {
    width: 52px; padding: 7px 4px; text-align: center; border: 1px solid var(--line);
    border-radius: 7px; font-family: var(--mono); font-size: 13.5px; background: #fff;
  }
  table.conteo input.celda::-webkit-outer-spin-button,
  table.conteo input.celda::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  table.conteo input.celda { -moz-appearance: textfield; }
  table.conteo input.celda:focus { outline: none; border-color: var(--navy-soft); box-shadow: 0 0 0 3px rgba(44,62,94,.1); }
  table.conteo input.celda:disabled { background: #f0f1f3; color: var(--ink-soft); cursor: not-allowed; }

  table.conteo input.celda-total {
    width: 60px; padding: 8px 4px; font-weight: 800; font-size: 14px; color: var(--navy);
    background: #eef1f7; border: 1.5px solid #d4dae4; cursor: default;
  }
  table.conteo input.celda-total:focus { box-shadow: none; }
  table.conteo input.celda-total:disabled { background: #eef1f7; color: var(--navy); opacity: .6; }

  table.conteo tr.fila-aviso input.celda { border-color: var(--amber); background: #fdf6ea; }
  table.conteo tr.fila-aviso input.celda-total { background: var(--amber); color: #2a1c04; border-color: var(--amber-dark); }
  table.conteo tr.fila-alerta input.celda { border-color: var(--danger); background: #fceded; color: var(--danger); }
  table.conteo tr.fila-alerta input.celda-total { background: var(--danger); color: #fff; border-color: var(--danger); }

  /* Casilla que trae "NO" desde el Excel (esa tienda no debe recibir palets
     por esa vía). Se muestra en rojo, no editable; el botón "+" permite
     forzar un número igualmente si hiciera falta, sin perder el "NO" original. */
  table.conteo input.celda-no {
    width: 52px; padding: 7px 4px; text-align: center; border-radius: 7px; font-family: var(--mono);
    font-size: 13.5px; font-weight: 800; color: var(--danger); background: #fceded; border: 1.5px solid var(--danger);
    cursor: pointer;
  }
  table.conteo input.celda-no:hover { background: #f8d7d7; }
  table.conteo input.celda-forzada {
    border-color: var(--amber-dark); background: #fdf6ea; color: var(--amber-dark); font-weight: 800;
  }
  .diff-nota { font-size: 10.5px; margin-top: 2px; font-weight: 600; }
  .diff-nota.aviso { color: var(--amber-dark); }
  .diff-nota.alerta { color: var(--danger); }

  table.conteo tr.fila-cerrada { background: #fceded !important; }
  table.conteo tr.fila-cerrada td.nombre { color: #8a3a3a; }
  .motivo-cierre { font-size: 10.5px; color: var(--danger); font-weight: 600; margin-top: 2px; max-width: 140px; }

  .btn-cerrar-tienda {
    background: none; border: none; color: var(--ink-soft); padding: 5px; border-radius: 6px; display: inline-flex;
  }
  .btn-cerrar-tienda:hover { background: #fceded; color: var(--danger); }
  .btn-reabrir {
    background: var(--danger); color: #fff; border: none; border-radius: 6px; padding: 5px 9px; font-size: 11px; font-weight: 700;
  }
  .btn-reabrir:hover { background: #a83e3e; }

  .btn { border: none; border-radius: 8px; padding: 10px 14px; font-size: 12.5px; font-weight: 600; width: 100%; line-height: 1.3; }
  .btn:disabled { opacity: .55; cursor: not-allowed; }

  .seccion-body { border-top: 1px solid var(--line); display: flex; }
  .seccion-acciones {
    flex: 0 0 148px; padding: 16px; display: flex; flex-direction: column; gap: 8px;
    border-right: 1px solid var(--line); background: #fbfbfc;
  }
  .seccion-tabla-col { flex: 1; min-width: 0; }

  @media (max-width: 700px) {
    .seccion-body { flex-direction: column; }
    .seccion-acciones { flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--line); }
    .orden-retirada { flex-basis: 100%; }
  }

  /* ---------- MODAL ---------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(20,26,36,.55);
    display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-box {
    background: #fff; border-radius: 16px; padding: 26px; max-width: 400px; width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,.3);
    max-height: calc(100vh - 40px); overflow-y: auto;
    transition: max-width .18s ease;
    position: relative;
  }
  .modal-box h3 { margin: 0 0 8px; font-size: 16px; }
  .modal-box p { margin: 0 0 16px; color: var(--ink-soft); font-size: 14px; line-height: 1.5; }
  .modal-box textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px;
    font-size: 14px; resize: vertical; min-height: 76px; margin-bottom: 16px;
  }
  .modal-box textarea:focus { outline: none; border-color: var(--navy-soft); box-shadow: 0 0 0 3px rgba(44,62,94,.1); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-actions button { border: none; border-radius: 9px; padding: 10px 18px; font-size: 13.5px; font-weight: 600; transition: filter .15s, transform .05s; }
  .modal-actions button:hover { filter: brightness(1.06); }
  .modal-actions button:active { transform: scale(.97); }
  .modal-cancel { background: #eef0f3; color: var(--ink); }
  .modal-confirm { background: var(--navy); color: #fff; }
  .modal-confirm.danger { background: var(--danger); }

  /* ---------- Modal de confirmación "peligro" (borrado) ---------- */
  .modal-box.peligro { border-top: 5px solid var(--danger); }
  .modal-box.peligro h3 { color: var(--danger); display: flex; align-items: center; gap: 8px; }
  .modal-box.peligro h3::before {
    content: ''; flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
    background: var(--danger) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.5" fill="white" stroke="white"/></svg>') center/12px no-repeat;
  }

  /* ---------- Modal "Enviar Previsión / Enviar Definitivo" (versión amplia) ---------- */
  .modal-box.ancho { max-width: 620px; }

  .modal-envio-cabecera {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 14px;
    padding-bottom: 16px; margin-bottom: 18px; border-bottom: 1px solid var(--line);
  }
  .modal-envio-cabecera-icono {
    width: 42px; height: 42px; border-radius: 11px; background: var(--navy);
    display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0;
  }
  .modal-envio-cabecera-texto { flex: 1; min-width: 0; }
  .modal-envio-cabecera-texto .nombre {
    font-size: 18px; font-weight: 800; color: var(--ink); line-height: 1.25;
    overflow-wrap: break-word;
  }
  .modal-envio-cabecera-texto .fecha { font-size: 13px; color: var(--ink-soft); margin-top: 2px; text-transform: capitalize; }

  .modal-envio-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px;
  }
  .modal-envio-stat {
    background: #f6f7f9; border-radius: 12px; padding: 13px 14px; display: flex; flex-direction: column; gap: 6px;
  }
  .modal-envio-stat .lbl {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; color: var(--ink-soft);
    display: flex; align-items: center; gap: 5px;
  }
  .modal-envio-stat .val { font-size: 22px; font-weight: 800; color: var(--ink); line-height: 1; }
  .modal-envio-stat.acento { background: #fdf6ea; }
  .modal-envio-stat.acento .val { color: var(--amber-dark); }
  .modal-envio-stat.completo { background: #eaf7ef; }
  .modal-envio-stat.completo .val { color: #1f7a45; }
  .modal-envio-barra { height: 6px; border-radius: 3px; background: #e2e5ea; overflow: hidden; margin-top: 2px; }
  .modal-envio-barra-fill { height: 100%; border-radius: 3px; background: var(--amber); transition: width .35s ease; }
  .modal-envio-barra-fill.completo { background: var(--ok); }

  .modal-envio-aviso, .modal-envio-ok {
    display: flex; align-items: flex-start; gap: 9px; font-size: 12.5px; line-height: 1.5;
    border-radius: 10px; padding: 11px 13px; margin-bottom: 14px; font-weight: 600;
  }
  .modal-envio-aviso { background: #fdf6ea; color: var(--amber-dark); flex-direction: column; align-items: stretch; gap: 8px; }
  .modal-envio-aviso-titulo { display: flex; align-items: center; gap: 8px; }
  .modal-envio-aviso svg { flex-shrink: 0; }
  .modal-envio-ok { background: #eaf7ef; color: #1f7a45; }
  .modal-envio-ok svg { flex-shrink: 0; margin-top: 1px; }

  .modal-envio-chips {
    display: flex; flex-wrap: wrap; gap: 6px; max-height: 130px; overflow-y: auto; padding: 2px 2px 0;
  }
  .modal-envio-chip {
    background: #fff; color: var(--amber-dark); border: 1px solid #f3dfb3; border-radius: 20px;
    padding: 4px 11px; font-size: 12px; font-weight: 700; white-space: nowrap;
  }

  .modal-envio-nota {
    font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; margin: 0;
    background: #f9fafb; border-radius: 10px; padding: 11px 13px;
  }

  .modal-cargando {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; padding: 18px 0 6px; text-align: center;
  }
  .modal-cargando span:last-child { font-size: 14px; font-weight: 600; color: var(--ink); }
  .spinner-navy {
    width: 30px; height: 30px; border-radius: 50%; border: 3px solid #e3e7ee;
    border-top-color: var(--navy); animation: girar .7s linear infinite; display: block;
  }
  .modal-resultado {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 14px 0 6px; text-align: center; font-size: 14px; font-weight: 600;
  }
  .modal-resultado.exito { color: #1f7a45; }
  .modal-resultado.error { color: var(--danger); }
  .modal-resultado svg { flex-shrink: 0; }

  /* ---------- Modal "Actualización obligatoria" ---------- */
  .modal-overlay.overlay-actualizacion {
    background: rgba(12,17,26,.78); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .modal-box.actualizacion {
    max-width: 380px; padding: 0; overflow: hidden; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,.45);
  }
  .actualizacion-cabecera {
    background:
      radial-gradient(circle at 20% 15%, rgba(217,140,43,.35), transparent 55%),
      linear-gradient(160deg, var(--navy) 0%, #0f1a2c 100%);
    padding: 34px 28px 22px;
  }
  .actualizacion-icono {
    width: 60px; height: 60px; margin: 0 auto 16px; border-radius: 50%;
    background: linear-gradient(150deg, var(--amber), var(--amber-dark));
    display: flex; align-items: center; justify-content: center; color: #fff;
    box-shadow: 0 0 0 7px rgba(217,140,43,.16), 0 10px 22px rgba(0,0,0,.35);
    animation: pulso-actualizacion 2.2s ease-in-out infinite;
  }
  @keyframes pulso-actualizacion {
    0%, 100% { box-shadow: 0 0 0 7px rgba(217,140,43,.16), 0 10px 22px rgba(0,0,0,.35); }
    50% { box-shadow: 0 0 0 11px rgba(217,140,43,.08), 0 10px 22px rgba(0,0,0,.35); }
  }
  .actualizacion-cabecera h3 { margin: 0 0 6px; font-size: 18px; font-weight: 800; color: #fff; }
  .actualizacion-cabecera p { margin: 0; font-size: 13px; color: rgba(255,255,255,.65); line-height: 1.5; }
  .actualizacion-versiones {
    display: flex; align-items: center; justify-content: center; gap: 9px; margin-top: 16px;
  }
  .actualizacion-version-chip {
    font-size: 11.5px; font-weight: 700; letter-spacing: .02em; padding: 4px 10px; border-radius: 20px;
    font-variant-numeric: tabular-nums;
  }
  .actualizacion-version-chip.actual { background: rgba(255,255,255,.1); color: rgba(255,255,255,.65); }

<script>
/* ---------------- COMUNICACIÓN CON EL BACKEND (Apps Script como Aplicación Web) ---------------- */
// Esta página ya no se sirve desde Apps Script (ahora vive en GitHub Pages,
// de cara a convertirla en PWA instalable), así que "google.script.run"
// —que solo existe dentro del HtmlService de Apps Script— no está disponible.
// En su lugar se llama al backend por fetch() contra la URL de la
// implementación como "Aplicación web". Para no tener que tocar el resto del
// archivo, se crea aquí una réplica de "google.script.run" con la misma
// forma (withSuccessHandler / withFailureHandler / nombreMetodo(args)).

// 👉 PON AQUÍ la URL que te da Apps Script en
//    "Implementar > Nueva implementación > Aplicación web" (termina en /exec)
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyQjzJ4KHPnUlVpnRzh1s-4GTyfYeOMLbMEg2kcK46w8M-jACAbWObq02O0HLSceRob5g/exec';

// Versión con la que se sirvió ESTE index.html. Se muestra abajo a la
// derecha en el login y en "Inicio", y es la que se compara contra
// version.json para saber si hay una actualización nueva (ver más abajo,
// sección PWA). Súbela a mano cada vez que despliegues, junto con
// version.json y con CACHE_VERSION en service-worker.js (los tres deben
// coincidir).
const APP_VERSION_ACTUAL = '1.2.4';
{
  const badgeLogin = document.getElementById('login-version-badge');
  if (badgeLogin) badgeLogin.textContent = 'v' + APP_VERSION_ACTUAL;
}

const TOKEN_STORAGE_KEY = 'conteos_diarios_token';
// El token de sesión ya NO se guarda en localStorage a propósito: así la PWA
// siempre pide contraseña al abrirse (cada vez que se recarga o se relanza
// la app), aunque dentro de la misma sesión abierta el token siga viviendo
// en memoria para no tener que reintroducir la contraseña en cada llamada.
let SESSION_TOKEN = null;
// Rol de la sesión actual: 'admin' | 'normal' | null (aún sin login). Solo
// el rol "admin" puede crear/borrar notas y cerrar/reabrir tiendas; se
// guarda igual que el token, solo en memoria (no en localStorage).
let SESSION_ROL = null;

/** true si la sesión actual es de administrador. Se usa para mostrar u
 *  ocultar en el momento los controles de notas/observaciones/cierres. */
function esAdmin() { return SESSION_ROL === 'admin'; }

/** Añade/quita la clase 'es-admin' en <body>, que es lo que la CSS usa
 *  para mostrar u ocultar los botones de solo-admin (ver reglas
 *  "body:not(.es-admin) ..." en el <style>). */
function aplicarPermisosUI() {
  document.body.classList.toggle('es-admin', esAdmin());
  const elRol = document.getElementById('topbar-usuario-rol');
  if (elRol) elRol.textContent = SESSION_ROL ? (esAdmin() ? 'Administrador' : 'Operario') : '';
  poblarDropdownConfiguracion();
}

// Nombre usado en el frontend -> nombre de la acción que entiende el backend.
// (checkPassword se traduce a 'login', que es quien genera el token de sesión.)
const METODOS_REMOTOS_ = {
  checkPassword: 'login',
  getMesCalendario: 'getMesCalendario',
  getConteoDia: 'getConteoDia',
  guardarConteo: 'guardarConteo',
  borrarConteoSeccion: 'borrarConteoSeccion',
  deshacerEnvioSeccion: 'deshacerEnvioSeccion',
  enviarPrevisionAgencia: 'enviarPrevisionAgencia',
  enviarDefinitivoAgencia: 'enviarDefinitivoAgencia',
  guardarObservacion: 'guardarObservacion',
  eliminarObservacion: 'eliminarObservacion',
  getAgrupacionesConfig: 'getAgrupacionesConfig',
  guardarEmailsAgrupacion: 'guardarEmailsAgrupacion',
  eliminarAgrupacionConfig: 'eliminarAgrupacionConfig',
  sincronizarAgrupaciones: 'sincronizarAgrupaciones',
  getPlantillaDia: 'getPlantillaDia',
  getDiasPlantilla: 'getDiasPlantilla',
  editarTiendaPlantilla: 'editarTiendaPlantilla',
  añadirTiendaPlantilla: 'añadirTiendaPlantilla',
  eliminarTiendaPlantilla: 'eliminarTiendaPlantilla',
  moverTiendaPlantilla: 'moverTiendaPlantilla',
  editarNombreRutaPlantilla: 'editarNombreRutaPlantilla',
  añadirRutaPlantilla: 'añadirRutaPlantilla',
  eliminarRutaPlantilla: 'eliminarRutaPlantilla',
  añadirNotaCargaPlantilla: 'añadirNotaCargaPlantilla',
  editarNotaCargaPlantilla: 'editarNotaCargaPlantilla',
  eliminarNotaCargaPlantilla: 'eliminarNotaCargaPlantilla',
  guardarNotaGrupoPlantilla: 'guardarNotaGrupoPlantilla',
  eliminarNotaGrupoPlantilla: 'eliminarNotaGrupoPlantilla',
  editarOrdenTiendaPlantilla: 'editarOrdenTiendaPlantilla',
  activarPesoRuta: 'activarPesoRuta',
  desactivarPesoRuta: 'desactivarPesoRuta',
  bloquearCampoTiendaPlantilla: 'bloquearCampoTiendaPlantilla',
  desbloquearCampoTiendaPlantilla: 'desbloquearCampoTiendaPlantilla'
};

function llamarApi_(accion, args) {
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    // 'text/plain' evita que el navegador lance una petición OPTIONS de
    // pre-vuelo (Apps Script no sabe responder a esas); el body sigue
    // siendo JSON, solo cambia la cabecera para que cuente como "simple".
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ accion: accion, token: SESSION_TOKEN, args: args })
  })
    .then(function (resp) { return resp.json(); })
    .then(function (data) {
      if (!data.ok) {
        if (data.sesionCaducada) {
          SESSION_TOKEN = null;
          volverALogin_();
        }
        throw new Error(data.error || 'Error del servidor');
      }
      return data.resultado;
    });
}

function volverALogin_() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  SESSION_ROL = null;
  document.body.classList.remove('es-admin');
  mostrarToast('Sesión caducada, vuelve a entrar', true);
}

/** Cierre de sesión manual (botón "Salir" de la cabecera): a diferencia de
 *  volverALogin_ (que salta cuando el token caduca solo), este es un logout
 *  voluntario, así que no muestra el aviso de "sesión caducada". */
function cerrarSesion() {
  SESSION_TOKEN = null;
  SESSION_ROL = null;
  document.body.classList.remove('es-admin');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  const campoPass = document.getElementById('login-pass');
  campoPass.value = '';
  document.getElementById('login-error').style.display = 'none';
  campoPass.focus();
}

const google = {
  script: {
    run: {
      withSuccessHandler: function (onSuccess) {
        return {
          withFailureHandler: function (onFailure) {
            const runner = {};
            Object.keys(METODOS_REMOTOS_).forEach(function (nombreLocal) {
              runner[nombreLocal] = function () {
                const args = Array.prototype.slice.call(arguments);
                const accion = METODOS_REMOTOS_[nombreLocal];
                llamarApi_(accion, args)
                  .then(function (resultado) {
                    if (nombreLocal === 'checkPassword') {
                      // Si llega aquí es que la contraseña era correcta:
                      // el backend ahora devuelve { token, rol } en vez de
                      // solo el token.
                      SESSION_TOKEN = resultado.token;
                      SESSION_ROL = resultado.rol;
                      aplicarPermisosUI();
                      onSuccess(true);
                    } else {
                      onSuccess(resultado);
                    }
                  })
                  .catch(function (err) {
                    if (nombreLocal === 'checkPassword' && err.message === 'Contraseña incorrecta') {
                      onSuccess(false);
                    } else {
                      onFailure(err);
                    }
                  });
              };
            });
            return runner;
          }
        };
      }
    }
  }
};

const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_SEMANA_ES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const DIAS_SEMANA_CORTO_ES = ['D','L','M','X','J','V','S'];

let ESTADO = {
  vista: null,          // 'inicio' | 'conteos' | 'configuracion'
  fecha: null,          // 'YYYY-MM-DD' seleccionada
  anioMes: null,        // 'YYYY-MM' mostrado en el calendario
  calendarioColapsado: false,
  colapsadas: new Set() // nombres de agrupación colapsadas manualmente (persiste al recargar el día)
};

/* ---------------- LOGIN ---------------- */
function intentarLogin() {
  const pass = document.getElementById('login-pass').value;
  const btn = document.getElementById('btn-login');
  const spinner = document.getElementById('login-spinner');
  const btnText = document.getElementById('login-btn-text');

  document.getElementById('login-error').style.display = 'none';
  btn.disabled = true; spinner.style.display = 'inline-block'; btnText.textContent = 'Comprobando…';

        document.getElementById('login-screen').style.display = 'none';

    .withFailureHandler(function (err) {

      mostrarErrorServidor(err);
    })
    .checkPassword(pass);

}
function pad2(n) { return String(n).padStart(2, '0'); }
function anioMesDe(fecha) { return fecha.slice(0, 7); }
function formatearFechaLarga(fecha) {
  const d = new Date(fecha + 'T12:00:00');
  return DIAS_SEMANA_ES[d.getDay()] + ', ' + d.getDate() + ' de ' + MESES_ES[d.getMonth()] + ' de ' + d.getFullYear();

 *  desplegable se quiere abrir (p.ej. 'emails'); si no se indica, se
 *  mantiene/usa la última sección activa. */
function cambiarVista(vista, seccion) {
  ESTADO.vista = vista;

    btn.classList.toggle('activa', btn.dataset.vista === vista);
  });
  document.getElementById('topbar-fecha').style.display = (vista === 'conteos') ? '' : 'none';
  document.getElementById('main').classList.toggle('main-sin-padding', vista === 'inicio');

  if (vista === 'inicio') {

    if (!ESTADO.fecha) {

      ESTADO.anioMes = anioMesDe(ESTADO.fecha);
    }
    renderShellPrincipal();
    cargarCalendario();
    cargarConteoDia();

/* ---------------- GESTIÓN FESTIVOS ----------------
 * Resumen de todas las notas y cierres de tienda guardados (pasados y
 * futuros), construido sin necesitar un endpoint nuevo: se recorre mes a
 * mes con getMesCalendario (que ya trae qué días tienen notas/cierres) y
 * solo se pide el detalle completo (getConteoDia) de los días marcados.
 *
 * Por defecto se muestra 1 mes (navegable con las flechas). Además hay
 * filtros por texto (tienda/agrupación/contenido), por tipo (cierre u
 * observación) y, opcionalmente, un rango de fechas personalizado que
 * sustituye a la navegación mensual mientras esté activo. Los filtros de
 * texto/tipo se aplican en el cliente sobre los datos ya cargados
 * (FESTIVOS_ESTADO.datosCache), sin volver a pedir nada al servidor; solo
 * cambiar de mes o de rango de fechas dispara una nueva carga.
 */
let FESTIVOS_ESTADO = {
  semanaInicio: null,    // 'YYYY-MM-DD' del lunes de la semana mostrada (navegación semanal por defecto)
  idSolicitud: 0,
  datosCache: [],        // conteo completo (getConteoDia) de los días del rango que sí tienen notas/cierres
  diasRango: [],         // TODAS las fechas del rango actual, en orden (aunque no tengan nada guardado)
  filtroTexto: '',
  filtroTipo: 'todos',   // 'todos' | 'cierre' | 'nota'
  filtroDesde: null,     // 'YYYY-MM-DD' -- si desde+hasta están definidos, sustituye la navegación semanal
  filtroHasta: null,
  filtrosAbiertos: false  // si el panel de filtros (oculto tras un icono) está desplegado
};

/** Suma (o resta) días a una fecha 'YYYY-MM-DD' y devuelve otra fecha en el mismo formato. */
function sumarDias_(fecha, delta) {
  const d = new Date(fecha + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

/** Devuelve el lunes ('YYYY-MM-DD') de la semana a la que pertenece la fecha dada. */
function lunesDeSemana_(fecha) {
  const dow = new Date(fecha + 'T12:00:00').getDay(); // 0=domingo..6=sábado
  return sumarDias_(fecha, -((dow + 6) % 7));
}

/** Enumera todas las fechas ('YYYY-MM-DD') entre inicio y fin, ambos incluidos. */
function diasDeRango_(inicio, fin) {
  const out = [];
  let cursor = inicio, guard = 0;
  while (cursor <= fin && guard < 400) { out.push(cursor); cursor = sumarDias_(cursor, 1); guard++; }
  return out;
}

function sumarMeses_(anioMes, delta) {
  const partes = anioMes.split('-').map(Number);
  let anio = partes[0], mes = partes[1] - 1 + delta;
  anio += Math.floor(mes / 12);
  mes = ((mes % 12) + 12) % 12;
  return anio + '-' + pad2(mes + 1);
}

function mesesEnRango_(inicio, fin) {
  const out = [];
  let cursor = inicio, guard = 0;
  while (cursor <= fin && guard < 60) {
    out.push(cursor);
    cursor = sumarMeses_(cursor, 1);
    guard++;
  }
  return out;
}

function formatearFechaCorta_(fecha) {
  const d = new Date(fecha + 'T12:00:00');
  return d.getDate() + ' ' + MESES_ES[d.getMonth()].slice(0, 3) + ' ' + d.getFullYear();
}
