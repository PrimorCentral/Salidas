/* ---------------- RESUMEN RÁPIDO DEL DÍA (sidebar derecho) ---------------- */

/**
 * Recorre las notas generales del día y, para cada agrupación, sus notas y
 * tiendas cerradas, y construye un resumen agrupado en el panel lateral
 * derecho. Al pulsar sobre un bloque de agrupación, se hace scroll y se
 * expande esa sección en el contenido principal.
 */
function renderResumenDia(data) {
  const body = document.getElementById('resumen-body');
  const countEl = document.getElementById('resumen-count');
  const bloques = [];
  let total = 0;

  if (data.notasGenerales && data.notasGenerales.length) {
    total += data.notasGenerales.length;
    bloques.push({
      titulo: 'Nota general del día',
      key: null,
      items: data.notasGenerales.map(function (n) {
        return { texto: n.texto, tipo: n.tipo, tienda: null };
      })
    });
  }

  (data.secciones || []).forEach(function (seccion) {
    const items = [];
    (seccion.notas || []).forEach(function (n) {
      items.push({ texto: n.texto, tipo: n.tipo, tienda: null });
    });
    seccion.tiendas.forEach(function (t) {
      if (t.cerrada) items.push({ texto: t.motivoCierre || 'Tienda cerrada', tipo: 'cierre', tienda: t.nombre });
    });
    if (items.length) {
      total += items.length;
      bloques.push({
        titulo: parsearNombreAgrupacion(seccion.nombre).titulo,
        key: seccion.nombre,
        items: items
      });
    }
  });

  if (!bloques.length) {
    body.innerHTML = '<div class="resumen-vacio">Sin cierres ni anotaciones para este día.</div>';
    countEl.style.display = 'none';
    return;
  }

  countEl.style.display = 'inline-block';
  countEl.textContent = total;

  body.innerHTML = '';
  bloques.forEach(function (b) {
    const div = document.createElement('div');
    div.className = 'resumen-grupo';
    const itemsHtml = b.items.map(function (it) {
      const clase = it.tipo === 'cierre' ? 'resumen-item cierre' : 'resumen-item';
      const prefijo = it.tienda ? '<span class="tienda">' + escapeHtml(it.tienda) + ':</span> ' : '';
      return '<div class="' + clase + '">' + prefijo + escapeHtml(it.texto) + '</div>';
    }).join('');
    div.innerHTML =
      '<div class="resumen-grupo-titulo"><span>' + escapeHtml(b.titulo) + '</span>' +
      (b.key ? '<span class="ir">Ver &#8599;</span>' : '') + '</div>' +
      itemsHtml;
    if (b.key) {
      div.onclick = function () { irASeccion(b.key); };
    }
    body.appendChild(div);
  });
}

/** Expande y hace scroll hasta la agrupación indicada dentro del contenido principal */
function irASeccion(key) {
  const selector = '.seccion-panel[data-seccion-key="' + cssEscapeAtributo(key) + '"]';
  const panel = document.querySelector(selector);
  if (!panel) return;
  panel.classList.remove('colapsada');
  ESTADO.colapsadas.delete(key);
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  panel.style.transition = 'box-shadow .3s';
  panel.style.boxShadow = '0 0 0 3px rgba(28,43,69,.35)';
  setTimeout(function () { panel.style.boxShadow = ''; }, 1300);
}

function cssEscapeAtributo(s) {
  if (window.CSS && CSS.escape) return CSS.escape(s);
  return String(s).replace(/["\\]/g, '\\$&');
}

/* ---------------- SECCIÓN / AGRUPACIÓN ---------------- */

/**
 * Separa el nombre de la agrupación tal como viene de la hoja
 * (ej. "TXT NORTE (PTA 11:00)") en:
 *   titulo:    "TXT NORTE"
 *   ubicacion: "PTA 11:00"  (lo que va entre paréntesis, o null si no hay)
 */
function parsearNombreAgrupacion(nombre) {
  const m = String(nombre).match(/^(.*?)\s*\(([^)]+)\)\s*$/);
  if (m) return { titulo: m[1].trim(), ubicacion: m[2].trim() };
  return { titulo: String(nombre).trim(), ubicacion: null };
}

/**
 * Muestra el indicador de sincronización de una sección durante el
 * autoguardado. Filosofía: silencio cuando todo va bien, solo se ve algo
 * mientras se está guardando (y desaparece solo, sin más aviso).
 */
function marcarGuardando(panel, activo) {
  const ind = panel.querySelector('.sync-indicator');
  if (!ind) return;
  if (activo) {
    ind.classList.add('mostrando');
    ind.innerHTML = '<span class="sync-spinner"></span><span>Guardando…</span>';
  } else {
    ind.classList.remove('mostrando');
    ind.innerHTML = '';
  }
}

function crearSeccionPanel(seccion, dia, fecha, esHoy) {
  // El backend calcula seccion.editable teniendo en cuenta la fecha (solo
  // lectura si han pasado más de 2 días) y si ya se envió a la agencia
  // (una vez enviado, ya no se puede modificar). Si por lo que sea no
  // viniera ese campo, se asume editable (compatibilidad hacia atrás).
  const editable = seccion.editable !== false && seccion.estado !== 'enviado';

  const panel = document.createElement('div');
  panel.className = 'seccion-panel estado-' + seccion.estado + (editable ? '' : ' no-editable');
  panel.setAttribute('data-seccion-key', seccion.nombre);
  if (ESTADO.colapsadas.has(seccion.nombre)) panel.classList.add('colapsada');

  const partes = parsearNombreAgrupacion(seccion.nombre);
  const iniciales = partes.titulo.replace(/[^A-ZÁÉÍÓÚÑ ]/gi, '').trim().split(/\s+/).slice(0, 2).map(function (w) { return w[0]; }).join('').toUpperCase() || '·';

  const badgeUbicacion = partes.ubicacion
    ? '<span class="badge-ubicacion">' +
      '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M12 21s-7-6.1-7-11a7 7 0 0 1 14 0c0 4.9-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>' +
      escapeHtml(partes.ubicacion) + '</span>'
    : '';

  const header = document.createElement('div');
  header.className = 'seccion-header';
  header.innerHTML =
    '<div class="icono-agrup">' + iniciales + '</div>' +
    '<div class="info"><div class="name-row">' +
    '<span class="name">' + escapeHtml(partes.titulo) + '</span>' + badgeUbicacion +
    '<span class="count">' + seccion.tiendas.length + ' tienda(s)</span>' +
    '</div></div>' +
    '<span class="badge-total-palets"><span class="total-palets-valor">0</span>&nbsp;palets</span>' +
    badgeEstado(seccion) +
    badgePrevision(seccion) +
    (seccion.estado === 'enviado' && esHoy
      ? '<button type="button" class="btn-deshacer-envio" title="Deshacer envío (solo se puede el mismo día)">' +
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<polyline points="3 6 5 6 21 6"></polyline>' +
        '<path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>' +
        '<path d="M10 11v6"></path><path d="M14 11v6"></path>' +
        '<path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>' +
        '</svg></button>'
      : '') +
    (!editable && seccion.estado !== 'enviado' ? '<span class="badge badge-solo-lectura">Solo lectura</span>' : '') +
    '<span class="sync-indicator"></span>' +
    (editable && seccion.estado !== 'enviado' && !seccion.previsionEnviada
      ? '<button type="button" class="btn-header-prevision" title="Enviar previsión por email (no bloquea el conteo, se puede volver a enviar)">Enviar Previsión</button>'
      : '') +
    (editable && seccion.estado !== 'enviado'
      ? '<button type="button" class="btn-header-definitivo" title="Enviar definitivo por email (bloquea el conteo, lo archiva y vacía las casillas)">Enviar Definitivo</button>'
      : '') +
    '<button type="button" class="btn-add-nota" title="Añadir nota a esta agrupación">' +
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>' +
    '<button type="button" class="btn-pdf-seccion" title="Generar PDF de esta agrupación">' +
    '<svg width="16" height="18" viewBox="0 0 24 26">' +
    '<path d="M4 2h11l6 6v15a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="#e0342a"/>' +
    '<path d="M15 2v6h6" fill="#ffffff" opacity="0.32"/>' +
    '<text x="12" y="19" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="800" fill="#ffffff">PDF</text>' +
    '</svg></button>' +
    '<button type="button" class="btn-toggle-colapsar" title="Contraer / expandir">' +
    '<svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></button>';
  panel.appendChild(header);

  header.querySelector('.btn-add-nota').onclick = function (e) {
    e.stopPropagation();
    appPrompt('Nota para ' + seccion.nombre, 'Escribe una observación para esta agrupación…', function (texto) {
      guardarObservacionYRecargar({ fecha: fecha, dia: dia, agrupacion: seccion.nombre, tienda: '', tipo: 'nota', texto: texto });
    });
  };
  header.addEventListener('click', function (e) {
    if (!e.target.closest('.btn-toggle-colapsar')) return;
    panel.classList.toggle('colapsada');
    if (panel.classList.contains('colapsada')) ESTADO.colapsadas.add(seccion.nombre);
    else ESTADO.colapsadas.delete(seccion.nombre);
  });

  // Notas/instrucciones de carga escritas en la propia hoja de Excel
  // (ej. "1 CAMIÓN 33 P. + ... TODOS LOS LUNES"). De solo lectura.
  if (seccion.notasCarga && seccion.notasCarga.length) {
    const cargaWrap = document.createElement('div');
    cargaWrap.className = 'seccion-notas-carga';
    seccion.notasCarga.forEach(function (texto) {
      cargaWrap.appendChild(crearNotaCargaChip(texto));
    });
    panel.appendChild(cargaWrap);
  }

  // Observaciones manuales guardadas para esta agrupación (hoja Observaciones), sí se pueden borrar.
  if (seccion.notas && seccion.notas.length) {
    const notasWrap = document.createElement('div');
    notasWrap.className = 'seccion-notas';
    seccion.notas.forEach(function (n) { notasWrap.appendChild(crearNotaChip(n)); });
    panel.appendChild(notasWrap);
  }

  const body = document.createElement('div');
  body.className = 'seccion-body';

  // Columna lateral: solo se muestra si hay una lista de "quitar en este
  // orden" que mostrar; ya no aloja botones (Guardar / Enviar), que ahora
  // viven en la cabecera.
  let acciones = null;
  if (seccion.ordenRetirada && seccion.ordenRetirada.length) {
    acciones = document.createElement('div');
    acciones.className = 'seccion-acciones';
    const ordenWrap = document.createElement('div');
    ordenWrap.className = 'orden-retirada';
    ordenWrap.innerHTML =
      '<div class="orden-retirada-titulo">Quitar en este orden</div>' +
      '<ol>' + seccion.ordenRetirada.map(function (o) { return '<li>' + escapeHtml(o) + '</li>'; }).join('') + '</ol>';
    acciones.appendChild(ordenWrap);
    body.appendChild(acciones);
  }

  const tablaCol = document.createElement('div');
  tablaCol.className = 'seccion-tabla-col';
  const tableWrap = document.createElement('div');
  tableWrap.className = 'table-wrap';
  // Nombres de las tiendas de cada grupo (para mostrarlos juntos una sola
  // vez en la fila-cabecera, en vez de repetir la nota en cada tienda).
  const nombresPorGrupo = {};
  seccion.tiendas.forEach(function (t) {
    if (!t.notaGrupoId) return;
    if (!nombresPorGrupo[t.notaGrupoId]) nombresPorGrupo[t.notaGrupoId] = [];
    nombresPorGrupo[t.notaGrupoId].push(t.nombre);
  });

  const filasHtml = seccion.tiendas.map(function (t, i) {
    const anterior = seccion.tiendas[i - 1];
    const siguiente = seccion.tiendas[i + 1];
    const esPrimeraDeGrupo = !!t.notaGrupoId && (!anterior || anterior.notaGrupoId !== t.notaGrupoId);
    const esUltimaDeGrupo = !!t.notaGrupoId && (!siguiente || siguiente.notaGrupoId !== t.notaGrupoId);
    const headerHtml = esPrimeraDeGrupo ? filaGrupoHeaderHtml(t, nombresPorGrupo[t.notaGrupoId], seccion.tienePeso) : '';
    return headerHtml + filaHtml(t, esPrimeraDeGrupo, esUltimaDeGrupo, seccion.tienePeso);
  }).join('');
  tableWrap.innerHTML =
    '<table class="conteo"><thead><tr>' +
    '<th class="th-nombre">Tienda</th><th>Límite</th><th>60</th><th>PTA</th><th>CART.</th><th class="th-total">TOTAL</th><th>PDTE</th>' +
    (seccion.tienePeso ? '<th>PESO</th>' : '') +
    '<th></th>' +
    '</tr></thead><tbody>' + filasHtml + '</tbody></table>';
  if (!editable) {
    // Fecha demasiado antigua (2+ días atrás) o ya enviada: se puede
    // consultar, pero no modificar nada de esta agrupación.
    tableWrap.querySelectorAll('input.celda, input.celda-total').forEach(function (input) { input.disabled = true; });
    tableWrap.querySelectorAll('.btn-cerrar-tienda, .btn-reabrir, input.celda-no').forEach(function (btn) { btn.disabled = true; });
  }
  tablaCol.appendChild(tableWrap);
  body.appendChild(tablaCol);

  panel.appendChild(body);

  // Total de palets de la agrupación: suma en vivo del TOTAL de cada tienda
  // (no cuenta las tiendas cerradas, que no tienen input de TOTAL).
  function actualizarTotalPalets() {
    let suma = 0;
    tableWrap.querySelectorAll('input.celda-total').forEach(function (inp) {
      const v = parseFloat(inp.value);
      if (!isNaN(v)) suma += v;
    });
    const el = header.querySelector('.total-palets-valor');
    if (el) el.textContent = suma;
  }
  actualizarTotalPalets();

  // Autoguardado: se guarda solo, en segundo plano, tras dejar de escribir,
  // para que no se pierda nada si se cierra la pestaña sin pulsar nada.
  let autoguardadoTimer = null;
  function programarAutoguardado() {
    clearTimeout(autoguardadoTimer);
    autoguardadoTimer = setTimeout(function () { autoguardarSeccion(); }, 900);
  }
  function autoguardarSeccion(onDone) {
    clearTimeout(autoguardadoTimer);
    if (!editable) { if (onDone) onDone(false); return; } // por si acaso: no se guarda nada de una agrupación no editable
    const filas = recogerFilas(tableWrap);
    marcarGuardando(panel, true);
    google.script.run
      .withSuccessHandler(function () {
        marcarGuardando(panel, false);
        if (onDone) onDone(true);
      })
      .withFailureHandler(function (err) {
        marcarGuardando(panel, false);
        mostrarErrorServidor(err);
        if (onDone) onDone(false);
      })
      .guardarConteo(dia, filas, fecha, seccion.nombre);
  }

  tableWrap.querySelectorAll('table.conteo tbody tr').forEach(function (tr) {
    if (tr.classList.contains('fila-grupo-header')) {
      return; // fila-resumen del grupo: no es una tienda, no lleva inputs
    }
    if (tr.classList.contains('fila-cerrada')) {
      const btnReabrir = tr.querySelector('.btn-reabrir');
      if (btnReabrir) {
        btnReabrir.onclick = function () {
          if (!editable) return;
          const cierreId = tr.getAttribute('data-cierre-id');
          appConfirm('Reabrir tienda', '¿Quieres reabrir esta tienda para el conteo de hoy?', function () {
            eliminarObservacionYRecargar(cierreId);
          });
        };
      }
    } else {
      attachCalculoYValidacion(tr);
      attachForzarNo(tr);
      tr.querySelectorAll('input.celda:not(.celda-total)').forEach(function (input) {
        input.addEventListener('input', function () {
          programarAutoguardado();
          actualizarTotalPalets();
        });
      });
      const btnCerrar = tr.querySelector('.btn-cerrar-tienda');
      if (btnCerrar) {
        btnCerrar.onclick = function () {
          if (!editable) return;
          const nombreTienda = tr.getAttribute('data-nombre');
          appPrompt('Cerrar tienda', 'Motivo (ej. "Tienda cerrada, no se da a agencia")…', function (texto) {
            guardarObservacionYRecargar({ fecha: fecha, dia: dia, agrupacion: seccion.nombre, tienda: nombreTienda, tipo: 'cierre', texto: texto });
          });
        };
      }
    }
  });

  attachValidacionGrupos(tableWrap);

  const btnHeaderPrevision = header.querySelector('.btn-header-prevision');
  if (btnHeaderPrevision) {
    btnHeaderPrevision.onclick = function (e) {
      e.stopPropagation();
      mostrarModalEnviarAgencia(calcularResumenEnvio(), function (callback) {
        enviarSeccion('prevision', callback);
      }, 'prevision');
    };
  }

  const btnHeaderDefinitivo = header.querySelector('.btn-header-definitivo');
  if (btnHeaderDefinitivo) {
    btnHeaderDefinitivo.onclick = function (e) {
      e.stopPropagation();
      mostrarModalEnviarAgencia(calcularResumenEnvio(), function (callback) {
        enviarSeccion('definitivo', callback);
      }, 'definitivo');
    };
  }

  const btnDeshacerEnvio = header.querySelector('.btn-deshacer-envio');
  if (btnDeshacerEnvio) {
    btnDeshacerEnvio.onclick = function (e) {
      e.stopPropagation();
      appConfirm(
        'Deshacer envío',
        'Vas a deshacer el envío de "' + seccion.nombre + '". Se quitará la marca de enviado y se recuperarán los datos para poder seguir editándolos. Solo puedes hacer esto el mismo día en que se envió. ¿Seguro que quieres continuar?',
        function () {
          btnDeshacerEnvio.disabled = true;
          google.script.run
            .withSuccessHandler(function () {
              btnDeshacerEnvio.disabled = false;
              cargarConteoDia();
              cargarCalendario();
            })
            .withFailureHandler(function (err) {
              btnDeshacerEnvio.disabled = false;
              mostrarErrorServidor(err);
            })
            .deshacerEnvioSeccion(dia, seccion.nombre, fecha);
        },
        true
      );
    };
  }

  const btnPdf = header.querySelector('.btn-pdf-seccion');
  if (btnPdf) {
    btnPdf.onclick = function (e) {
      e.stopPropagation();
      generarPdfSeccion(seccion, dia, fecha, tableWrap);
    };
  }

  /** Recopila, en vivo desde los inputs actuales, los datos para el modal de envío. */
  function calcularResumenEnvio() {
    let totalTiendas = 0;
    let tiendasConDatos = 0;
    const pendientes = [];
    tableWrap.querySelectorAll('table.conteo tbody tr').forEach(function (tr) {
      if (tr.classList.contains('fila-grupo-header') || tr.classList.contains('fila-cerrada')) return;
      totalTiendas++;
      const totalInput = tr.querySelector('input[data-campo="total"]');
      const valor = totalInput ? parseFloat(totalInput.value) : NaN;
      if (!isNaN(valor) && valor > 0) tiendasConDatos++;
      else pendientes.push(tr.getAttribute('data-nombre') || '');
    });
    let totalPalets = 0;
    tableWrap.querySelectorAll('input.celda-total').forEach(function (inp) {
      const v = parseFloat(inp.value);
      if (!isNaN(v)) totalPalets += v;
    });
    return {
      nombre: seccion.nombre,
      fechaTexto: formatearFechaLarga(fecha),
      totalTiendas: totalTiendas,
      tiendasConDatos: tiendasConDatos,
      pendientes: pendientes,
      totalPalets: totalPalets
    };
  }

  function enviarSeccion(tipo, callback) {
    if (!editable) { if (callback) callback(false, 'Esta agrupación ya no se puede modificar.'); return; }
    const btnPrevision = header.querySelector('.btn-header-prevision');
    const btnDefinitivo = header.querySelector('.btn-header-definitivo');
    if (btnPrevision) btnPrevision.disabled = true;
    if (btnDefinitivo) btnDefinitivo.disabled = true;
    const metodo = tipo === 'definitivo' ? 'enviarDefinitivoAgencia' : 'enviarPrevisionAgencia';
    // Guarda inmediatamente (sin esperar el debounce) y, si todo va bien, envía.
    autoguardarSeccion(function (ok) {
      if (!ok) {
        if (btnPrevision) btnPrevision.disabled = false;
        if (btnDefinitivo) btnDefinitivo.disabled = false;
        if (callback) callback(false, 'No se han podido guardar los datos. Inténtalo de nuevo.');
        return;
      }
      google.script.run
        .withSuccessHandler(function (res) {
          if (btnPrevision) btnPrevision.disabled = false;
          if (btnDefinitivo) btnDefinitivo.disabled = false;
          cargarConteoDia();
          cargarCalendario();
          const etiqueta = tipo === 'definitivo' ? 'Definitivo enviado a: ' : 'Previsión enviada a: ';
          if (callback) callback(true, etiqueta + res.enviadoA.join(', '));
        })
        .withFailureHandler(function (err) {
          if (btnPrevision) btnPrevision.disabled = false;
          if (btnDefinitivo) btnDefinitivo.disabled = false;
          if (callback) callback(false, (err && err.message) ? err.message : String(err));
        })
        [metodo](dia, seccion.nombre, fecha);
    });
  }

  return panel;
}

/**
 * Genera y descarga un PDF con el conteo completo de una agrupación: todas
 * sus tiendas y casillas (Límite, 60, PTA, CART., TOTAL, PDTE), tal cual
 * están en ese momento en la pantalla (incluye cambios aún sin autoguardar),
 * más las notas de carga, observaciones y el orden de retirada si los hay.
 *
 * Usa jsPDF + el plugin autoTable (cargados por CDN en el <head>). No se
 * usan emojis en el texto para evitar el mismo problema de renderizado que
 * ya se dio en los PDF de incidencias.
 *
 * SIEMPRE UNA SOLA PÁGINA: en vez de usar un A4 apaisado de tamaño fijo (lo
 * que hacía que autoTable repartiera las agrupaciones grandes en varias
 * páginas), primero se "mide" en un lienzo muy alto cuánto ocupa realmente
 * el contenido completo (cabecera + notas + todas las filas) y luego se crea
 * el PDF definitivo con el alto justo para que quepa entero: el ancho de A4
 * apaisado (297mm) siempre, y de alto el estándar de un A4 (210mm) si cabe,
 * o algo más alto si la agrupación es grande — pero nunca una página más.
 */
const PDF_ANCHO_MM_ = 297; // ancho fijo tipo A4 apaisado
const PDF_ALTO_A4_MM_ = 210; // alto estándar de un A4 apaisado

/** Lee de la tabla en pantalla (no de "seccion", para incluir cambios aún
 *  sin guardar) las filas [tienda, límite, 60, PTA, CART., TOTAL, PDTE, (PESO)]. */
function leerFilasPdfSeccion_(tableWrap, seccion) {
  const filas = [];
  tableWrap.querySelectorAll('table.conteo tbody tr').forEach(function (tr) {
    if (tr.classList.contains('fila-grupo-header')) return;

    const nombre = tr.getAttribute('data-nombre') || '';

    if (tr.classList.contains('fila-cerrada')) {
      const limiteCelda = tr.querySelector('td.limite');
      filas.push([
        nombre,
        limiteCelda ? limiteCelda.textContent.trim() : '',
        'CERRADA', '', '', '', ''
      ].concat(seccion.tienePeso ? [''] : []));
      return;
    }

    function valorCampo(campo) {
      const inp = tr.querySelector('input[data-campo="' + campo + '"]');
      return inp ? inp.value : '';
    }

    filas.push([
      nombre,
      tr.getAttribute('data-limite') || '',
      valorCampo('c60'),
      valorCampo('pta'),
      valorCampo('cart'),
      valorCampo('total'),
      valorCampo('pdte')
    ].concat(seccion.tienePeso ? [valorCampo('peso')] : []));
  });
  return filas;
}

/** Crea un doc de jsPDF con el ancho/alto exactos pedidos (en mm), eligiendo
 *  la orientación ('p' o 'l') que ya cumple esa forma, para que jsPDF no
 *  intercambie ancho y alto por su cuenta (lo hace si, p.ej., pides
 *  orientación "landscape" pero el alto que le das es mayor que el ancho). */
function crearDocPdfPaginaExacta_(jsPDF, anchoMM, altoMM) {
  const orientacion = altoMM > anchoMM ? 'p' : 'l';
  return new jsPDF({ unit: 'mm', format: [anchoMM, altoMM], orientation: orientacion });
}

/** Dibuja la cabecera, las notas y la tabla completa de la agrupación en el
 *  doc dado (empezando siempre en la misma posición) y devuelve la
 *  coordenada Y justo debajo de la tabla, para poder saber cuánto ocupa. */
function dibujarPdfSeccion_(doc, partes, dia, fecha, fechaGeneracion, seccion, filas) {
  doc.setFontSize(8);
  doc.setTextColor(140, 148, 158);
  doc.text('Generado el ' + fechaGeneracion, 14, 10);
  doc.setTextColor(0, 0, 0);

  doc.setFontSize(15);
  doc.setTextColor(28, 43, 69);
  doc.text(partes.titulo + (partes.ubicacion ? ' · ' + partes.ubicacion : ''), 14, 18);

  doc.setFontSize(10);
  doc.setTextColor(90, 100, 114);
  doc.text((dia || '') + ' · ' + formatearFechaLarga(fecha), 14, 24);
  doc.setTextColor(0, 0, 0);

  let y = 31;

  if (seccion.notasCarga && seccion.notasCarga.length) {
    doc.setFontSize(9);
    seccion.notasCarga.forEach(function (texto) {
      doc.text('• ' + texto, 14, y);
      y += 5;
    });
    y += 2;
  }

  if (seccion.notas && seccion.notas.length) {
    doc.setFontSize(9);
    seccion.notas.forEach(function (n) {
      doc.text('Nota: ' + n.texto, 14, y);
      y += 5;
    });
    y += 2;
  }

  doc.autoTable({
    startY: y,
    head: [['Tienda', 'Límite', '60', 'PTA', 'CART.', 'TOTAL', 'PDTE'].concat(seccion.tienePeso ? ['PESO'] : [])],
    body: filas,
    styles: { fontSize: 9, cellPadding: 2.5, valign: 'middle', halign: 'center' },
    headStyles: { fillColor: [28, 43, 69], textColor: 255, halign: 'center' },
    bodyStyles: { halign: 'center' },
    columnStyles: {
      0: { fontStyle: 'bold', fontSize: 11, halign: 'left' },
      5: { fontStyle: 'bold' }
    },
    // Margen inferior reducido y a propósito pequeño: la página final se
    // dimensiona para que quepa justo, así que no hace falta el hueco de
    // 20mm que deja autoTable por defecto (y que forzaría un salto de
    // página con el alto ajustado que calculamos más abajo).
    margin: { bottom: 10 },
    // Por si acaso: nunca partir una fila entre dos páginas.
    rowPageBreak: 'avoid'
  });

  return doc.lastAutoTable.finalY;
}

function generarPdfSeccion(seccion, dia, fecha, tableWrap) {
  if (!window.jspdf || !window.jspdf.jsPDF) {
    mostrarToast('No se ha podido cargar el generador de PDF. Revisa tu conexión e inténtalo de nuevo.', true);
    return;
  }

  const jsPDF = window.jspdf.jsPDF;
  const partes = parsearNombreAgrupacion(seccion.nombre);

  // Fecha/hora de generación del PDF (no la fecha del conteo), arriba del todo.
  const ahora = new Date();
  const fechaGeneracion = Utilities_formatearFechaHora_(ahora);

  const filas = leerFilasPdfSeccion_(tableWrap, seccion);

  // 1ª pasada (de medición, se descarta): se dibuja todo en un lienzo muy
  // alto (2000mm) para que la tabla nunca necesite paginarse, y así saber
  // cuánto ocupa el contenido real completo, sea cual sea el tamaño de la
  // agrupación.
  const docMedida = crearDocPdfPaginaExacta_(jsPDF, PDF_ANCHO_MM_, 2000);
  const alturaContenido = dibujarPdfSeccion_(docMedida, partes, dia, fecha, fechaGeneracion, seccion, filas);

  // 2ª pasada (definitiva): si con el alto estándar de un A4 apaisado
  // (210mm) ya cabe todo, se usa ese tamaño normal de siempre; si la
  // agrupación es más grande, se alarga la página lo justo para que quepa
  // entera en UNA sola hoja (nunca se generan páginas adicionales).
  const alturaPagina = Math.max(PDF_ALTO_A4_MM_, alturaContenido + 14);
  const doc = crearDocPdfPaginaExacta_(jsPDF, PDF_ANCHO_MM_, alturaPagina);
  dibujarPdfSeccion_(doc, partes, dia, fecha, fechaGeneracion, seccion, filas);

  const nombreArchivo = 'Conteo_' + seccion.nombre.replace(/[^a-z0-9áéíóúñ]+/gi, '_') + '_' + fecha + '.pdf';
  doc.save(nombreArchivo);
}

/** 'lunes, 19 de julio de 2026, 14:32' — usada solo como marca de tiempo de
 *  generación del PDF; no confundir con formatearFechaLarga(), que formatea
 *  la fecha del CONTEO (que puede ser distinta a hoy si se abre un día pasado). */
function Utilities_formatearFechaHora_(d) {
  const dd = pad2(d.getDate());
  const mm = MESES_ES[d.getMonth()];
  const yyyy = d.getFullYear();
  const hh = pad2(d.getHours());
  const min = pad2(d.getMinutes());
  return dd + ' de ' + mm + ' de ' + yyyy + ', ' + hh + ':' + min;
}

function badgeEstado(seccion) {
  if (seccion.estado === 'enviado') return '<span class="badge badge-enviado"><span class="badge-dot"></span>Enviado ' + (seccion.horaEnvio || '') + '</span>';
  if (seccion.estado === 'progreso') return '<span class="badge badge-progreso"><span class="badge-dot"></span>En progreso</span>';
  return ''; // ya no se muestra el badge "Pendiente" en la cabecera de la agrupación
}

/** Badge independiente para la previsión: a diferencia del estado principal
 *  (que solo refleja el envío DEFINITIVO), esto avisa de que ya se ha
 *  mandado una previsión, sin bloquear nada ni sustituir al badge de
 *  estado — ambos pueden verse a la vez. */
function badgePrevision(seccion) {
  if (!seccion.previsionEnviada) return '';
  return '<span class="badge badge-prevision"><span class="badge-dot"></span>Previsión enviada ' + escapeHtml(seccion.previsionEnviada) + '</span>';
}

/**
 * Fila-cabecera de un grupo de rutas: aparece UNA sola vez, justo encima de
 * la primera tienda del grupo. Dos variantes, según t.notaGrupoTipo:
 *
 *  - Ruta normal (tipo null, ej. "8P MAX. POR RUTA"): a la izquierda los
 *    nombres de las tiendas que comparten esa ruta, a la derecha el chip
 *    con el contador en vivo "texto — x/8" (comportamiento de siempre).
 *  - Total informativo (tipo 'total', ej. "TOTAL LISBOA"): a la izquierda
 *    se muestra la descripción tal cual la escribiste en el Excel (no la
 *    lista de tiendas), y a la derecha el chip con la suma de palets en
 *    vivo de esa agrupación, sin ningún aviso/alerta de límite (es solo
 *    información visual).
 */
function filaGrupoHeaderHtml(t, nombresGrupo, tienePeso) {
  const esTotal = t.notaGrupoTipo === 'total';
  const tiendas = (nombresGrupo || []).map(quitarCodigoTienda).join(' + ');
  const textoIzquierda = esTotal ? t.nota : tiendas;
  const chipInicial = esTotal ? '0 palets' : t.nota;
  return '<tr class="fila-grupo-header' + (esTotal ? ' fila-grupo-header-total' : '') + '" data-nota-grupo-header="' + escapeAttr(t.notaGrupoId) + '" data-nota-grupo-tipo="' + escapeAttr(t.notaGrupoTipo || '') + '">' +
    '<td colspan="' + (tienePeso ? 9 : 8) + '">' +
    '<div class="grupo-header">' +
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>' +
    '<span class="grupo-header-tiendas">' + escapeHtml(textoIzquierda) + '</span>' +
    '<span class="grupo-header-chip' + (esTotal ? ' grupo-header-chip-total' : '') + '" data-nota-base="' + escapeAttr(t.nota) + '">' + escapeHtml(chipInicial) + '</span>' +
    '</div></td></tr>';
}

/** "127- NERVIÓN" -> "NERVIÓN" (quita el código numérico de tienda, solo para el
 *  texto de la fila-cabecera del grupo; el nombre completo se sigue mostrando
 *  tal cual en la fila individual de cada tienda). */
function quitarCodigoTienda(nombre) {
  return String(nombre).replace(/^\s*\d+\s*-\s*/, '').trim();
}

/** "NO" tal cual viene del Excel (sin importar mayúsculas/espacios): esa
 *  tienda no debe recibir palets por esa vía ese día. */
function esValorNo(v) {
  return String(v == null ? '' : v).trim().toUpperCase() === 'NO';
}

/**
 * Celda de 60/PTA/CART. Si el valor es "NO", se muestra en rojo y no
 * editable (con un botón para forzar un número igualmente si hiciera
 * falta); si no, es el input numérico normal de siempre.
 */
function celdaConteoHtml(campo, valor, forzado) {
  if (forzado) {
    return '<input class="celda celda-forzada" data-campo="' + campo + '" data-forzado="1" type="number" value="' + valor + '" title="Forzado pese al &quot;NO&quot; original. Toca para volver a forzar/cambiar el número.">';
  }
  if (esValorNo(valor)) {
    return '<input class="celda celda-no" data-campo="' + campo + '" type="text" value="NO" readonly title="Esta tienda no debe recibir palets por esta vía. Toca para forzar un número igualmente.">';
  }
  return '<input class="celda" data-campo="' + campo + '" type="number" value="' + valor + '">';
}

function filaHtml(t, esPrimeraDeGrupo, esUltimaDeGrupo, tienePeso) {
  const notaHtml = (t.nota && !t.notaGrupoId)

    : '';

    ? ' fila-grupo-ruta' + (t.notaGrupoTipo === 'total' ? ' fila-grupo-total' : '') + (esPrimeraDeGrupo ? ' fila-grupo-primera' : '') + (esUltimaDeGrupo ? ' fila-grupo-ultima' : '')
    : '';
  if (t.cerrada) {
    return '<tr class="fila-cerrada' + claseGrupo + '" data-row="' + t.row + '" data-nombre="' + escapeAttr(t.nombre) + '" data-cierre-id="' + escapeAttr(t.cierreId) + '"' + atrGrupo + '>' +
      '<td class="nombre">' + escapeHtml(t.nombre) + notaHtml + '</td>' +
      '<td class="limite">' + t.limite + '</td>' +
      '<td colspan="' + (tienePeso ? 6 : 5) + '"><div class="motivo-cierre">CERRADA — ' + escapeHtml(t.motivoCierre) + '</div></td>' +

    '<td>' + celdaConteoHtml('cart', t.cart, !!(t.forzados && t.forzados.cart !== undefined)) + '</td>' +

    '<td><input class="celda" data-campo="pdte" type="number" value="' + t.pdte + '"></td>' +
    (tienePeso ? '<td><input class="celda" data-campo="peso" type="number" step="0.01" value="' + (t.peso == null ? '' : t.peso) + '"></td>' : '') +
    '<td><button type="button" class="btn-cerrar-tienda" title="Marcar tienda como cerrada">' +
    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></svg></button></td>' +
    '</tr>';
}

/**
 * Calcula TOTAL = 60 + PTA + CART automáticamente al escribir, y colorea la fila
 * en ámbar (1-2 palets de más, se acepta ciñéndose al límite) o rojo
 * (3 o más de más, hay que consultar a informática).
 */
function attachCalculoYValidacion(tr) {
  const limite = Number(tr.getAttribute('data-limite'));
  const c60Input = tr.querySelector('input[data-campo="c60"]');
  const ptaInput = tr.querySelector('input[data-campo="pta"]');
  const cartInput = tr.querySelector('input[data-campo="cart"]');
  const totalInput = tr.querySelector('input[data-campo="total"]');
  const nota = tr.querySelector('.diff-nota');

  function recalcTotal() {
    if (c60Input.value === '' && ptaInput.value === '' && cartInput.value === '') {
      totalInput.value = '';
    } else {
      const m = parseFloat(c60Input.value) || 0;
      const p = parseFloat(ptaInput.value) || 0;
      const c = parseFloat(cartInput.value) || 0;
      totalInput.value = m + p + c;
    }
    validar();
  }

  function validar() {
    tr.classList.remove('fila-aviso', 'fila-alerta');
    nota.textContent = '';
    nota.className = 'diff-nota';

    const total = parseFloat(totalInput.value);
    if (isNaN(total) || !limite) return;

    const exceso = total - limite;
    if (exceso >= 3) {
      tr.classList.add('fila-alerta');
      nota.textContent = '+' + exceso + ' sobre el límite — consultar a informática';
      nota.classList.add('alerta');
    } else if (exceso >= 1) {
      tr.classList.add('fila-aviso');
      nota.textContent = '+' + exceso + ' sobre el límite — ceñirse al límite';
      nota.classList.add('aviso');
    }
  }

  c60Input.addEventListener('input', recalcTotal);
  ptaInput.addEventListener('input', recalcTotal);
  cartInput.addEventListener('input', recalcTotal);
  validar();
}

/**
 * Engancha el botón "+" de las casillas que traen "NO". Al pulsarlo, tras
 * confirmar, deja escribir un número igualmente: la misma casilla pasa a
 * ser un input numérico normal (marcado en ámbar) y se manda al backend
 * como campoForzado, así el "NO" original de la hoja no se borra (ver
 * guardarConteo / escribirCeldaConteo_ en el backend).
 */
function attachForzarNo(tr) {
  tr.querySelectorAll('input.celda-no').forEach(function (input) {
    input.addEventListener('click', function () {
      appConfirm(
        'Forzar palets pese al "NO"',
        'Esta casilla trae "NO": esa tienda no debería recibir palets por esta vía. Si continúas, podrás escribir un número igualmente; se guardará como excepción sin borrar el "NO" original de la hoja.',
        function () {
          appPrompt('Número de palets a forzar', 'Ej: 2', function (texto) {
            const numero = Number(String(texto).replace(',', '.'));
            if (isNaN(numero)) { mostrarToast('Introduce un número válido', true); return; }
            input.type = 'number';
            input.readOnly = false;
            input.value = numero;
            input.classList.remove('celda-no');
            input.classList.add('celda-forzada');
            input.setAttribute('data-forzado', '1');
            input.title = 'Forzado pese al "NO" original';
            input.dispatchEvent(new Event('input', { bubbles: true }));
            programarAutoguardado();
            actualizarTotalPalets();
          });
        }
      );
    });
  });
}

/**
 * Algunas anotaciones de carga (ej. "8P MAX. POR RUTA") no son un límite de
 * cada tienda por separado, sino de varias tiendas juntas (mismo camión/
 * ruta). Esas filas comparten "data-nota-grupo" (mismo id = misma celda
 * combinada en el Excel) y "data-nota-limite" (el número sacado del texto,
 * ej. 8). Aquí se agrupan esas filas, se suma su TOTAL en vivo cada vez que
 * cambia cualquiera de ellas, y se pinta el aviso en el chip ÚNICO de la
 * fila-cabecera del grupo (ya no se repite en cada tienda).
 */
function attachValidacionGrupos(tableWrap) {
  const grupos = {};
  tableWrap.querySelectorAll('table.conteo tbody tr[data-nota-grupo]').forEach(function (tr) {
    const id = tr.getAttribute('data-nota-grupo');
    if (!grupos[id]) grupos[id] = [];
    grupos[id].push(tr);
  });

  Object.keys(grupos).forEach(function (id) {
    const filas = grupos[id];
    const limiteStr = filas[0].getAttribute('data-nota-limite');
    const limite = limiteStr ? Number(limiteStr) : null;
    const esTotal = filas[0].getAttribute('data-nota-grupo-tipo') === 'total';
    const headerRow = tableWrap.querySelector('tr[data-nota-grupo-header="' + id + '"]');
    const chip = headerRow ? headerRow.querySelector('.grupo-header-chip') : null;

    function recalcGrupo() {
      let suma = 0;
      filas.forEach(function (tr) {
        const totalInput = tr.querySelector('input[data-campo="total"]');
        const v = totalInput ? parseFloat(totalInput.value) : NaN;
        if (!isNaN(v)) suma += v;
      });

      // Los grupos "total" son solo informativos: nunca se marcan en
      // amarillo/rojo, sea cual sea la suma (no hay límite que comprobar).
      if (!esTotal) {
        filas.forEach(function (tr) {
          tr.classList.remove('fila-grupo-aviso', 'fila-grupo-alerta');
          if (limite) {
            if (suma > limite) tr.classList.add('fila-grupo-alerta');
            else if (suma === limite) tr.classList.add('fila-grupo-aviso');
          }
        });
      }

      if (headerRow) headerRow.classList.remove('fila-grupo-header-aviso', 'fila-grupo-header-alerta');
      if (chip) {
        const base = chip.getAttribute('data-nota-base') || '';
        chip.classList.remove('nota-grupo-aviso', 'nota-grupo-alerta');
        if (esTotal) {
          chip.textContent = suma + ' ' + (suma === 1 ? 'palet' : 'palets');
        } else if (limite) {
          chip.textContent = base + ' — ' + suma + '/' + limite;
          if (suma > limite) { chip.classList.add('nota-grupo-alerta'); if (headerRow) headerRow.classList.add('fila-grupo-header-alerta'); }
          else if (suma === limite) { chip.classList.add('nota-grupo-aviso'); if (headerRow) headerRow.classList.add('fila-grupo-header-aviso'); }
        } else {
          chip.textContent = base;
        }
      }
    }

    filas.forEach(function (tr) {
      tr.querySelectorAll('input.celda:not(.celda-total)').forEach(function (input) {
        input.addEventListener('input', recalcGrupo);
      });
    });
    recalcGrupo();
  });
}

function recogerFilas(tableWrap) {
  const filas = [];
  tableWrap.querySelectorAll('table.conteo tbody tr').forEach(function (tr) {
    if (tr.classList.contains('fila-cerrada') || tr.classList.contains('fila-grupo-header')) return; // tiendas cerradas y fila-resumen del grupo no se guardan
    const row = Number(tr.getAttribute('data-row'));
    // Para 60/PTA/CART: si la casilla se forzó pese a traer "NO", se manda
    // "NO" en el campo normal (para que el backend NO sobrescriba esa
    // celda) y el número escrito va aparte en xxxForzado, tal como espera
    // guardarConteo() en el backend.
    const getConEscape = function (campo) {
      const input = tr.querySelector('input[data-campo="' + campo + '"]');
      if (input.getAttribute('data-forzado') === '1') {
        return { valor: 'NO', forzado: input.value === '' ? '' : input.value };
      }
      return { valor: input.value === '' ? '' : input.value, forzado: '' };
    };
    const get = function (campo) {
      const input = tr.querySelector('input[data-campo="' + campo + '"]');
      if (!input) return undefined;
      return input.value === '' ? '' : input.value;
    };
    const c60 = getConEscape('c60');
    const pta = getConEscape('pta');
    const cart = getConEscape('cart');
    const fila = {
      row: row,
      c60: c60.valor, c60Forzado: c60.forzado,
      pta: pta.valor, ptaForzado: pta.forzado,
      cart: cart.valor, cartForzado: cart.forzado,
      total: get('total'), pdte: get('pdte')
    };
    // El campo "peso" solo existe en las tiendas de rutas que lo tengan
    // activado (ver seccion.tienePeso); si no hay casilla, no se manda nada.
    const peso = get('peso');
    if (peso !== undefined) fila.peso = peso;
    filas.push(fila);
  });
  return filas;
}

}

/* ---------------- GESTOR DE OBSERVACIONES (admin, cualquier día) ----------------
 * Permite crear notas generales, notas de agrupación o cierres de tienda
 * para CUALQUIER fecha desde un único modal, sin tener que navegar antes
 * hasta ese día. La lista de agrupaciones/tiendas para buscar se obtiene
 * con getPlantillaDia(dia) (la plantilla de rutas/tiendas de ese día de la
 * semana), NO con getConteoDia(fecha): a diferencia de getConteoDia,
 * getPlantillaDia no depende de la ventana de fechas accesibles (hoy +
 * VENTANA_FUTURO_DIAS_), así que desde aquí se pueden dejar anotaciones
 * para fechas futuras lejanas (festivos, cierres ya conocidos con
 * antelación, etc.) sin que la fecha "parezca" no tener hoja de conteo.
 */
let GESTOR_OBS = { fecha: null, datosDia: null, tipo: 'general', seleccion: null, cargaId: 0 };

/** Nombre de hoja de conteo (LUNES..DOMINGO) para una fecha 'YYYY-MM-DD',
 *  calculado en el propio navegador (espejo de MAPA_DIA_SEMANA / getDay()
 *  del backend) para no depender de getConteoDia. Los 7 días de la semana
 *  tienen hoja propia, así que esto nunca devuelve null. */
const MAPA_DIA_SEMANA_JS_ = { 0: 'DOMINGO', 1: 'LUNES', 2: 'MARTES', 3: 'MIERCOLES', 4: 'JUEVES', 5: 'VIERNES', 6: 'SABADO' };
function diaDesdeFechaJs_(fecha) {
  return MAPA_DIA_SEMANA_JS_[new Date(fecha + 'T12:00:00').getDay()];
}

}

/** Ajusta el formulario (buscador visible/oculto, etiquetas) según el tipo elegido. */
function actualizarFormularioSegunTipo_() {
  const campoBusqueda = document.getElementById('gestor-busqueda-campo');
  const label = document.getElementById('gestor-busqueda-label');
  const ayuda = document.getElementById('gestor-busqueda-ayuda');
  const textoLabel = document.getElementById('gestor-texto-label');
  const textoArea = document.getElementById('gestor-texto');
  const inputBusqueda = document.getElementById('gestor-busqueda');
  if (!campoBusqueda) return;

  if (GESTOR_OBS.tipo === 'general') {
    campoBusqueda.style.display = 'none';
    ayuda.style.display = 'none';
    textoLabel.textContent = 'Nota';
    textoArea.placeholder = 'Escribe la nota general del día…';
  } else if (GESTOR_OBS.tipo === 'agrupacion') {
    campoBusqueda.style.display = 'block';
    ayuda.style.display = 'none';
    label.textContent = 'Agrupación';
    inputBusqueda.placeholder = 'Busca una agrupación…';
    textoLabel.textContent = 'Nota';
    textoArea.placeholder = 'Escribe la nota para esta agrupación…';
  } else {
    campoBusqueda.style.display = 'block';
    ayuda.style.display = 'block';
    label.textContent = 'Tiendas';
    inputBusqueda.placeholder = 'Busca y añade una o varias tiendas…';
    textoLabel.textContent = 'Motivo del cierre';
    textoArea.placeholder = 'Ej. "Tienda cerrada, no se da a agencia"…';
  }
  document.getElementById('gestor-busqueda-resultados').style.display = 'none';
  actualizarSeleccionGestorObs_();
}

/** Actualiza el texto del botón "Guardar" para reflejar cuántos cierres se van a crear (si es más de uno). */

  const btn = document.getElementById('modal-confirm-btn');
  if (!btn) return;
  const n = GESTOR_OBS.tipo === 'cierre' && GESTOR_OBS.seleccion ? GESTOR_OBS.seleccion.length : 0;

/** Muestra el/los chip(s) de lo ya elegido (una agrupación, o varias tiendas si es un cierre), con opción de quitar cada uno. */
function actualizarSeleccionGestorObs_() {
  const cont = document.getElementById('gestor-seleccion-actual');
  if (!cont) return;
  actualizarBotonGuardarGestor_();

  if (GESTOR_OBS.tipo === 'cierre') {
    const seleccion = GESTOR_OBS.seleccion || [];
    if (!seleccion.length) { cont.innerHTML = ''; return; }
    const contador = seleccion.length === 1 ? '1 tienda seleccionada' : seleccion.length + ' tiendas seleccionadas';
    cont.innerHTML =
      '<div class="gestor-seleccion-contador">' + contador + '</div>' +
      '<div class="gestor-seleccion-chips">' +
      seleccion.map(function (s, i) {
        return '<span class="gestor-seleccion-chip">' + escapeHtml(s.tienda + ' (' + s.agrupacion + ')') +
          '<button type="button" data-quitar="' + i + '">×</button></span>';
      }).join('') +
      '</div>';
    cont.querySelectorAll('button[data-quitar]').forEach(function (btn) {
      btn.onclick = function () {

        actualizarSeleccionGestorObs_();
        renderResultadosBusquedaGestorObs_(document.getElementById('gestor-busqueda').value);
      };

  if (!GESTOR_OBS.seleccion) { cont.innerHTML = ''; return; }

  cont.innerHTML = '<div class="gestor-seleccion-chips"><span class="gestor-seleccion-chip">' + escapeHtml(texto) + '<button type="button" id="gestor-quitar-seleccion">×</button></span></div>';
  document.getElementById('gestor-quitar-seleccion').onclick = function () {
    GESTOR_OBS.seleccion = null;
    document.getElementById('gestor-busqueda').value = '';
    actualizarSeleccionGestorObs_();
  };
}

/** Carga (o recarga, al cambiar de fecha) las agrupaciones/tiendas de ese día. */
/** Carga (o recarga, al cambiar de fecha) las agrupaciones/tiendas de ese día.
 *
 * Usa un "id de carga" (GESTOR_OBS.cargaId) en vez de comparar solo la
 * fecha: así, si el usuario teclea la fecha rápido y se disparan varias
 * peticiones seguidas, solo la ÚLTIMA lanzada puede actualizar la
 * pantalla — las respuestas de peticiones ya obsoletas (aunque lleguen
 * después) se ignoran. También arma un timeout de seguridad: si en 12s no
 * ha llegado ni éxito ni error (p.ej. un fallo de red que ni dispara el
 * failureHandler), se muestra un aviso con botón "Reintentar" en vez de
 * dejar el spinner dando vueltas para siempre.
 */
/** Carga (o recarga, al cambiar de fecha) las agrupaciones/tiendas de ese día.
 *
 * Usa PRIMERO getConteoDia(fecha) — la llamada de siempre, ya probada —
 * porque para cualquier fecha dentro de la ventana normal (hoy, ayer,
 * mañana...) funciona perfectamente y además trae el estado de cierres
 * (para no ofrecer una tienda ya cerrada al buscarla). SOLO si esa
 * llamada indica que la fecha está "bloqueada" (más allá de la ventana de
 * futuro accesible) se hace una SEGUNDA llamada a getPlantillaDia(dia),
 * que no depende de esa ventana, para poder seguir dejando notas o
 * cierres en fechas lejanas (festivos, etc.) sin las tiendas ya cerradas.
 *
 * Usa un "id de carga" (GESTOR_OBS.cargaId) en vez de comparar solo la
 * fecha: si el usuario teclea la fecha rápido y se disparan varias
 * peticiones seguidas, solo la ÚLTIMA lanzada puede actualizar la
 * pantalla. También arma un timeout de seguridad: si en 12s no ha
 * llegado ni éxito ni error, se muestra un aviso con botón "Reintentar"
 * en vez de dejar el spinner dando vueltas para siempre.
 */
function cargarDatosDiaGestorObs_(fecha) {
  const overlay = document.getElementById('gestor-loading-overlay');
  const avisoError = document.getElementById('gestor-aviso-error');
  const avisoErrorTexto = document.getElementById('gestor-aviso-error-texto');

  const miId = (GESTOR_OBS.cargaId || 0) + 1;
  GESTOR_OBS.cargaId = miId;

  if (avisoError) avisoError.classList.remove('visible');
  if (overlay) overlay.classList.add('visible');

  let timeoutId = setTimeout(onTimeout, 12000);

  function onTimeout() {
    if (miId !== GESTOR_OBS.cargaId) return;
    if (overlay) overlay.classList.remove('visible');
    if (avisoErrorTexto) avisoErrorTexto.textContent = 'La carga está tardando demasiado. Puede que el servidor de Apps Script no haya respondido. Comprueba tu conexión y vuelve a intentarlo.';
    if (avisoError) avisoError.classList.add('visible');
  }

  function mostrarError(mensaje) {
    if (overlay) overlay.classList.remove('visible');
    if (avisoErrorTexto) avisoErrorTexto.textContent = mensaje;
    if (avisoError) avisoError.classList.add('visible');
  }

  function aplicarDatos(data) {
    try {
      GESTOR_OBS.datosDia = data;
      if (overlay) overlay.classList.remove('visible');

      const sinDia = !data.dia || !(data.secciones && data.secciones.length);
      const pillAgr = document.querySelector('.gestor-tipo-pill[data-tipo="agrupacion"]');
      const pillCierre = document.querySelector('.gestor-tipo-pill[data-tipo="cierre"]');
      const aviso = document.getElementById('gestor-aviso-dia');
      if (pillAgr) pillAgr.disabled = sinDia;
      if (pillCierre) pillCierre.disabled = sinDia;
      if (aviso) aviso.style.display = sinDia ? 'block' : 'none';

      if (sinDia && GESTOR_OBS.tipo !== 'general') {
        GESTOR_OBS.tipo = 'general';
        document.querySelectorAll('.gestor-tipo-pill').forEach(function (b) {
          b.classList.toggle('activa', b.getAttribute('data-tipo') === 'general');
        });
      }
      actualizarFormularioSegunTipo_();
    } catch (e) {
      mostrarError('Error al procesar los datos recibidos: ' + (e && e.message ? e.message : e));
    }
  }

  // 2º intento (solo si la fecha está bloqueada por la ventana de futuro):
  // plantilla del día de la semana, sin restricción de fecha.
  function pedirPlantilla() {
    const dia = diaDesdeFechaJs_(fecha);
    google.script.run
      .withSuccessHandler(function (data) {
        clearTimeout(timeoutId);
        if (miId !== GESTOR_OBS.cargaId) return;
        aplicarDatos(data);
      })
      .withFailureHandler(function (err) {
        clearTimeout(timeoutId);
        if (miId !== GESTOR_OBS.cargaId) return;
        const mensaje = (err && err.message) ? err.message : String(err);
        mostrarError('No se ha podido cargar: ' + mensaje);
        mostrarErrorServidor(err);
      })
      .getPlantillaDia(dia);
  }

  // 1er intento: la llamada de siempre, para fechas dentro de la ventana.
  google.script.run
    .withSuccessHandler(function (data) {
      if (miId !== GESTOR_OBS.cargaId) { clearTimeout(timeoutId); return; }
      if (data && data.bloqueada) {
        // Fuera de la ventana normal: reintentamos con la plantilla, que sí
        // sabe leer ese día de la semana sin mirar la fecha en absoluto.
        pedirPlantilla();
        return;
      }
      clearTimeout(timeoutId);
      aplicarDatos(data);
    })
    .withFailureHandler(function (err) {
      clearTimeout(timeoutId);
      if (miId !== GESTOR_OBS.cargaId) return;
      const mensaje = (err && err.message) ? err.message : String(err);
      mostrarError('No se ha podido cargar: ' + mensaje);
      mostrarErrorServidor(err);
    })
    .getConteoDia(fecha);
}

/** Filtra agrupaciones o tiendas (según el tipo elegido) y pinta el desplegable de resultados. */
function renderResultadosBusquedaGestorObs_(query) {
  const cont = document.getElementById('gestor-busqueda-resultados');
  if (!cont) return;

  if (!GESTOR_OBS.datosDia) {
    cont.innerHTML = '<div class="gestor-busqueda-item">Cargando…</div>';
    cont.style.display = 'block';
    return;
  }

  const q = String(query || '').trim().toLowerCase();
  let items = [];
  const secciones = GESTOR_OBS.datosDia.secciones || [];
  const seleccionActual = GESTOR_OBS.tipo === 'cierre' ? (GESTOR_OBS.seleccion || []) : [];

  if (GESTOR_OBS.tipo === 'agrupacion') {
    items = secciones
      .map(function (s) { return { label: s.nombre, agrupacion: s.nombre }; })
      .filter(function (it) { return !q || it.label.toLowerCase().indexOf(q) !== -1; });
  } else if (GESTOR_OBS.tipo === 'cierre') {
    secciones.forEach(function (s) {
      (s.tiendas || []).forEach(function (t) {
        if (t.cerrada) return; // ya cerrada: no tiene sentido volver a cerrarla
        const coincide = !q || t.nombre.toLowerCase().indexOf(q) !== -1 || s.nombre.toLowerCase().indexOf(q) !== -1;
        if (coincide) items.push({ label: t.nombre, sub: s.nombre, agrupacion: s.nombre, tienda: t.nombre });
      });
    });
  }

  items = items.slice(0, 8);

  if (!items.length) {
    cont.innerHTML = '<div class="gestor-busqueda-item">Sin resultados</div>';
    cont.style.display = 'block';
    return;
  }

  cont.innerHTML = items.map(function (it, i) {
    const marcada = GESTOR_OBS.tipo === 'cierre' && seleccionActual.some(function (s) { return s.tienda === it.tienda && s.agrupacion === it.agrupacion; });
    const casilla = GESTOR_OBS.tipo === 'cierre'
      ? '<span class="gestor-check">' + (marcada ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>' : '') + '</span>'
      : '';
    return '<div class="gestor-busqueda-item' + (marcada ? ' marcada' : '') + '" data-idx="' + i + '">' + casilla +
      '<span class="gestor-busqueda-item-texto">' + escapeHtml(it.label) +
      (it.sub ? '<div class="sub">' + escapeHtml(it.sub) + '</div>' : '') + '</span></div>';
  }).join('');
  cont.style.display = 'block';

  cont.querySelectorAll('.gestor-busqueda-item[data-idx]').forEach(function (el) {
    el.onclick = function () {
      const it = items[Number(el.getAttribute('data-idx'))];
      if (GESTOR_OBS.tipo === 'cierre') {
        // Selección múltiple: marca/desmarca esta tienda sin cerrar el
        // desplegable, para poder seguir añadiendo más sin reabrir nada.
        if (!GESTOR_OBS.seleccion) GESTOR_OBS.seleccion = [];
        const idx = GESTOR_OBS.seleccion.findIndex(function (s) { return s.tienda === it.tienda && s.agrupacion === it.agrupacion; });
        if (idx === -1) GESTOR_OBS.seleccion.push({ agrupacion: it.agrupacion, tienda: it.tienda });
        else GESTOR_OBS.seleccion.splice(idx, 1);
        actualizarSeleccionGestorObs_();
        renderResultadosBusquedaGestorObs_(query);
      } else {
        GESTOR_OBS.seleccion = { agrupacion: it.agrupacion };
        document.getElementById('gestor-busqueda').value = it.label;
        cont.style.display = 'none';
        actualizarSeleccionGestorObs_();
      }
    };
  });
}

/** Guarda una observación en el backend, envuelto en una Promesa (google.script.run usa callbacks). */
function guardarObservacionPromise_(obs) {
  return new Promise(function (resolve, reject) {
    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).guardarObservacion(obs);
  });
}

/** Valida el formulario y guarda la observación (nota general, de agrupación, o uno o varios cierres de tienda). */
function guardarDesdeGestorObs_() {
  const fecha = GESTOR_OBS.fecha;
  if (!fecha) { mostrarToast('Elige una fecha', true); return; }

  const texto = (document.getElementById('gestor-texto').value || '').trim();
  if (!texto) { document.getElementById('gestor-texto').focus(); return; }

  const dia = (GESTOR_OBS.datosDia && GESTOR_OBS.datosDia.dia) || '';
  const base = { fecha: fecha, dia: dia, agrupacion: '', tienda: '', tipo: 'nota', texto: texto };

  let observaciones = [];
  if (GESTOR_OBS.tipo === 'general') {
    observaciones = [base];
  } else if (GESTOR_OBS.tipo === 'agrupacion') {
    if (!GESTOR_OBS.seleccion) { mostrarToast('Busca y selecciona una agrupación', true); return; }
    observaciones = [Object.assign({}, base, { agrupacion: GESTOR_OBS.seleccion.agrupacion })];
  } else if (GESTOR_OBS.tipo === 'cierre') {
    const seleccion = GESTOR_OBS.seleccion || [];
    if (!seleccion.length) { mostrarToast('Busca y selecciona al menos una tienda', true); return; }
    // Una tienda por cada cierre: mismo motivo para todas las marcadas.
    observaciones = seleccion.map(function (s) {
      return Object.assign({}, base, { agrupacion: s.agrupacion, tienda: s.tienda, tipo: 'cierre' });
    });
  }

  const btnGuardar = document.getElementById('modal-confirm-btn');
  if (btnGuardar) { btnGuardar.disabled = true; btnGuardar.textContent = 'Guardando…'; }

  // Se guardan una a una (no en paralelo) para no saturar el backend de
  // Apps Script con llamadas simultáneas cuando se cierran varias tiendas
  // a la vez.
  let cadena = Promise.resolve();
  observaciones.forEach(function (obs) {
    cadena = cadena.then(function () { return guardarObservacionPromise_(obs); });
  });

  cadena
    .then(function () {
      cerrarModal();
      mostrarToast(observaciones.length > 1 ? observaciones.length + ' cierres guardados' : 'Guardado');
      if (document.getElementById('calendar-body')) cargarCalendario();
      if (fecha === ESTADO.fecha && document.getElementById('dia-contenido')) cargarConteoDia();
      if (ESTADO.vista === 'configuracion' && ESTADO_CONFIG.seccionActiva === 'festivos') cargarFestivos();
    })
    .catch(function (err) {
      if (btnGuardar) { btnGuardar.disabled = false; btnGuardar.textContent = 'Guardar'; }
      mostrarErrorServidor(err);
    });
}

// Cierra el desplegable de resultados de búsqueda del gestor si se hace clic
// fuera de él. Se registra una única vez (no dentro de cada apertura del
// modal) para no acumular listeners repetidos en el documento.
document.addEventListener('click', function (e) {
  const res = document.getElementById('gestor-busqueda-resultados');
  if (res && res.style.display !== 'none' && !e.target.closest('.gestor-busqueda-wrap')) {
    res.style.display = 'none';
  }
});

/* ---------------- UI HELPERS ---------------- */
function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function mostrarToast(msg, esError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = esError ? 'show error' : 'show';
  setTimeout(function () { t.className = t.className.replace('show', ''); }, 3200);
}

function mostrarErrorServidor(err) {
  mostrarToast('Error: ' + (err && err.message ? err.message : err), true);
}

function appConfirm(titulo, texto, onConfirm, peligro) {
  document.getElementById('modal-box').classList.remove('ancho');
  document.getElementById('modal-box').classList.remove('medio');
  document.getElementById('modal-box').classList.toggle('peligro', !!peligro);
  document.getElementById('modal-title').style.display = '';
  document.getElementById('modal-title').textContent = titulo;
  document.getElementById('modal-text').textContent = texto;
  document.getElementById('modal-text').style.display = 'block';
  document.getElementById('modal-textarea').style.display = 'none';
  document.getElementById('modal-custom').style.display = 'none';
  document.getElementById('modal-custom').innerHTML = '';
  const actions = document.getElementById('modal-actions');
  actions.innerHTML =
    '<button class="modal-cancel" id="modal-cancel-btn">Cancelar</button>' +
    '<button class="modal-confirm' + (peligro ? ' danger' : '') + '" id="modal-confirm-btn">' +
    (peligro ? 'Eliminar' : 'Confirmar') + '</button>';
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('modal-cancel-btn').onclick = cerrarModal;
  document.getElementById('modal-confirm-btn').onclick = function () { cerrarModal(); onConfirm(); };
}

function appPrompt(titulo, placeholder, onSubmit) {
  document.getElementById('modal-box').classList.remove('ancho');
  document.getElementById('modal-box').classList.remove('medio');
  document.getElementById('modal-title').style.display = '';
  document.getElementById('modal-title').textContent = titulo;
  document.getElementById('modal-text').style.display = 'none';
  document.getElementById('modal-custom').style.display = 'none';
  document.getElementById('modal-custom').innerHTML = '';
  const textarea = document.getElementById('modal-textarea');
  textarea.value = '';
  textarea.placeholder = placeholder || '';
  textarea.style.display = 'block';
  const actions = document.getElementById('modal-actions');
  actions.innerHTML =
    '<button class="modal-cancel" id="modal-cancel-btn">Cancelar</button>' +
    '<button class="modal-confirm" id="modal-confirm-btn">Guardar</button>';
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('modal-cancel-btn').onclick = cerrarModal;
  document.getElementById('modal-confirm-btn').onclick = function () {
    const texto = textarea.value.trim();
    if (!texto) { textarea.focus(); return; }
    cerrarModal();
    onSubmit(texto);
  };
  setTimeout(function () { textarea.focus(); }, 50);
}

/**
 * Modal informativo de "Enviar Previsión" / "Enviar Definitivo": muestra un resumen (tiendas,
 * total de palets, tiendas sin datos todavía) antes de confirmar, y luego
 * pasa a un estado "Enviando…" con spinner mientras se guarda y se manda
 * el email, terminando en un estado de éxito (se cierra solo) o de error
 * (se puede reintentar/cerrar).
 *
 * datos: { nombre, fechaTexto, totalTiendas, tiendasConDatos, pendientes, totalPalets }
 * onConfirmar: function(callback) — hace el guardado + envío real y llama a
 *              callback(true) si fue bien, o callback(false, mensajeError) si no.
 * tipo: 'prevision' | 'definitivo' — cambia el título del botón y la nota
 *       de aviso, ya que tienen consecuencias distintas.
 */
function mostrarModalEnviarAgencia(datos, onConfirmar, tipo) {
  const esDefinitivo = tipo === 'definitivo';
  document.getElementById('modal-box').classList.add('ancho');
  document.getElementById('modal-box').classList.remove('medio');
  document.getElementById('modal-title').style.display = 'none';
  document.getElementById('modal-text').style.display = 'none';
  document.getElementById('modal-textarea').style.display = 'none';

  const custom = document.getElementById('modal-custom');
  custom.style.display = 'block';

  const completo = datos.tiendasConDatos >= datos.totalTiendas && datos.totalTiendas > 0;
  const pct = datos.totalTiendas > 0 ? Math.round((datos.tiendasConDatos / datos.totalTiendas) * 100) : 0;

  const filaAviso = datos.pendientes.length
    ? '<div class="modal-envio-aviso">' +
        '<div class="modal-envio-aviso-titulo">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>' +
          '<span>' + datos.pendientes.length + ' tienda(s) sin datos todavía</span>' +
        '</div>' +
        '<div class="modal-envio-chips">' +
          datos.pendientes.map(function (t) { return '<span class="modal-envio-chip">' + escapeHtml(quitarCodigoTienda(t)) + '</span>'; }).join('') +
        '</div>' +
      '</div>'
    : '<div class="modal-envio-ok">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>' +
        '<span>Todas las tiendas tienen datos introducidos</span>' +
      '</div>';

  custom.innerHTML =
    '<div class="modal-envio-cabecera">' +
      '<div class="modal-envio-cabecera-icono">' +
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h15v13H3z"/><path d="M18 8h3l3 3v5h-6"/><circle cx="7.5" cy="18.5" r="2.5"/><circle cx="17.5" cy="18.5" r="2.5"/></svg>' +
      '</div>' +
      '<div class="modal-envio-cabecera-texto">' +
        '<div class="nombre">' + escapeHtml(datos.nombre) + (esDefinitivo ? ' · Definitivo' : ' · Previsión') + '</div>' +
        '<div class="fecha">' + escapeHtml(datos.fechaTexto) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="modal-envio-stats">' +
      '<div class="modal-envio-stat' + (completo ? ' completo' : (datos.tiendasConDatos > 0 ? ' acento' : '')) + '">' +
        '<span class="lbl">Tiendas con datos</span>' +
        '<span class="val">' + datos.tiendasConDatos + ' / ' + datos.totalTiendas + '</span>' +
        '<div class="modal-envio-barra"><div class="modal-envio-barra-fill' + (completo ? ' completo' : '') + '" style="width:' + pct + '%"></div></div>' +
      '</div>' +
      '<div class="modal-envio-stat">' +
        '<span class="lbl">Total palets</span>' +
        '<span class="val">' + datos.totalPalets + '</span>' +
      '</div>' +
      '<div class="modal-envio-stat">' +
        '<span class="lbl">Progreso</span>' +
        '<span class="val">' + pct + '%</span>' +
      '</div>' +
    '</div>' +
    filaAviso +
    (esDefinitivo
      ? '<p class="modal-envio-nota">Se enviará el email <strong>definitivo</strong> con el resumen a la agencia de transporte. Después, esta agrupación quedará bloqueada y los campos se vaciarán para empezar en blanco la próxima semana.</p>'
      : '<p class="modal-envio-nota">Se enviará un email de <strong>previsión</strong> con el resumen actual a la agencia de transporte. El conteo seguirá siendo editable y podrás volver a enviar otra previsión más tarde.</p>');

  const actions = document.getElementById('modal-actions');
  actions.innerHTML =
    '<button class="modal-cancel" id="modal-cancel-btn">Cancelar</button>' +
    '<button class="modal-confirm" id="modal-confirm-btn">' + (esDefinitivo ? 'Enviar Definitivo' : 'Enviar Previsión') + '</button>';
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('modal-cancel-btn').onclick = cerrarModal;
  document.getElementById('modal-confirm-btn').onclick = function () {
    mostrarModalCargando(esDefinitivo ? 'Enviando el definitivo a la agencia, espere por favor…' : 'Enviando la previsión a la agencia, espere por favor…');
    onConfirmar(function (ok, mensaje) {
      mostrarModalResultadoEnvio(ok, mensaje);
    });
  };
}

/** Estado intermedio "Enviando…": sin botones, sin posibilidad de cerrar mientras dura. */
function mostrarModalCargando(texto) {
  document.getElementById('modal-title').textContent = '';
  document.getElementById('modal-text').style.display = 'none';
  document.getElementById('modal-textarea').style.display = 'none';
  const custom = document.getElementById('modal-custom');
  custom.style.display = 'block';
  custom.innerHTML =
    '<div class="modal-cargando"><span class="spinner-navy"></span><span>' + escapeHtml(texto) + '</span></div>';
  document.getElementById('modal-actions').innerHTML = '';
  document.getElementById('modal-overlay').style.display = 'flex';
}

/** Estado final tras el envío: éxito (se cierra solo) o error (queda un botón para cerrar/reintentar). */
function mostrarModalResultadoEnvio(ok, mensaje) {
  const custom = document.getElementById('modal-custom');
  custom.innerHTML =
    '<div class="modal-resultado ' + (ok ? 'exito' : 'error') + '">' +
    (ok
      ? '<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>'
      : '<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>') +
    '<span>' + escapeHtml(mensaje) + '</span>' +
    '</div>';
  if (ok) {
    setTimeout(cerrarModal, 1300);
  } else {
    const actions = document.getElementById('modal-actions');
    actions.innerHTML = '<button class="modal-cancel" id="modal-cancel-btn">Cerrar</button>';
    document.getElementById('modal-cancel-btn').onclick = cerrarModal;
  }
}

function cerrarModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('modal-overlay').classList.remove('overlay-actualizacion');
  document.getElementById('modal-box').classList.remove('ancho');
  document.getElementById('modal-box').classList.remove('medio');
  document.getElementById('modal-box').classList.remove('peligro');
  document.getElementById('modal-box').classList.remove('actualizacion');
  document.getElementById('modal-title').style.display = '';
}

/* ---------------- PWA: service worker + aviso de actualización ----------------
 * Cada vez que se despliega una versión nueva de la app (nuevo index.html,
 * nuevo service-worker.js con CACHE_VERSION distinto), esta sección detecta
 * el cambio y muestra un modal pidiendo confirmación para actualizar, en
 * vez de recargar sola por sorpresa mientras alguien está rellenando un
 * conteo. Dos vías de detección, para cubrirse:
 *
 *  1) Ciclo de vida estándar del Service Worker (evento 'updatefound' +
 *     'controllerchange'). Es la vía principal.
 *  2) Sondeo de version.json cada pocos minutos y al volver a la pestaña.
 *     Sirve de respaldo porque en algunos navegadores (sobre todo Safari/
 *     iOS en modo PWA instalada) el ciclo de vida del Service Worker tarda
 *     en dispararse o no lo hace hasta que se fuerza una recarga completa.
 *
 * PARA PUBLICAR UNA ACTUALIZACIÓN: sube los archivos nuevos y actualiza el
 * número de versión en dos sitios -> CACHE_VERSION en service-worker.js Y
 * la clave "version" de version.json (usa el mismo valor en los dos).
 */
let swEnEspera = null;
let actualizacionYaAvisada = false;

/** versionNueva es opcional: solo se conoce cuando la detección viene del
 *  sondeo de version.json (el ciclo de vida del Service Worker no dice qué
 *  número de versión trae, solo que hay uno nuevo instalado). Si no se
 *  conoce, se omite el chip "nueva versión" y se deja un texto genérico. */
function mostrarModalActualizacion(versionNueva) {
  // Si ya hay otro modal abierto (p.ej. alguien confirmando un cierre de
  // tienda), no se lo quitamos de encima: se reintenta en el próximo
  // sondeo/evento en vez de interrumpir lo que está haciendo.
  if (actualizacionYaAvisada) return;
  if (document.getElementById('modal-overlay').style.display === 'flex') {
    setTimeout(function () { mostrarModalActualizacion(versionNueva); }, 15000);
    return;
  }
  actualizacionYaAvisada = true;

  const overlay = document.getElementById('modal-overlay');
  const cajaModal = document.getElementById('modal-box');
  cajaModal.classList.remove('ancho', 'medio', 'peligro');
  cajaModal.classList.add('actualizacion');
  overlay.classList.add('overlay-actualizacion');

  document.getElementById('modal-title').style.display = 'none';
  document.getElementById('modal-text').style.display = 'none';
  document.getElementById('modal-textarea').style.display = 'none';
  document.getElementById('modal-actions').innerHTML = '';

  const chipNueva = versionNueva
    ? '<span class="actualizacion-version-chip nueva">v' + escapeHtml(versionNueva) + '</span>'
    : '<span class="actualizacion-version-chip nueva">Nueva versión</span>';

  const custom = document.getElementById('modal-custom');
  custom.style.display = 'block';
  custom.innerHTML =
    '<div class="actualizacion-cabecera">' +
      '<div class="actualizacion-icono">' +
        '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3.05-6.75"/><path d="M21 4v5h-5"/></svg>' +
      '</div>' +
      '<h3>Actualización disponible</h3>' +
      '<p>Hay una nueva versión de Salida de Mercancía lista para instalar.</p>' +
      '<div class="actualizacion-versiones">' +
        '<span class="actualizacion-version-chip actual">v' + escapeHtml(APP_VERSION_ACTUAL) + '</span>' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>' +
        chipNueva +
      '</div>' +
    '</div>' +
    '<div class="actualizacion-cuerpo">' +
      '<div class="actualizacion-motivo">' +
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>' +
        '<span>Es necesario actualizar para seguir usando la app: así se evitan fallos y datos desincronizados con el resto del equipo.</span>' +
      '</div>' +
      '<button type="button" class="btn-actualizar-obligatorio" id="btn-actualizar-obligatorio">' +
        '<span class="spinner" id="btn-actualizar-spinner"></span>' +
        '<span id="btn-actualizar-texto">Actualizar ahora</span>' +
      '</button>' +
      '<p class="actualizacion-nota-obligatoria">La actualización es obligatoria; la app no se puede seguir usando en la versión anterior.</p>' +
    '</div>';

  overlay.style.display = 'flex';
  document.getElementById('btn-actualizar-obligatorio').onclick = aplicarActualizacion;
}

/** Activa el service worker nuevo (si lo hay, esperando) y recarga la página. */
function aplicarActualizacion() {
  const btn = document.getElementById('btn-actualizar-obligatorio');
  if (btn) {
    btn.disabled = true;
    btn.classList.add('cargando');
    document.getElementById('btn-actualizar-texto').textContent = 'Actualizando…';
  }

  if (swEnEspera) {
    swEnEspera.postMessage({ type: 'SKIP_WAITING' });
    // El reload se dispara desde el listener de 'controllerchange' de más
    // abajo en cuanto el nuevo SW tome el control. Por seguridad, si por lo
    // que sea ese evento no llega, forzamos la recarga a los 2s igualmente.
    setTimeout(function () { window.location.reload(); }, 2000);
  } else {
    // No había un SW nuevo detectado vía service worker (llegamos aquí solo
    // por el sondeo de version.json): una recarga forzada basta para traer
    // los archivos nuevos.
    window.location.reload();
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('service-worker.js').then(function (registration) {

      // Ya había un SW controlando la página y aparece uno nuevo instalándose
      // -> es una actualización real (no la primera instalación).
      registration.addEventListener('updatefound', function () {
        const nuevoWorker = registration.installing;
        if (!nuevoWorker) return;
        nuevoWorker.addEventListener('statechange', function () {
          if (nuevoWorker.state === 'installed' && navigator.serviceWorker.controller) {
            swEnEspera = nuevoWorker;
            mostrarModalActualizacion();
          }
        });
      });

      // Comprueba activamente si hay una versión nueva del service worker
      // cada 5 minutos y cada vez que se vuelve a la pestaña/app (cubre el
      // caso típico de dejar la PWA abierta todo el día en un tablet).
      setInterval(function () { registration.update(); }, 5 * 60 * 1000);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') registration.update();
      });

    }).catch(function (err) {
      console.warn('No se pudo registrar el service worker:', err);
    });

    // En cuanto el SW nuevo toma el control (tras el SKIP_WAITING del botón
    // "Actualizar ahora"), recargamos para servir los archivos nuevos.
    let yaRecargando = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (yaRecargando) return;
      yaRecargando = true;
      window.location.reload();
    });
  });

  // ---- Respaldo: sondeo de version.json ----
  // APP_VERSION_ACTUAL está declarada arriba, junto a APPS_SCRIPT_URL (así
  // también se puede mostrar en el login y en "Inicio").

  function comprobarVersionJson() {
    fetch('version.json', { cache: 'no-store' })
      .then(function (resp) { return resp.ok ? resp.json() : null; })
      .then(function (data) {
        if (data && data.version && data.version !== APP_VERSION_ACTUAL) {
          mostrarModalActualizacion(data.version);
        }
      })
      .catch(function () { /* sin conexión o version.json no disponible: se ignora, no es crítico */ });
  }

  window.addEventListener('load', function () {
    setTimeout(comprobarVersionJson, 3000); // pequeño margen tras cargar
    setInterval(comprobarVersionJson, 5 * 60 * 1000);
  });
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') comprobarVersionJson();
  });
}

</script>
